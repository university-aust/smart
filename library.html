<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نبض AUST | Shahd Al-Khaled</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --cyan: #00d4ff; --bg-overlay: rgba(2, 6, 23, 0.7);
            --card-bg: rgba(255, 255, 255, 0.08); --text-color: #ffffff;
            --nav-bg: rgba(2, 6, 23, 0.9); --theory: #ff9f43; --practical: #10ac84;
        }

        body.light-mode {
            --bg-overlay: rgba(241, 245, 249, 0.85); --card-bg: rgba(255, 255, 255, 0.7);
            --text-color: #1e293b; --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-overlay) url('67260.jpg') no-repeat center center fixed;
            background-size: cover; background-blend-mode: overlay;
            color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s;
        }

        .navbar {
            backdrop-filter: blur(20px); background: var(--nav-bg);
            padding: 10px 4%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--cyan); position: sticky; top: 0; z-index: 1000;
        }

        .nav-controls { display: flex; gap: 10px; align-items: center; }
        .btn-nav { padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem; }
        .btn-add { background: var(--cyan); color: #000; }
        .btn-share { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }

        .filter-section {
            padding: 15px 4%; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);
        }

        .search-wrapper { position: relative; grid-column: 1 / -1; margin-bottom: 5px; }
        .search-input {
            width: 100%; padding: 12px 40px 12px 12px; border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.4); background: rgba(15, 23, 42, 0.8);
            color: white; outline: none; font-size: 0.9rem; box-sizing: border-box;
        }
        .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--cyan); }

        .m-select {
            padding: 10px; border-radius: 10px; border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(15, 23, 42, 0.6); color: white; outline: none; font-size: 0.75rem;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px 3%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 4%; } }

        /* ستايل الحاوية الأصلي مع تحسينات */
        .card {
            background: var(--card-bg); border-radius: 18px; padding: 12px;
            position: relative; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            min-height: 240px; display: flex; flex-direction: column; justify-content: space-between;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-3px); border-color: var(--cyan); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2); }

        .badge {
            position: absolute; top: 8px; left: 8px;
            padding: 2px 8px; border-radius: 10px; font-size: 0.55rem; font-weight: bold; color: #fff; z-index: 2;
        }
        .theory { background: var(--theory); }
        .practical { background: var(--practical); }

        .admin-tools { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; z-index: 5; }
        .del-icon { color: #ff4d4d; cursor: pointer; }
        .edit-icon { color: var(--cyan); cursor: pointer; }

        .doc-name { font-size: 0.7rem; color: var(--cyan); margin-top: 4px; font-weight: bold; }
        .info-tag { font-size: 0.6rem; color: #ccc; margin-top: 2px; display: block; }
        .stats-bar { display: flex; gap: 10px; font-size: 0.6rem; margin-top: 8px; opacity: 0.8; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 5px; }

        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-card-view { flex: 2; padding: 10px; border-radius: 8px; border: none; background: var(--cyan); color: #000; font-weight: bold; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .btn-card-dl { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--cyan); color: var(--cyan); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .btn-card-view:active, .btn-card-dl:active { transform: scale(0.95); }

        .fab-mode {
            position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px;
            border-radius: 50%; background: var(--cyan); border: none; cursor: pointer; z-index: 1001;
        }

        /* تنسيق الـ Iframe داخل التنبيه */
        .viewer-container { width: 100%; height: 500px; border-radius: 12px; overflow: hidden; background: #000; position: relative; }
        #pdf-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--cyan); text-align: center; }
    </style>
</head>
<body id="appBody">

    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:8px;">
            <a href="dashboard.html" style="color:var(--text-color); font-size:1.1rem;"><i class="fas fa-arrow-right"></i></a>
            <div style="font-size: 1.1rem; font-weight: 900; color: var(--cyan);">NABD AUST</div>
        </div>
        
        <div class="nav-controls">
            <div id="adminPanel" style="display:none; align-items: center; gap: 10px;">
                <a href="requests.html" style="position: relative; color: var(--text-color); font-size: 1.1rem;">
                    <i class="fas fa-bell"></i>
                    <span id="reqCount" style="display:none; position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; font-size: 0.55rem; padding: 2px 5px; border-radius: 50%;">0</span>
                </a>
                <button onclick="addNewItem()" class="btn-nav btn-add">إضافة</button>
            </div>
            <button onclick="studentShare()" class="btn-nav btn-share">شارك</button>
        </div>
    </nav>

    <div class="filter-section">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="smartSearch" class="search-input" placeholder="ابحث مادة، دكتور..." onkeyup="runFilter()">
        </div>

        <select id="f_fac" class="m-select" onchange="runFilter()">
            <option value="الكل">جميع الكليات</option>
            <option value="كلية الهندسة المعلوماتية">المعلوماتية</option>
            <option value="كلية الهندسة المعمارية">المعمارية</option>
            <option value="كلية طب الأسنان">الأسنان</option>
            <option value="كلية الصيدلة">الصيدلة</option>
        </select>
        <select id="f_year" class="m-select" onchange="runFilter()">
            <option value="الكل">السنوات</option>
            <option value="سنة أولى">1</option><option value="سنة ثانية">2</option><option value="سنة ثالثة">3</option>
        </select>
        <select id="f_type" class="m-select" onchange="runFilter()">
            <option value="الكل">النوع</option>
            <option value="نظري">نظري</option>
            <option value="عملي">عملي</option>
        </select>
    </div>

    <div class="grid" id="mainGrid"></div>

    <button class="fab-mode" onclick="document.getElementById('appBody').classList.toggle('light-mode')"><i class="fas fa-adjust"></i></button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let libraryData = JSON.parse(localStorage.getItem('aust_cache')) || [];

    const admins = [
        { id: "20241600060", key: "shjkshjk" },
        { id: "20241600086", key: "shahed2006" }
    ];

    const currentID = (localStorage.getItem("universityID") || "").trim();
    const currentKey = (localStorage.getItem("securityKey") || "").trim();

    function isAuthorized() {
        return admins.some(a => a.id === currentID && a.key === currentKey);
    }

    function startApp() {
        if (isAuthorized()) {
            document.getElementById('adminPanel').style.display = 'flex';
            watchRequests();
        }
        
        if(libraryData.length > 0) runFilter();

        db.ref('official_library/').on('value', (snap) => {
            const val = snap.val();
            libraryData = val ? Object.keys(val).map(k => ({...val[k], id: k})) : [];
            localStorage.setItem('aust_cache', JSON.stringify(libraryData));
            runFilter();
        });
    }

    function watchRequests() {
        db.ref('suggestions/').on('value', (snap) => {
            const count = snap.numChildren();
            const badge = document.getElementById('reqCount');
            if (badge) {
                badge.innerText = count;
                badge.style.display = count > 0 ? 'block' : 'none';
            }
        });
    }

    function runFilter() {
        const fac = document.getElementById('f_fac').value;
        const yea = document.getElementById('f_year').value;
        const typ = document.getElementById('f_type').value;
        const query = document.getElementById('smartSearch').value.toLowerCase();
        const container = document.getElementById('mainGrid');
        container.innerHTML = "";
        
        let list = libraryData.filter(i => {
            return (fac === 'الكل' || i.category === fac) &&
                   (yea === 'الكل' || i.year === yea) &&
                   (typ === 'الكل' || i.type === typ) &&
                   (!query || (i.title && i.title.toLowerCase().includes(query)) || (i.doctor && i.doctor.toLowerCase().includes(query)));
        });

        list.reverse().forEach(item => {
            const bClass = item.type === 'عملي' ? 'practical' : 'theory';
            container.innerHTML += `
                <div class="card">
                    <div class="badge ${bClass}">${item.type || 'نظري'}</div>
                    <div class="admin-tools" style="${isAuthorized() ? 'display:flex' : 'display:none'}">
                        <i class="fas fa-edit edit-icon" onclick="editItem('${item.id}')"></i>
                        <i class="fas fa-trash del-icon" onclick="deleteItem('${item.id}')"></i>
                    </div>
                    <div>
                        <h3 style="margin:25px 0 3px 0; font-size:0.85rem; line-height:1.2;">${item.title}</h3>
                        <div class="doc-name">د. ${item.doctor || 'غير محدد'}</div>
                        <span class="info-tag"><i class="fas fa-university"></i> ${item.category}</span>
                        <span class="info-tag"><i class="fas fa-calendar-alt"></i> ${item.year}</span>
                        <div class="stats-bar">
                            <span><i class="fas fa-eye" style="color:var(--cyan)"></i> ${item.views || 0}</span>
                            <span><i class="fas fa-download" style="color:#10ac84"></i> ${item.downloads || 0}</span>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-card-view" onclick="handleAction('${item.id}', '${item.url}', '${item.title}', 'view')">عرض سريع</button>
                        <div class="btn-card-dl" onclick="handleAction('${item.id}', '${item.url}', '${item.title}', 'download')">
                            <i class="fas fa-cloud-download-alt"></i>
                        </div>
                    </div>
                </div>`;
        });
    }

    function handleAction(id, url, title, mode) {
        if (mode === 'view') {
            db.ref('official_library/' + id + '/views').transaction(c => (c || 0) + 1);
            
            // محرك جوجل للمعاينة السريعة داخل التطبيق
            let viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;

            Swal.fire({
                title: `<span style="font-size:0.9rem">${title}</span>`,
                html: `
                    <div class="viewer-container">
                        <div id="pdf-loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br><small>جاري التحميل...</small></div>
                        <iframe src="${viewerUrl}" style="width:100%; height:100%; border:none;" onload="document.getElementById('pdf-loader').style.display='none'"></iframe>
                    </div>`,
                width: '98%', background: '#0f172a', color: '#fff', showConfirmButton: false, showCloseButton: true
            });
        } else {
            db.ref('official_library/' + id + '/downloads').transaction(c => (c || 0) + 1);
            
            let dLink = url;
            if (url.includes('drive.google.com')) {
                const fId = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1]?.split('&')[0];
                if (fId) dLink = `https://drive.google.com/uc?export=download&id=${fId}`;
            }

            const a = document.createElement('a');
            a.href = dLink; a.target = '_blank';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            
            Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'بدأ التحميل...', showConfirmButton: false, timer: 1500 });
        }
    }

    // دوال الإدارة
    function addNewItem() { showItemForm('إضافة', {}, d => db.ref('official_library/').push(d)); }
    function editItem(id) { const item = libraryData.find(i => i.id === id); showItemForm('تعديل', item, d => db.ref('official_library/'+id).update(d)); }

    function showItemForm(title, item, callback) {
        Swal.fire({
            title: title, background: '#0f172a', color: '#fff',
            html: `
                <input id="in-t" class="swal2-input" placeholder="اسم المادة" value="${item.title || ''}">
                <input id="in-d" class="swal2-input" placeholder="اسم الدكتور" value="${item.doctor || ''}">
                <input id="in-u" class="swal2-input" placeholder="الرابط المباشر" value="${item.url || ''}">
                <select id="in-c" class="swal2-input">
                    <option value="كلية الهندسة المعلوماتية" ${item.category?.includes('المعلوماتية') ? 'selected' : ''}>المعلوماتية</option>
                    <option value="كلية الهندسة المعمارية" ${item.category?.includes('المعمارية') ? 'selected' : ''}>المعمارية</option>
                    <option value="كلية طب الأسنان" ${item.category?.includes('الأسنان') ? 'selected' : ''}>الأسنان</option>
                </select>
                <select id="in-y" class="swal2-input">
                    <option value="سنة أولى">سنة 1</option><option value="سنة ثانية">سنة 2</option><option value="سنة ثالثة">سنة 3</option>
                </select>
                <select id="in-tp" class="swal2-input">
                    <option value="نظري">نظري</option><option value="عملي">عملي</option>
                </select>`,
            preConfirm: () => ({
                title: document.getElementById('in-t').value, doctor: document.getElementById('in-d').value,
                url: document.getElementById('in-u').value, category: document.getElementById('in-c').value,
                year: document.getElementById('in-y').value, type: document.getElementById('in-tp').value,
                views: item.views || 0, downloads: item.downloads || 0
            })
        }).then(r => { if(r.isConfirmed) callback(r.value); });
    }

    function deleteItem(id) {
        Swal.fire({ title: 'حذف؟', icon: 'warning', showCancelButton: true, background: '#0f172a', color: '#fff' })
        .then(r => { if(r.isConfirmed) db.ref('official_library/'+id).remove(); });
    }

    function studentShare() {
        Swal.fire({ title: 'مساهمة', input: 'url', background: '#0f172a', color: '#fff' })
        .then(r => { if(r.isConfirmed && r.value) db.ref('suggestions/').push({ url: r.value, date: new Date().toLocaleString() }); });
    }

    window.onload = startApp;
</script>
</body>
</html>
