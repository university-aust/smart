<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نبض AUST | Shahd Al-Khaled</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --cyan: #00d4ff; --purple: #a29bfe; --bg-overlay: rgba(2, 6, 23, 0.7);
            --card-bg: rgba(255, 255, 255, 0.08); --text-color: #ffffff;
            --nav-bg: rgba(2, 6, 23, 0.9); --theory: #ff9f43; --practical: #10ac84;
        }

        body.light-mode {
            --bg-overlay: rgba(241, 245, 249, 0.85); --card-bg: rgba(255, 255, 255, 0.7);
            --text-color: #1e293b; --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0; padding: 0; background: var(--bg-overlay) url('67260.jpg') no-repeat center center fixed;
            background-size: cover; background-blend-mode: overlay;
            color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s;
        }

        /* خط التحميل العلوي */
        #loading-line {
            height: 3px; width: 100%; position: fixed; top: 60px; z-index: 999;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: move-line 1.5s infinite; display: none;
        }
        @keyframes move-line { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .navbar {
            backdrop-filter: blur(20px); background: var(--nav-bg);
            padding: 10px 4%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--cyan); position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 1.1rem; font-weight: 900; color: var(--cyan); text-decoration: none; }
        .nav-controls { display: flex; gap: 10px; align-items: center; }
        .btn-nav { padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem; }
        .btn-add { background: var(--cyan); color: #000; }
        .btn-share { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }

        .filter-section {
            padding: 15px 4%; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px;
            background: rgba(0,0,0,0.15); backdrop-filter: blur(10px);
        }

        .search-wrapper { position: relative; grid-column: 1 / -1; }
        .search-input {
            width: 100%; padding: 12px 40px 12px 12px; border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.4); background: rgba(15, 23, 42, 0.8);
            color: white; outline: none; font-size: 0.9rem; box-sizing: border-box;
        }
        .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--cyan); }

        .m-select { padding: 10px; border-radius: 10px; border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(15, 23, 42, 0.6); color: white; outline: none; font-size: 0.75rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px 3%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; } }

        .card {
            background: var(--card-bg); border-radius: 18px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); min-height: 260px; display: flex; flex-direction: column; justify-content: space-between;
            transition: 0.3s; position: relative;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--cyan); }

        .badge { position: absolute; top: 8px; left: 8px; padding: 2px 8px; border-radius: 10px; font-size: 0.55rem; font-weight: bold; color: #fff; z-index: 2; }
        .theory { background: var(--theory); }
        .practical { background: var(--practical); }
        .summary { background: var(--purple); }

        .admin-tools { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; z-index: 5; }
        .del-icon { color: #ff4d4d; cursor: pointer; font-size: 0.9rem; }
        .edit-icon { color: var(--cyan); cursor: pointer; font-size: 0.9rem; }

        .doc-name { font-size: 0.7rem; color: var(--cyan); margin-top: 4px; font-weight: bold; }
        .info-tag { font-size: 0.6rem; color: #ccc; margin-top: 2px; display: block; }
        
        .stats-row { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.65rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
        .stat-item { display: flex; align-items: center; gap: 4px; opacity: 0.8; }

        .action-group { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .btn-action { padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 6px; transition: 0.2s; }
        .btn-view { background: rgba(255, 255, 255, 0.1); color: var(--text-color); border: 1px solid var(--cyan); }
        .btn-download { background: var(--cyan); color: #000; }
        .btn-action:active { transform: scale(0.95); }

        .fab-mode { position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--cyan); border: none; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body id="appBody">

    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:8px;">
            <a href="dashboard.html" style="color:var(--text-color); font-size:1.1rem;"><i class="fas fa-arrow-right"></i></a>
            <div class="logo">NABD AUST</div>
        </div>
        
        <div class="nav-controls">
            <div id="adminPanel" style="display:none; align-items: center; gap: 10px;">
                <a href="requests.html" style="position: relative; color: var(--text-color); font-size: 1.1rem;">
                    <i class="fas fa-bell"></i>
                    <span id="reqCount" style="display:none; position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; font-size: 0.55rem; padding: 2px 5px; border-radius: 50%;">0</span>
                </a>
                <button onclick="addNewItem()" class="btn-nav btn-add">إضافة</button>
            </div>
            <button onclick="studentShare()" class="btn-nav btn-share">شارك</button>
        </div>
    </nav>

    <div id="loading-line"></div>

    <div class="filter-section">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="smartSearch" class="search-input" placeholder="ابحث مادة، دكتور..." onkeyup="runFilter()">
        </div>

        <select id="f_fac" class="m-select" onchange="runFilter()">
            <option value="الكل">جميع الكليات</option>
            <option value="كلية الهندسة المعلوماتية">المعلوماتية</option>
            <option value="كلية الهندسة المعمارية">المعمارية</option>
            <option value="كلية الهندسة الكيميائية">الكيمياء</option>
            <option value="كلية الهندسة البترولية">البترول</option>
            <option value="كلية طب الأسنان">الأسنان</option>
            <option value="كلية الصيدلة">الصيدلة</option>
            <option value="كلية الترجمة واللغات">اللغات</option>
        </select>
        <select id="f_year" class="m-select" onchange="runFilter()">
            <option value="الكل">السنوات</option>
            <option value="سنة أولى">1</option><option value="سنة ثانية">2</option>
            <option value="سنة ثالثة">3</option><option value="سنة رابعة">4</option>
            <option value="سنة خامسة">5</option>
        </select>
        <select id="f_type" class="m-select" onchange="runFilter()">
            <option value="الكل">النوع</option>
            <option value="نظري">نظري</option>
            <option value="عملي">عملي</option>
            <option value="ملخص">ملخص</option>
        </select>
    </div>

    <div class="grid" id="mainGrid"></div>

    <button class="fab-mode" onclick="document.getElementById('appBody').classList.toggle('light-mode')"><i class="fas fa-adjust"></i></button>

<script>
    // تكوين Firebase الخاص بكِ
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // نظام الكاش (التخزين المؤقت) للسرعة
    let libraryData = JSON.parse(localStorage.getItem('aust_cache')) || [];

    const admins = [
        { name: "shahed mamdoh alkhald", id: "20241600060", key: "shjkshjk" },
        { name: "Deaa amar malaika", id: "20241600086", key: "shahed2006" }
    ];

    const currentID = (localStorage.getItem("universityID") || "").trim();
    const currentKey = (localStorage.getItem("securityKey") || "").trim();

    function isAuthorized() {
        return admins.some(a => a.id === currentID && a.key === currentKey);
    }

    function startApp() {
        if (isAuthorized()) {
            document.getElementById('adminPanel').style.display = 'flex';
            watchRequests();
        }
        
        // عرض الكاش فوراً قبل تحميل البيانات الحية
        if(libraryData.length > 0) runFilter();

        document.getElementById('loading-line').style.display = 'block';
        db.ref('official_library/').on('value', (snap) => {
            document.getElementById('loading-line').style.display = 'none';
            const val = snap.val();
            libraryData = val ? Object.keys(val).map(k => ({...val[k], id: k})) : [];
            localStorage.setItem('aust_cache', JSON.stringify(libraryData)); // تحديث الكاش
            runFilter();
        });
    }

    function watchRequests() {
        db.ref('suggestions/').on('value', (snap) => {
            const count = snap.numChildren();
            const badge = document.getElementById('reqCount');
            if (badge) {
                badge.innerText = count;
                badge.style.display = count > 0 ? 'block' : 'none';
            }
        });
    }

    function runFilter() {
        const fac = document.getElementById('f_fac').value;
        const yea = document.getElementById('f_year').value;
        const typ = document.getElementById('f_type').value;
        const query = document.getElementById('smartSearch').value.toLowerCase();
        const container = document.getElementById('mainGrid');
        
        let list = libraryData.filter(i => {
            return (fac === 'الكل' || i.category === fac) &&
                   (yea === 'الكل' || i.year === yea) &&
                   (typ === 'الكل' || i.type === typ) &&
                   (!query || (i.title && i.title.toLowerCase().includes(query)) || (i.doctor && i.doctor.toLowerCase().includes(query)));
        });

        let html = '';
        list.slice().reverse().forEach(item => {
            let bClass = item.type === 'عملي' ? 'practical' : (item.type === 'ملخص' ? 'summary' : 'theory');
            
            html += `
                <div class="card">
                    <div class="badge ${bClass}">${item.type || 'نظري'}</div>
                    <div class="admin-tools" style="${isAuthorized() ? 'display:flex' : 'display:none'}">
                        <i class="fas fa-edit edit-icon" onclick="editItem('${item.id}')"></i>
                        <i class="fas fa-trash del-icon" onclick="deleteItem('${item.id}')"></i>
                    </div>
                    <div>
                        <h3 style="margin:25px 0 3px 0; font-size:0.85rem; line-height:1.2;">${item.title}</h3>
                        <div class="doc-name">د. ${item.doctor || 'غير محدد'}</div>
                        <span class="info-tag"><i class="fas fa-university"></i> ${item.category}</span>
                        <span class="info-tag"><i class="fas fa-calendar-alt"></i> ${item.year}</span>
                        
                        <div class="stats-row">
                            <div class="stat-item" style="color:var(--purple)"><i class="fas fa-eye"></i> ${item.views || 0}</div>
                            <div class="stat-item" style="color:var(--practical)"><i class="fas fa-download"></i> ${item.downloads || 0}</div>
                        </div>
                    </div>

                    <div class="action-group">
                        <button class="btn-action btn-view" onclick="handleFileAction('${item.id}', '${item.url}', '${item.title}', 'view')">
                            <i class="fas fa-eye"></i> عرض الملف
                        </button>
                        <button class="btn-action btn-download" onclick="handleFileAction('${item.id}', '${item.url}', '${item.title}', 'download')">
                            <i class="fas fa-cloud-download-alt"></i> تحميل مباشر
                        </button>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    // الدالة الموحدة للتعامل مع العرض والتحميل
    function handleFileAction(id, url, title, mode) {
        if (mode === 'view') {
            // 1. زيادة عدد المشاهدات
            db.ref('official_library/' + id + '/views').transaction(c => (c || 0) + 1);
            
            // 2. تجهيز الرابط للمعاينة
            let viewUrl = url;
            if (url.includes('drive.google.com')) {
                viewUrl = url.replace('/view', '/preview');
            }

            // 3. فتح المعاينة في SweetAlert
            Swal.fire({
                title: title,
                html: `<iframe src="${viewUrl}" style="width:100%; height:400px; border-radius:10px; border:none;"></iframe>`,
                width: '95%',
                background: '#0f172a',
                color: '#fff',
                showConfirmButton: false,
                showCloseButton: true
            });
        } 
        else if (mode === 'download') {
            // 1. زيادة عدد التحميلات
            db.ref('official_library/' + id + '/downloads').transaction(c => (c || 0) + 1);

            // 2. تحويل رابط جوجل درايف لرابط تحميل مباشر
            let directUrl = url;
            if (url.includes('drive.google.com')) {
                const fileId = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1]?.split('&')[0];
                if (fileId) directUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
            }

            // 3. تنفيذ التحميل
            const link = document.createElement('a');
            link.href = directUrl;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'جاري التحميل...', showConfirmButton: false, timer: 1500 });
        }
    }

    // دوال الإدارة (إضافة، تعديل، حذف)
    function addNewItem() {
        if (!isAuthorized()) return;
        showItemForm('إضافة محاضرة جديدة', {}, (data) => db.ref('official_library/').push(data));
    }

    function editItem(id) {
        const item = libraryData.find(i => i.id === id);
        showItemForm('تعديل البيانات', item, (data) => db.ref('official_library/' + id).update(data));
    }

    function showItemForm(title, item, callback) {
        Swal.fire({
            title: title, background: '#0f172a', color: '#fff',
            html: `
                <input id="in-t" class="swal2-input" placeholder="اسم المادة" value="${item.title || ''}">
                <input id="in-d" class="swal2-input" placeholder="اسم الدكتور" value="${item.doctor || ''}">
                <input id="in-u" class="swal2-input" placeholder="رابط الملف" value="${item.url || ''}">
                <select id="in-c" class="swal2-input">
                    <option value="كلية الهندسة المعلوماتية" ${item.category?.includes('المعلوماتية') ? 'selected' : ''}>المعلوماتية</option>
                    <option value="كلية الهندسة المعمارية" ${item.category?.includes('المعمارية') ? 'selected' : ''}>المعمارية</option>
                    <option value="كلية طب الأسنان" ${item.category?.includes('الأسنان') ? 'selected' : ''}>الأسنان</option>
                    <option value="كلية الصيدلة" ${item.category?.includes('الصيدلة') ? 'selected' : ''}>الصيدلة</option>
                    <option value="كلية الترجمة واللغات" ${item.category?.includes('اللغات') ? 'selected' : ''}>اللغات</option>
                </select>
                <select id="in-y" class="swal2-input">
                    <option value="سنة أولى">سنة 1</option><option value="سنة ثانية">سنة 2</option><option value="سنة ثالثة">سنة 3</option>
                </select>
                <select id="in-tp" class="swal2-input">
                    <option value="نظري">نظري</option><option value="عملي">عملي</option><option value="ملخص">ملخص</option>
                </select>`,
            preConfirm: () => ({
                title: document.getElementById('in-t').value,
                doctor: document.getElementById('in-d').value,
                url: document.getElementById('in-u').value,
                category: document.getElementById('in-c').value,
                year: document.getElementById('in-y').value,
                type: document.getElementById('in-tp').value,
                views: item.views || 0,
                downloads: item.downloads || 0
            })
        }).then(r => { if(r.isConfirmed) callback(r.value); });
    }

    function studentShare() {
        Swal.fire({ title: 'مساهمة', text: 'أدخل رابط الملف لمراجعته', input: 'url', background: '#0f172a', color: '#fff' })
        .then(r => { if(r.isConfirmed && r.value) db.ref('suggestions/').push({ url: r.value, date: new Date().toLocaleString() }); });
    }

    function deleteItem(id) {
        Swal.fire({ title: 'حذف؟', icon: 'warning', showCancelButton: true, background: '#0f172a', color: '#fff' })
        .then(r => { if(r.isConfirmed) db.ref('official_library/'+id).remove(); });
    }

    window.onload = startApp;
</script>
</body>
</html>
