<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نبض AUST | Shahd Al-Khaled</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --cyan: #00d4ff; --bg-overlay: rgba(2, 6, 23, 0.7);
            --card-bg: rgba(255, 255, 255, 0.08); --text-color: #ffffff;
            --nav-bg: rgba(2, 6, 23, 0.9); --theory: #ff9f43; --practical: #10ac84; --summary: #9b59b6;
        }

        body.light-mode {
            --bg-overlay: rgba(241, 245, 249, 0.85); --card-bg: rgba(255, 255, 255, 0.7);
            --text-color: #1e293b; --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-overlay) url('67260.jpg') no-repeat center center fixed;
            background-size: cover; background-blend-mode: overlay;
            color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s;
        }

        .navbar {
            backdrop-filter: blur(20px); background: var(--nav-bg);
            padding: 10px 4%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--cyan); position: sticky; top: 0; z-index: 1000;
        }

        .btn-nav { padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem; }
        .btn-add { background: var(--cyan); color: #000; }

        .filter-section {
            padding: 15px 4%; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);
        }

        .search-input {
            width: 100%; padding: 12px; border-radius: 12px; grid-column: 1 / -1;
            border: 1px solid rgba(0, 212, 255, 0.4); background: rgba(15, 23, 42, 0.8);
            color: white; outline: none; box-sizing: border-box;
        }

        .m-select {
            padding: 10px; border-radius: 10px; border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(15, 23, 42, 0.6); color: white; outline: none; font-size: 0.75rem;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 15px 3%; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 4%; } }

        .card {
            background: var(--card-bg); border-radius: 18px; padding: 15px;
            position: relative; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            min-height: 260px; display: flex; flex-direction: column; justify-content: space-between;
        }

        .badge { position: absolute; top: 8px; left: 8px; padding: 2px 8px; border-radius: 10px; font-size: 0.55rem; font-weight: bold; color: #fff; }
        .theory { background: var(--theory); }
        .practical { background: var(--practical); }
        .summary { background: var(--summary); }

        .admin-tools { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; z-index: 5; }
        .del-icon { color: #ff4d4d; cursor: pointer; }
        .edit-icon { color: var(--cyan); cursor: pointer; }

        .doc-name { font-size: 0.75rem; color: var(--cyan); margin-top: 5px; font-weight: bold; }
        .info-tag { font-size: 0.65rem; color: #ccc; margin-top: 3px; display: block; }

        .stats-footer {
            display: flex; justify-content: space-around; margin-top: 10px; 
            padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.7rem; color: #888;
        }

        .btn-group { display: flex; gap: 8px; margin-top: 12px; }
        /* أزرار بروابط مباشرة لضمان عملها على الهاتف */
        .action-link { 
            text-decoration: none; text-align: center; font-weight: bold; font-size: 0.75rem;
            border-radius: 10px; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .btn-view { flex: 3; background: var(--cyan); color: #000; height: 40px; }
        .btn-dl { flex: 1; border: 1px solid var(--cyan); color: var(--cyan); height: 40px; font-size: 1.1rem; }

        .fab-mode { position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--cyan); border: none; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body id="appBody">

    <nav class="navbar">
        <div style="font-size: 1.2rem; font-weight: 900; color: var(--cyan);">NABD AUST</div>
        <div id="adminPanel" style="display:none;">
            <button onclick="addNewItem()" class="btn-nav btn-add">إضافة محاضرة</button>
        </div>
    </nav>

    <div class="filter-section">
        <input type="text" id="smartSearch" class="search-input" placeholder="ابحث مادة، دكتور..." onkeyup="runFilter()">
        <select id="f_fac" class="m-select" onchange="runFilter()">
            <option value="الكل">جميع الكليات</option>
            <option value="كلية الهندسة المعلوماتية">المعلوماتية</option>
            <option value="كلية الهندسة المعمارية">المعمارية</option>
            <option value="كلية الهندسة الكيميائية">الكيمياء</option>
            <option value="كلية الهندسة البترولية">البترول</option>
            <option value="كلية طب الأسنان">الأسنان</option>
            <option value="كلية الصيدلة">الصيدلة</option>
            <option value="كلية الترجمة واللغات">الترجمة واللغات</option>
        </select>
        <select id="f_year" class="m-select" onchange="runFilter()">
            <option value="الكل">جميع السنوات</option>
            <option value="سنة أولى">سنة 1</option><option value="سنة ثانية">سنة 2</option>
            <option value="سنة ثالثة">سنة 3</option><option value="سنة رابعة">سنة 4</option>
            <option value="سنة خامسة">سنة 5</option>
        </select>
        <select id="f_type" class="m-select" onchange="runFilter()">
            <option value="الكل">النوع</option>
            <option value="نظري">نظري</option><option value="عملي">عملي</option><option value="ملخص">ملخص</option>
        </select>
    </div>

    <div class="grid" id="mainGrid"></div>

    <button class="fab-mode" onclick="document.getElementById('appBody').classList.toggle('light-mode')"><i class="fas fa-adjust"></i></button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let libraryData = [];

    const admins = [{ id: "20241600060", key: "shjkshjk" }, { id: "20241600086", key: "shahed2006" }];
    const currentID = (localStorage.getItem("universityID") || "").trim();
    const currentKey = (localStorage.getItem("securityKey") || "").trim();

    function isAuthorized() { return admins.some(a => a.id === currentID && a.key === currentKey); }

    function startApp() {
        if (isAuthorized()) document.getElementById('adminPanel').style.display = 'block';
        db.ref('official_library/').on('value', (snap) => {
            const val = snap.val();
            libraryData = val ? Object.keys(val).map(k => ({...val[k], id: k})) : [];
            runFilter();
        });
    }

    function runFilter() {
        const fac = document.getElementById('f_fac').value;
        const yea = document.getElementById('f_year').value;
        const typ = document.getElementById('f_type').value;
        const query = document.getElementById('smartSearch').value.toLowerCase();
        const container = document.getElementById('mainGrid');
        container.innerHTML = "";
        
        let list = libraryData.filter(i => {
            return (fac === 'الكل' || i.category === fac) &&
                   (yea === 'الكل' || i.year === yea) &&
                   (typ === 'الكل' || i.type === typ) &&
                   (!query || i.title.toLowerCase().includes(query) || i.doctor.toLowerCase().includes(query));
        });

        list.reverse().forEach(item => {
            let bClass = item.type === 'عملي' ? 'practical' : (item.type === 'ملخص' ? 'summary' : 'theory');
            
            // معالجة الروابط للتحميل والمعاينة
            let viewUrl = item.url.includes('drive.google.com') ? item.url.replace('/view', '/preview') : item.url;
            let downloadUrl = item.url;
            if (item.url.includes('drive.google.com')) {
                const fId = item.url.split('/d/')[1]?.split('/')[0] || item.url.split('id=')[1]?.split('&')[0];
                if (fId) downloadUrl = `https://drive.google.com/uc?export=download&id=${fId}`;
            }

            container.innerHTML += `
                <div class="card">
                    <div class="badge ${bClass}">${item.type || 'نظري'}</div>
                    <div class="admin-tools" style="${isAuthorized() ? 'display:flex' : 'display:none'}">
                        <i class="fas fa-trash del-icon" onclick="deleteItem('${item.id}')"></i>
                    </div>
                    <div>
                        <h3 style="margin-top:20px; font-size:0.85rem; line-height:1.2;">${item.title}</h3>
                        <div class="doc-name">د. ${item.doctor}</div>
                        <span class="info-tag"><i class="fas fa-university"></i> ${item.category}</span>
                        <span class="info-tag"><i class="fas fa-calendar-alt"></i> ${item.year}</span>
                    </div>

                    <div class="stats-footer">
                        <span><i class="fas fa-eye"></i> ${item.views || 0}</span>
                        <span><i class="fas fa-download"></i> ${item.downloads || 0}</span>
                    </div>

                    <div class="btn-group">
                        <a href="${viewUrl}" target="_blank" class="action-link btn-view" onclick="incStat('${item.id}', 'views')">المعاينة</a>
                        <a href="${downloadUrl}" target="_blank" class="action-link btn-dl" onclick="incStat('${item.id}', 'downloads')">
                            <i class="fas fa-download"></i>
                        </a>
                    </div>
                </div>`;
        });
    }

    // دالة تحديث العدادات عند الضغط المباشر
    function incStat(id, field) {
        db.ref('official_library/' + id + '/' + field).transaction(c => (c || 0) + 1);
    }

    function deleteItem(id) {
        Swal.fire({ title: 'حذف؟', icon: 'warning', showCancelButton: true, background: '#0f172a', color: '#fff' })
        .then(r => { if(r.isConfirmed) db.ref('official_library/'+id).remove(); });
    }

    function addNewItem() {
        Swal.fire({
            title: 'إضافة محتوى جديد',
            background: '#0f172a', color: '#fff',
            html: `
                <input id="in-t" class="swal2-input" placeholder="اسم المادة">
                <input id="in-d" class="swal2-input" placeholder="اسم الدكتور">
                <input id="in-u" class="swal2-input" placeholder="الرابط">
                <select id="in-c" class="swal2-input">
                    <option value="كلية الهندسة المعلوماتية">المعلوماتية</option>
                    <option value="كلية الهندسة المعمارية">المعمارية</option>
                    <option value="كلية الهندسة الكيميائية">الكيمياء</option>
                    <option value="كلية الهندسة البترولية">البترول</option>
                    <option value="كلية طب الأسنان">الأسنان</option>
                    <option value="كلية الصيدلة">الصيدلة</option>
                    <option value="كلية الترجمة واللغات">الترجمة واللغات</option>
                </select>
                <select id="in-y" class="swal2-input">
                    <option value="سنة أولى">1</option><option value="سنة ثانية">2</option><option value="سنة ثالثة">3</option><option value="سنة رابعة">4</option><option value="سنة خامسة">5</option>
                </select>
                <select id="in-tp" class="swal2-input">
                    <option value="نظري">نظري</option><option value="عملي">عملي</option><option value="ملخص">ملخص</option>
                </select>`,
            preConfirm: () => ({
                title: document.getElementById('in-t').value, doctor: document.getElementById('in-d').value,
                url: document.getElementById('in-u').value, category: document.getElementById('in-c').value,
                year: document.getElementById('in-y').value, type: document.getElementById('in-tp').value,
                views: 0, downloads: 0
            })
        }).then(r => { if(r.isConfirmed) db.ref('official_library/').push(r.value); });
    }

    window.onload = startApp;
</script>
</body>
</html>
