<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نبض AUST | Shahd Al-Khaled</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --cyan: #00d4ff;
            --bg-overlay: rgba(2, 6, 23, 0.7);
            --card-bg: rgba(255, 255, 255, 0.08); 
            --text-color: #ffffff;
            --nav-bg: rgba(2, 6, 23, 0.9);
            --theory: #ff9f43;
            --practical: #10ac84;
        }

        body.light-mode {
            --bg-overlay: rgba(241, 245, 249, 0.85);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-color: #1e293b;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-overlay) url('67260.jpg') no-repeat center center fixed;
            background-size: cover; background-blend-mode: overlay;
            color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s;
        }

        .navbar {
            backdrop-filter: blur(20px); background: var(--nav-bg);
            padding: 10px 4%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--cyan); position: sticky; top: 0; z-index: 1000;
        }

        .nav-controls { display: flex; gap: 10px; align-items: center; }
        
        .btn-nav {
            padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem;
        }
        .btn-add { background: var(--cyan); color: #000; }
        .btn-share { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }

        .filter-section {
            padding: 15px 4%; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);
        }

        .search-wrapper { position: relative; grid-column: 1 / -1; margin-bottom: 5px; }
        .search-input {
            width: 100%; padding: 12px 40px 12px 12px; border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.4); background: rgba(15, 23, 42, 0.8);
            color: white; outline: none; font-size: 0.9rem; box-sizing: border-box;
        }
        .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--cyan); }

        .m-select {
            padding: 10px; border-radius: 10px; border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(15, 23, 42, 0.6); color: white; outline: none; font-size: 0.75rem;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; 
            padding: 15px 3%; 
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 4%; }
        }

        .card {
            background: var(--card-bg); border-radius: 18px; padding: 12px;
            position: relative; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            min-height: 220px; display: flex; flex-direction: column; justify-content: space-between;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-3px); border-color: var(--cyan); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2); }

        .badge {
            position: absolute; top: 8px; left: 8px;
            padding: 2px 8px; border-radius: 10px; font-size: 0.55rem; font-weight: bold; color: #fff; z-index: 2;
        }
        .theory { background: var(--theory); }
        .practical { background: var(--practical); }

        .admin-tools { position: absolute; top: 8px; right: 8px; display: flex; gap: 8px; z-index: 5; }
        .del-icon { color: #ff4d4d; cursor: pointer; font-size: 0.9rem; }
        .edit-icon { color: var(--cyan); cursor: pointer; font-size: 0.9rem; }

        .doc-name { font-size: 0.7rem; color: var(--cyan); margin-top: 4px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        /* ستايل بيانات الكلية والسنة */
        .info-tag { font-size: 0.6rem; color: #ccc; margin-top: 2px; display: block; }
        
        .stats-bar { display: flex; gap: 6px; font-size: 0.6rem; margin-top: 8px; opacity: 0.8; }

        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-card-main { flex: 2; padding: 8px; border-radius: 8px; border: none; background: var(--cyan); color: #000; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        .btn-card-dl { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--cyan); color: var(--cyan); text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

        .fab-mode {
            position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px;
            border-radius: 50%; background: var(--cyan); border: none; cursor: pointer; z-index: 1001;
        }
    </style>
</head>
<body id="appBody">

    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:8px;">
            <a href="dashboard.html" style="color:var(--text-color); font-size:1.1rem;"><i class="fas fa-arrow-right"></i></a>
            <div style="font-size: 1.1rem; font-weight: 900; color: var(--cyan);">NABD AUST</div>
        </div>
        
        <div class="nav-controls">
            <div id="adminPanel" style="display:none; align-items: center; gap: 10px;">
                <a href="requests.html" style="position: relative; color: var(--text-color); font-size: 1.1rem;">
                    <i class="fas fa-bell"></i>
                    <span id="reqCount" style="display:none; position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; font-size: 0.55rem; padding: 2px 5px; border-radius: 50%;">0</span>
                </a>
                <button onclick="addNewItem()" class="btn-nav btn-add">إضافة</button>
            </div>
            <button onclick="studentShare()" class="btn-nav btn-share">شارك</button>
        </div>
    </nav>

    <div class="filter-section">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="smartSearch" class="search-input" placeholder="ابحث مادة، دكتور..." onkeyup="runFilter()">
        </div>

        <select id="f_fac" class="m-select" onchange="runFilter()">
            <option value="الكل">جميع الكليات</option>
            <option value="كلية الهندسة المعلوماتية">المعلوماتية</option>
            <option value="كلية الهندسة المعمارية">المعمارية</option>
            <option value="كلية الهندسة الكيميائية">الكيمياء</option>
            <option value="كلية الهندسة البترولية">البترول</option>
            <option value="كلية طب الأسنان">الأسنان</option>
            <option value="كلية الصيدلة">الصيدلة</option>
            <option value="كلية الترجمة واللغات">اللغات</option>
        </select>
        <select id="f_year" class="m-select" onchange="runFilter()">
            <option value="الكل">السنوات</option>
            <option value="سنة أولى">1</option><option value="سنة ثانية">2</option>
            <option value="سنة ثالثة">3</option><option value="سنة رابعة">4</option>
            <option value="سنة خامسة">5</option>
        </select>
        <select id="f_type" class="m-select" onchange="runFilter()">
            <option value="الكل">النوع</option>
            <option value="نظري">نظري</option>
            <option value="عملي">عملي</option>
        </select>
    </div>

    <div class="grid" id="mainGrid"></div>

    <button class="fab-mode" onclick="document.getElementById('appBody').classList.toggle('light-mode')"><i class="fas fa-adjust"></i></button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let libraryData = [];

    const admins = [
        { name: "shahed mamdoh alkhald", id: "20241600060", key: "shjkshjk" },
        { name: "Deaa amar malaika", id: "20241600086", key: "shahed2006" }
    ];

    const currentUser = (localStorage.getItem("userName") || "").trim().toLowerCase();
    const currentID = (localStorage.getItem("universityID") || "").trim();
    const currentKey = (localStorage.getItem("securityKey") || "").trim();

    function isAuthorized() {
        return admins.some(admin => 
            admin.name.toLowerCase() === currentUser && 
            admin.id === currentID && 
            admin.key === currentKey
        );
    }

    function startApp() {
        if (isAuthorized()) {
            document.getElementById('adminPanel').style.display = 'flex';
            watchRequests();
        }
        
        db.ref('official_library/').on('value', (snap) => {
            const val = snap.val();
            libraryData = val ? Object.keys(val).map(k => ({...val[k], id: k})) : [];
            runFilter();
        });
    }

    function watchRequests() {
        db.ref('suggestions/').on('value', (snap) => {
            const count = snap.numChildren();
            const badge = document.getElementById('reqCount');
            if (badge) {
                badge.innerText = count;
                badge.style.display = count > 0 ? 'block' : 'none';
            }
        });
    }

    function runFilter() {
        const fac = document.getElementById('f_fac').value;
        const yea = document.getElementById('f_year').value;
        const typ = document.getElementById('f_type').value;
        const query = document.getElementById('smartSearch').value.toLowerCase();
        const container = document.getElementById('mainGrid');
        container.innerHTML = "";
        
        let list = libraryData;
        if(fac !== 'الكل') list = list.filter(i => i.category === fac);
        if(yea !== 'الكل') list = list.filter(i => i.year === yea);
        if(typ !== 'الكل') list = list.filter(i => i.type === typ);

        if(query !== "") {
            list = list.filter(i => 
                (i.title && i.title.toLowerCase().includes(query)) || 
                (i.doctor && i.doctor.toLowerCase().includes(query))
            );
        }

        const hasAdminAccess = isAuthorized();

        list.reverse().forEach(item => {
            const badgeClass = item.type === 'عملي' ? 'practical' : 'theory';
            container.innerHTML += `
                <div class="card">
                    <div class="badge ${badgeClass}">${item.type || 'نظري'}</div>
                    
                    <div class="admin-tools" style="${hasAdminAccess ? 'display:flex' : 'display:none'}">
                        <i class="fas fa-edit edit-icon" onclick="editItem('${item.id}')"></i>
                        <i class="fas fa-trash del-icon" onclick="deleteItem('${item.id}')"></i>
                    </div>

                    <div onclick="handleView('${item.id}', '${item.url}', '${item.title}')" style="cursor:pointer;">
                        <h3 style="margin:25px 0 3px 0; font-size:0.85rem; line-height:1.2; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">${item.title}</h3>
                        <div class="doc-name">د. ${item.doctor || 'غير محدد'}</div>
                        <span class="info-tag"><i class="fas fa-university"></i> ${item.category}</span>
                        <span class="info-tag"><i class="fas fa-calendar-alt"></i> ${item.year}</span>
                        
                        <div class="stats-bar">
                            <span><i class="fas fa-eye" style="color:var(--cyan)"></i> ${item.views || 0}</span>
                            <span><i class="fas fa-download" style="color:#10ac84"></i> ${item.downloads || 0}</span>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-card-main" onclick="handleView('${item.id}', '${item.url}', '${item.title}')">عرض</button>
                        <a href="${item.url}" target="_blank" class="btn-card-dl" onclick="handleDownload('${item.id}')">
                            <i class="fas fa-cloud-download-alt"></i>
                        </a>
                    </div>
                </div>`;
        });
    }

    function handleView(id, url, title) {
        db.ref('official_library/' + id + '/views').transaction(c => (c || 0) + 1);
        
        let finalUrl = url;
        // التعامل مع روابط Archive.org
        if(url.includes('archive.org/details/')) {
            finalUrl = url.replace('/details/', '/embed/');
        } 
        // التعامل مع روابط Google Drive
        else if(url.includes('drive.google.com')) {
            finalUrl = url.replace('/view?usp=sharing', '/preview').replace('/view', '/preview');
        }

        Swal.fire({
            title: title,
            html: `<div style="width:100%; height:450px; border-radius:12px; overflow:hidden; background:#000;">
                    <iframe src="${finalUrl}" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
                   </div>`,
            width: '95%',
            background: '#0f172a',
            color: '#fff',
            showCloseButton: true,
            showConfirmButton: false
        });
    }

    function handleDownload(id) {
        db.ref('official_library/' + id + '/downloads').transaction(c => (c || 0) + 1);
    }

    function addNewItem() {
        if (!isAuthorized()) return;
        showItemForm('إضافة محاضرة جديدة', {}, (data) => {
            db.ref('official_library/').push(data);
        });
    }

    function editItem(id) {
        if (!isAuthorized()) return;
        const item = libraryData.find(i => i.id === id);
        showItemForm('تعديل بيانات المحاضرة', item, (data) => {
            db.ref('official_library/' + id).update(data);
            Swal.fire({ icon: 'success', title: 'تم التعديل بنجاح', background: '#0f172a', color: '#fff' });
        });
    }

    function showItemForm(title, item, callback) {
        Swal.fire({
            title: title,
            background: '#0f172a', color: '#fff',
            html: `
                <input id="in-t" class="swal2-input" placeholder="اسم المادة" value="${item.title || ''}">
                <input id="in-d" class="swal2-input" placeholder="اسم الدكتور" value="${item.doctor || ''}">
                <input id="in-u" class="swal2-input" placeholder="رابط الملف" value="${item.url || ''}">
                <select id="in-c" class="swal2-input">
                    <option value="كلية الهندسة المعلوماتية" ${item.category === 'كلية الهندسة المعلوماتية' ? 'selected' : ''}>الهندسة المعلوماتية</option>
                    <option value="كلية الهندسة المعمارية" ${item.category === 'كلية الهندسة المعمارية' ? 'selected' : ''}>الهندسة المعمارية</option>
                    <option value="كلية الهندسة الكيميائية" ${item.category === 'كلية الهندسة الكيميائية' ? 'selected' : ''}>الهندسة الكيميائية</option>
                    <option value="كلية الهندسة البترولية" ${item.category === 'كلية الهندسة البترولية' ? 'selected' : ''}>الهندسة البترولية</option>
                    <option value="كلية طب الأسنان" ${item.category === 'كلية طب الأسنان' ? 'selected' : ''}>طب الأسنان</option>
                    <option value="كلية الصيدلة" ${item.category === 'كلية الصيدلة' ? 'selected' : ''}>الصيدلة</option>
                    <option value="كلية الترجمة واللغات" ${item.category === 'كلية الترجمة واللغات' ? 'selected' : ''}>الترجمة واللغات</option>
                </select>
                <select id="in-y" class="swal2-input">
                    <option value="سنة أولى" ${item.year === 'سنة أولى' ? 'selected' : ''}>سنة أولى</option>
                    <option value="سنة ثانية" ${item.year === 'سنة ثانية' ? 'selected' : ''}>سنة ثانية</option>
                    <option value="سنة ثالثة" ${item.year === 'سنة ثالثة' ? 'selected' : ''}>سنة ثالثة</option>
                    <option value="سنة رابعة" ${item.year === 'سنة رابعة' ? 'selected' : ''}>سنة رابعة</option>
                    <option value="سنة خامسة" ${item.year === 'سنة خامسة' ? 'selected' : ''}>سنة خامسة</option>
                </select>
                <select id="in-tp" class="swal2-input">
                    <option value="نظري" ${item.type === 'نظري' ? 'selected' : ''}>نظري</option>
                    <option value="عملي" ${item.type === 'عملي' ? 'selected' : ''}>عملي</option>
                </select>`,
            preConfirm: () => ({
                title: document.getElementById('in-t').value,
                doctor: document.getElementById('in-d').value,
                url: document.getElementById('in-u').value,
                category: document.getElementById('in-c').value,
                year: document.getElementById('in-y').value,
                type: document.getElementById('in-tp').value,
                views: item.views || 0,
                downloads: item.downloads || 0
            })
        }).then(r => { if(r.isConfirmed) callback(r.value); });
    }

    function studentShare() {
        Swal.fire({
            title: 'مساهمة الطلاب',
            text: 'أدخل رابط الملف لمراجعته من قبل الإدارة',
            input: 'url', inputPlaceholder: 'رابط الملف هنا',
            showCancelButton: true, confirmButtonText: 'إرسال',
            background: '#0f172a', color: '#fff'
        }).then(r => {
            if(r.isConfirmed && r.value) {
                db.ref('suggestions/').push({ url: r.value, sender: currentUser || 'مجهول', date: new Date().toLocaleString() });
                Swal.fire('تم الإرسال', 'شكراً لمساهمتك! سيتم مراجعة الملف ونشره.', 'success');
            }
        });
    }

    function deleteItem(id) {
        if (!isAuthorized()) return;
        Swal.fire({ 
            title: 'حذف المحاضرة؟', 
            text: "لا يمكن التراجع عن هذه الخطوة!",
            icon: 'warning', 
            showCancelButton: true, 
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'نعم، حذف',
            background: '#0f172a', color: '#fff' 
        }).then(r => {
            if(r.isConfirmed) db.ref('official_library/'+id).remove();
        });
    }

    window.onload = startApp;
</script>
</body>
</html>
