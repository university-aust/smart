<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة نبض AUST | Shahd Al-Khaled</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --cyan: #00d4ff;
            --bg-overlay: rgba(2, 6, 23, 0.7);
            --card-bg: rgba(255, 255, 255, 0.08); 
            --text-color: #ffffff;
            --nav-bg: rgba(2, 6, 23, 0.95);
            --theory: #ff9f43;
            --practical: #10ac84;
            --summary: #a29bfe;
        }

        body.light-mode {
            --bg-overlay: rgba(241, 245, 249, 0.85);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-color: #1e293b;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-overlay) url('67260.jpg') no-repeat center center fixed;
            background-size: cover; background-blend-mode: overlay;
            color: var(--text-color); font-family: 'Segoe UI', sans-serif; transition: 0.3s;
        }

        /* شريط التنقل */
        .navbar {
            backdrop-filter: blur(20px); background: var(--nav-bg);
            padding: 10px 4%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--cyan); position: sticky; top: 0; z-index: 1000;
        }

        /* قسم التبويب السريع (للملخصات) */
        .quick-tabs {
            display: flex; gap: 10px; padding: 10px 4%; justify-content: center;
            background: rgba(0,0,0,0.1);
        }
        .tab-btn {
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--cyan);
            background: transparent; color: var(--cyan); font-weight: bold; cursor: pointer;
            font-size: 0.8rem; transition: 0.3s;
        }
        .tab-btn.active { background: var(--cyan); color: #000; }

        .filter-section {
            padding: 10px 4%; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px;
        }

        .search-wrapper { position: relative; grid-column: 1 / -1; }
        .search-input {
            width: 100%; padding: 12px 40px 12px 12px; border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(15, 23, 42, 0.8);
            color: white; outline: none; font-size: 0.9rem; box-sizing: border-box;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; padding: 15px 3%; 
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        }

        /* هيكل التحميل Skeleton */
        .skeleton {
            height: 200px; background: rgba(255,255,255,0.05); border-radius: 18px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .card {
            background: var(--card-bg); border-radius: 18px; padding: 15px;
            position: relative; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            min-height: 180px; display: flex; flex-direction: column; justify-content: space-between;
        }

        .badge {
            position: absolute; top: 8px; left: 8px;
            padding: 2px 8px; border-radius: 10px; font-size: 0.55rem; font-weight: bold; color: #fff;
        }
        .theory { background: var(--theory); }
        .practical { background: var(--practical); }
        .summary { background: var(--summary); box-shadow: 0 0 10px var(--summary); }

        .btn-download-full {
            width: 100%; padding: 12px; border-radius: 10px; 
            background: var(--cyan); color: #000; text-align: center; 
            text-decoration: none; font-weight: 900; font-size: 0.85rem;
            margin-top: 12px; border: none; cursor: pointer;
        }

        .admin-tools { position: absolute; top: 8px; right: 8px; display: flex; gap: 10px; }
    </style>
</head>
<body id="appBody">

    <nav class="navbar">
        <div style="display:flex; align-items:center; gap:8px;">
            <a href="dashboard.html" style="color:var(--text-color);"><i class="fas fa-arrow-right"></i></a>
            <div style="font-weight: 900; color: var(--cyan);">NABD AUST</div>
        </div>
        <div id="adminPanel" style="display:none; gap: 10px;">
            <button onclick="addNewItem()" class="tab-btn active" style="border-radius: 10px;">إضافة +</button>
        </div>
    </nav>

    <div class="quick-tabs">
        <button class="tab-btn active" onclick="filterType('الكل', this)">الكل</button>
        <button class="tab-btn" onclick="filterType('نظري', this)">محاضرات</button>
        <button class="tab-btn" onclick="filterType('ملخص', this)">ملخصات ✨</button>
    </div>

    <div class="filter-section">
        <div class="search-wrapper">
            <input type="text" id="smartSearch" class="search-input" placeholder="بحث سريع..." onkeyup="runFilter()">
        </div>
        <select id="f_fac" class="m-select" onchange="runFilter()">
            <option value="الكل">جميع الكليات</option>
            <option value="كلية الهندسة المعلوماتية">المعلوماتية</option>
            <option value="كلية الهندسة المعمارية">المعمارية</option>
            <option value="كلية طب الأسنان">الأسنان</option>
            <option value="كلية الصيدلة">الصيدلة</option>
        </select>
        <select id="f_year" class="m-select" onchange="runFilter()">
            <option value="الكل">كل السنين</option>
            <option value="سنة أولى">1</option><option value="سنة ثانية">2</option>
            <option value="سنة ثالثة">3</option><option value="سنة رابعة">4</option>
            <option value="سنة خامسة">5</option>
        </select>
    </div>

    <div class="grid" id="mainGrid">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>

<script>
    // الإعدادات (نفس بياناتك السابقة)
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let libraryData = [];
    let selectedType = 'الكل';

    const admins = [{ id: "20241600060", key: "shjkshjk" }, { id: "20241600086", key: "shahed2006" }];
    const currentID = (localStorage.getItem("universityID") || "").trim();
    const currentKey = (localStorage.getItem("securityKey") || "").trim();

    function isAuthorized() { return admins.some(a => a.id === currentID && a.key === currentKey); }

    function startApp() {
        if (isAuthorized()) document.getElementById('adminPanel').style.display = 'flex';
        
        db.ref('official_library/').on('value', (snap) => {
            const val = snap.val();
            libraryData = val ? Object.keys(val).map(k => ({...val[k], id: k})) : [];
            runFilter();
        });
    }

    function filterType(type, btn) {
        selectedType = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        runFilter();
    }

    function runFilter() {
        const fac = document.getElementById('f_fac').value;
        const yea = document.getElementById('f_year').value;
        const query = document.getElementById('smartSearch').value.toLowerCase();
        const container = document.getElementById('mainGrid');
        
        let list = libraryData;
        if(fac !== 'الكل') list = list.filter(i => i.category === fac);
        if(yea !== 'الكل') list = list.filter(i => i.year === yea);
        if(selectedType !== 'الكل') list = list.filter(i => i.type === selectedType);
        if(query !== "") list = list.filter(i => i.title.toLowerCase().includes(query) || i.doctor.toLowerCase().includes(query));

        container.innerHTML = "";
        if(list.length === 0) {
            container.innerHTML = "<p style='grid-column:1/-1; text-align:center; opacity:0.5;'>لا توجد ملفات حالياً...</p>";
            return;
        }

        list.reverse().forEach(item => {
            let bClass = item.type === 'عملي' ? 'practical' : (item.type === 'ملخص' ? 'summary' : 'theory');
            container.innerHTML += `
                <div class="card">
                    <div class="badge ${bClass}">${item.type || 'نظري'}</div>
                    <div class="admin-tools" style="${isAuthorized() ? 'display:flex' : 'display:none'}">
                        <i class="fas fa-edit" style="color:var(--cyan)" onclick="editItem('${item.id}')"></i>
                        <i class="fas fa-trash" style="color:#ff4d4d" onclick="deleteItem('${item.id}')"></i>
                    </div>
                    <div>
                        <h3 style="margin:25px 0 5px 0; font-size:0.85rem;">${item.title}</h3>
                        <div style="font-size:0.7rem; color:var(--cyan)">د. ${item.doctor}</div>
                        <div style="font-size:0.6rem; opacity:0.7; margin-top:5px;">
                            <i class="fas fa-download"></i> مرات التحميل: ${item.downloads || 0}
                        </div>
                    </div>
                    <button class="btn-download-full" onclick="fastOpen('${item.id}', '${item.url}')">
                        تحميل ${item.type === 'ملخص' ? 'الملخص' : 'المحاضرة'}
                    </button>
                </div>`;
        });
    }

    function fastOpen(id, url) {
        // تحديث العداد في الخلفية دون انتظار
        db.ref('official_library/' + id + '/downloads').transaction(c => (c || 0) + 1);
        // فتح فوري للملف
        const win = window.open(url, '_blank', 'noopener,noreferrer');
        if (win) win.focus();
    }

    // دوال الإدارة (إضافة، حذف، تعديل) تبقى كما هي برمجياً
    function addNewItem() {
        showItemForm('إضافة مادة', {}, (data) => db.ref('official_library/').push(data));
    }

    function editItem(id) {
        const item = libraryData.find(i => i.id === id);
        showItemForm('تعديل', item, (data) => db.ref('official_library/' + id).update(data));
    }

    function showItemForm(title, item, callback) {
        Swal.fire({
            title: title, background: '#0f172a', color: '#fff',
            html: `
                <input id="in-t" class="swal2-input" placeholder="العنوان" value="${item.title || ''}">
                <input id="in-d" class="swal2-input" placeholder="الدكتور" value="${item.doctor || ''}">
                <input id="in-u" class="swal2-input" placeholder="الرابط" value="${item.url || ''}">
                <select id="in-c" class="swal2-input">
                    <option value="كلية الهندسة المعلوماتية" ${item.category === 'كلية الهندسة المعلوماتية' ? 'selected' : ''}>المعلوماتية</option>
                    <option value="كلية الهندسة المعمارية" ${item.category === 'كلية الهندسة المعمارية' ? 'selected' : ''}>المعمارية</option>
                </select>
                <select id="in-y" class="swal2-input">
                    <option value="سنة أولى" ${item.year === 'سنة أولى' ? 'selected' : ''}>سنة أولى</option>
                    <option value="سنة ثانية" ${item.year === 'سنة ثانية' ? 'selected' : ''}>سنة ثانية</option>
                </select>
                <select id="in-tp" class="swal2-input">
                    <option value="نظري" ${item.type === 'نظري' ? 'selected' : ''}>نظري</option>
                    <option value="عملي" ${item.type === 'عملي' ? 'selected' : ''}>عملي</option>
                    <option value="ملخص" ${item.type === 'ملخص' ? 'selected' : ''}>ملخص</option>
                </select>`,
            preConfirm: () => ({
                title: document.getElementById('in-t').value,
                doctor: document.getElementById('in-d').value,
                url: document.getElementById('in-u').value,
                category: document.getElementById('in-c').value,
                year: document.getElementById('in-y').value,
                type: document.getElementById('in-tp').value,
                downloads: item.downloads || 0
            })
        }).then(r => { if(r.isConfirmed) callback(r.value); });
    }

    function deleteItem(id) {
        Swal.fire({ title: 'حذف؟', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ff4d4d', background: '#0f172a', color: '#fff' })
        .then(r => { if(r.isConfirmed) db.ref('official_library/'+id).remove(); });
    }

    window.onload = startApp;
</script>
</body>
</html>
