<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الملف الشخصي | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --gold: #00d4ff; --gold-glow: rgba(0, 212, 255, 0.5);
            --navy-deep: #1e293b; --glass: rgba(10, 15, 30, 0.85); 
        }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(3, 7, 18, 0.6), rgba(3, 7, 18, 0.6)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white;
            padding: 15px;
        }
        .profile-container { width: 100%; max-width: 500px; } /* تم تضييق الحاوية لتناسب الموبايل أكثر */
        .profile-card {
            background: var(--glass); padding: 25px; border-radius: 30px;
            backdrop-filter: blur(25px); border: 1px solid rgba(0, 212, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }
        @media (max-width: 600px) {
            .profile-card { padding: 20px 15px; border-radius: 25px; }
            .brand-h1 { font-size: 1.6rem; }
        }
        .avatar {
            width: 90px; height: 90px; background: linear-gradient(135deg, var(--gold), var(--navy-deep));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 38px; margin: 0 auto 15px; border: 3px solid var(--gold); box-shadow: 0 0 20px var(--gold-glow);
            position: relative; color: white;
        }
        .unread-badge {
            position: absolute; top: 0; right: 0; background: #ff4d4d; color: white;
            font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold;
            box-shadow: 0 0 10px #ff4d4d; border: 2px solid var(--navy-deep);
        }
        .stat-box {
            background: rgba(30, 41, 59, 0.7); padding: 10px 25px; border-radius: 15px;
            border: 1px solid var(--gold); display: inline-block; margin: 10px;
        }
        .chats-container {
            margin-top: 15px; text-align: right; max-height: 280px; overflow-y: auto;
            padding: 5px; border-radius: 15px;
        }
        .chat-item-card {
            display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 18px; margin-bottom: 10px; cursor: pointer; 
            border-right: 4px solid var(--gold); transition: 0.3s; border-left: 1px solid rgba(255,255,255,0.1);
        }
        .chat-item-card.has-new { border-right-color: #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        
        .activity-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 15px; 
            margin-bottom: 8px; border-right: 3px solid var(--gold); gap: 10px;
        }
        .nav-btn {
            background: var(--glass); border: 1px solid var(--gold); color: var(--gold);
            padding: 8px 18px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.85rem;
        }
        .del-btn { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; border: 1px solid #ff4d4d; padding: 5px 12px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; }
        .edit-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 4px 12px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; margin-top: 5px; }
        
        /* تحسين السكرول بار */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="profile-container">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
            <a href="dashboard.html" class="nav-btn"><i class="fas fa-home"></i> الرئيسية</a>
            <span id="userStatus" style="font-size: 0.7rem; color: #00ff00; background: rgba(0,255,0,0.1); padding: 4px 10px; border-radius: 20px;">متصل الآن</span>
        </div>

        <div class="profile-card">
            <div id="avatar" class="avatar">👤</div>
            <h2 id="userNameDisplay" style="margin: 5px 0; font-size: 1.4rem;">...</h2>
            <p id="userMajorDisplay" style="color: var(--gold); margin-bottom: 5px; font-size: 0.85rem; opacity: 0.9;"></p>
            <p id="userIDDisplay" style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px;"></p>
            <button class="edit-btn" onclick="editMajor()">🛠️ تعديل الاختصاص</button>
            
            <div style="margin-top: 10px;">
                <div class="stat-box">
                    <span id="itemsCount" style="font-size: 1.2rem; font-weight: bold;">0</span><br><small style="font-size: 0.7rem;">منشوراتي</small>
                </div>
            </div>

            <div style="text-align: right; margin-top: 25px;">
                <h3 style="color: var(--gold); font-size: 1rem; margin-bottom: 10px;"><i class="fas fa-comments"></i> الرسائل الأخيرة</h3>
                <div id="myChatsList" class="chats-container">
                    <p style="text-align:center; opacity:0.5; font-size: 0.75rem; padding: 20px;">جاري المزامنة...</p>
                </div>
            </div>

            <div style="text-align: right; margin-top: 25px;">
                <h3 style="color: var(--gold); font-size: 1rem; margin-bottom: 10px;"><i class="fas fa-box"></i> إعلاناتي في المعرض</h3>
                <div id="myActivityList" style="max-height: 200px; overflow-y: auto;"></div>
            </div>

            <button onclick="logout()" style="background:rgba(255,77,77,0.1); border:1px solid #ff4d4d; color:#ff4d4d; padding:12px; width:100%; border-radius:18px; margin-top:30px; cursor:pointer; font-weight:bold; font-size: 0.9rem;">تسجيل الخروج</button>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // جلب البيانات الأساسية من التخزين المحلي
    const currentName = localStorage.getItem("userName") || "مستخدم";
    const currentID = localStorage.getItem("userID") || "0000";

    window.onload = function() {
        if(!localStorage.getItem("userID")) window.location.href = "index.html";
        refreshProfile();
    };

    function refreshProfile() {
        document.getElementById("userNameDisplay").innerText = currentName;
        document.getElementById("userIDDisplay").innerText = "ID: " + currentID;
        document.getElementById("avatar").innerText = currentName.charAt(0).toUpperCase();
        
        // جلب الاختصاص من قاعدة البيانات ليكون محدثاً دائماً
        database.ref('users/' + currentID).once('value', (snap) => {
            const data = snap.val();
            const major = (data && data.major) ? data.major : (localStorage.getItem("userMajor") || "هندسة البرمجيات");
            document.getElementById("userMajorDisplay").innerText = major;
            localStorage.setItem("userMajor", major);
        });

        renderMyItems();
        loadMyChats(); 
    }

    async function editMajor() {
        const { value: newMajor } = await Swal.fire({
            title: 'تعديل الاختصاص',
            input: 'text',
            inputValue: localStorage.getItem("userMajor"),
            confirmButtonColor: '#00d4ff',
            showCancelButton: true,
            background: '#0a0f1e',
            color: '#fff'
        });

        if (newMajor) {
            database.ref('users/' + currentID).update({ major: newMajor });
            localStorage.setItem("userMajor", newMajor);
            refreshProfile();
        }
    }

    function renderMyItems() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById("myActivityList");
            if (!data) {
                document.getElementById("itemsCount").innerText = "0";
                list.innerHTML = "<p style='text-align:center; opacity:0.5; font-size: 0.75rem;'>لا يوجد إعلانات.</p>";
                return;
            }
            // الفلترة باستخدام userID لضمان الدقة
            const myItemsKeys = Object.keys(data).filter(key => data[key].ownerID === currentID).reverse();
            document.getElementById("itemsCount").innerText = myItemsKeys.length;
            
            list.innerHTML = myItemsKeys.length === 0 ? 
                "<p style='text-align:center; opacity:0.5; font-size: 0.75rem;'>لم تنشر شيئاً بعد.</p>" : 
                myItemsKeys.map(key => `
                <div class="activity-item">
                    <span style="font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        ${data[key].isSOS ? '🆘' : '📦'} ${data[key].name}
                    </span>
                    <button class="del-btn" onclick="deleteMyItem('${key}')">حذف</button>
                </div>
            `).join('');
        });
    }

    function deleteMyItem(key) {
        Swal.fire({
            title: 'حذف الإعلان؟',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'نعم، حذف',
            background: '#0a0f1e',
            color: '#fff'
        }).then((res) => { if (res.isConfirmed) database.ref('globalMarket/' + key).remove(); });
    }

    function loadMyChats() {
        const chatListDiv = document.getElementById("myChatsList");

        database.ref('chats').on('value', (snapshot) => {
            const allChats = snapshot.val();
            chatListDiv.innerHTML = "";
            let chatArray = [];

            if (allChats) {
                Object.keys(allChats).forEach(chatId => {
                    // البحث في الغرف التي تحتوي على الرقم الجامعي الحالي
                    if (chatId.includes(currentID)) {
                        const messages = allChats[chatId];
                        const msgKeys = Object.keys(messages);
                        const lastMsg = messages[msgKeys[msgKeys.length - 1]];
                        
                        chatArray.push({
                            chatId: chatId,
                            lastMsg: lastMsg,
                            unread: Object.values(messages).filter(m => m.senderID !== currentID && !m.seen).length
                        });
                    }
                });

                // ترتيب حسب الأحدث
                chatArray.sort((a,b) => b.lastMsg.timestamp - a.lastMsg.timestamp);

                chatArray.forEach(chat => {
                    // استخراج اسم الطرف الآخر من آخر رسالة
                    const isMeLastSender = chat.lastMsg.senderID === currentID;
                    const displayUser = isMeLastSender ? "محادثة" : chat.lastMsg.sender;
                    const otherID = chat.chatId.split('_').find(id => id !== currentID);

                    chatListDiv.innerHTML += `
                        <div class="chat-item-card ${chat.unread > 0 ? 'has-new' : ''}" 
                             onclick="window.location.href='chat.html?to=${encodeURIComponent(displayUser)}&toID=${otherID}'">
                            <div class="avatar" style="width:45px; height:45px; font-size:20px; margin:0; flex-shrink:0;">
                                ${displayUser.charAt(0).toUpperCase()}
                                ${chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : ''}
                            </div>
                            <div style="flex:1; min-width:0;">
                                <div style="font-weight:bold; color:var(--gold); font-size:0.9rem;">${displayUser}</div>
                                <div style="font-size:0.75rem; opacity:0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                    ${isMeLastSender ? 'أنت: ' : ''}${chat.lastMsg.text}
                                </div>
                            </div>
                            <div style="font-size:0.6rem; opacity:0.5;">${chat.lastMsg.time}</div>
                        </div>
                    `;
                });
            }
            if (chatArray.length === 0) chatListDiv.innerHTML = "<p style='text-align:center; opacity:0.4; font-size:0.75rem; padding: 20px;'>لا توجد محادثات نشطة</p>";
        });
    }

    function logout() { 
        localStorage.clear();
        window.location.href = "index.html"; 
    }
</script>
</body>
</html>
