<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #ffcf4d; --dark-bg: #050a18; --glass: rgba(255, 255, 255, 0.05); }
        body {
            background: linear-gradient(rgba(5, 10, 24, 0.9), rgba(5, 10, 24, 0.9)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px;
        }

        .profile-header {
            background: linear-gradient(to bottom, rgba(0, 212, 255, 0.2), transparent);
            padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--glass);
        }

        .avatar-main {
            width: 100px; height: 100px; border-radius: 50%; background: var(--gold);
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: #000; box-shadow: 0 0 20px rgba(255, 207, 77, 0.4);
            border: 4px solid rgba(255,255,255,0.1);
        }

        .stats-container {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px;
        }

        .stat-card {
            background: var(--glass); padding: 15px; border-radius: 15px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }

        .section-title { padding: 0 20px; margin-top: 20px; font-size: 1.1rem; color: var(--gold); display: flex; align-items: center; gap: 10px; }

        .chats-list { padding: 10px 20px; }

        .chat-item-card {
            background: var(--glass); margin-bottom: 12px; padding: 15px;
            border-radius: 18px; display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
            cursor: pointer; position: relative; overflow: hidden;
        }

        .chat-item-card:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.02); }
        .chat-item-card.has-new::before {
            content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 4px; background: #00d4ff;
        }

        .unread-badge {
            background: #ff4d4d; color: white; min-width: 18px; height: 18px;
            border-radius: 10px; font-size: 10px; display: flex; align-items: center;
            justify-content: center; position: absolute; top: -5px; right: -5px; border: 2px solid var(--dark-bg);
        }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: rgba(10, 15, 30, 0.95);
            display: flex; justify-content: space-around; padding: 15px 0;
            backdrop-filter: blur(20px); border-top: 1px solid var(--glass); z-index: 1000;
        }

        .nav-item { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 1.2rem; transition: 0.3s; }
        .nav-item.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .logout-btn { color: #ff4d4d; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="avatar-main" id="userInitial">S</div>
        <h2 id="profileName" style="margin: 5px 0 0; font-size: 1.4rem;">جاري التحميل...</h2>
        <p id="profileID" style="opacity: 0.6; font-size: 0.8rem; margin: 5px 0;"></p>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div style="font-size: 1.2rem; color: var(--gold);" id="msgCount">0</div>
            <div style="font-size: 0.7rem; opacity: 0.7;">رسائل نشطة</div>
        </div>
        <div class="stat-card">
            <div style="font-size: 1.2rem; color: var(--gold);" id="toolCount">0</div>
            <div style="font-size: 0.7rem; opacity: 0.7;">أدواتي المعروضة</div>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-comments"></i> آخر المحادثات</div>
    <div id="myChatsList" class="chats-list">
        </div>

    <div class="nav-bar">
        <a href="market.html" class="nav-item"><i class="fas fa-store"></i></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i></a>
        <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const currentID = localStorage.getItem("universityID");
    const currentName = localStorage.getItem("userName");

    // التحقق من الجلسة للأمان
    if (!currentID) {
        window.location.href = "index.html";
    }

    function initProfile() {
        document.getElementById('profileName').innerText = currentName;
        document.getElementById('profileID').innerText = "ID: " + currentID;
        document.getElementById('userInitial').innerText = currentName.charAt(0).toUpperCase();
        
        loadMyChats();
        countMyTools();
    }

    function loadMyChats() {
        const chatListDiv = document.getElementById("myChatsList");

        database.ref('chats').on('value', (snapshot) => {
            const allChats = snapshot.val();
            chatListDiv.innerHTML = "";
            let chatArray = [];
            let totalActiveChats = 0;

            if (allChats) {
                Object.keys(allChats).forEach(chatKey => {
                    // التحقق إذا كان رقمي الجامعي طرفاً في المحادثة
                    if (chatKey.includes(currentID)) {
                        const messages = allChats[chatKey];
                        const keys = Object.keys(messages);
                        const lastMsg = messages[keys[keys.length - 1]];
                        
                        // تحديد من هو الشخص الآخر
                        let otherName = (lastMsg.senderID === currentID) ? lastMsg.receiverName : lastMsg.sender;
                        let otherID = (lastMsg.senderID === currentID) ? lastMsg.receiverID : lastMsg.senderID;

                        chatArray.push({
                            id: chatKey,
                            otherName: otherName || "زميل",
                            otherID: otherID,
                            text: lastMsg.text,
                            time: lastMsg.time,
                            timestamp: lastMsg.timestamp,
                            item: lastMsg.item,
                            unread: Object.values(messages).filter(m => m.senderID !== currentID && !m.seen).length
                        });
                        totalActiveChats++;
                    }
                });

                // ترتيب المحادثات: الأحدث أولاً
                chatArray.sort((a, b) => b.timestamp - a.timestamp);

                chatArray.forEach(chat => {
                    chatListDiv.innerHTML += `
                        <div class="chat-item-card ${chat.unread > 0 ? 'has-new' : ''}" 
                             onclick="window.location.href='chat.html?to=${encodeURIComponent(chat.otherName)}&toID=${chat.otherID}&item=${encodeURIComponent(chat.item || 'عام')}'">
                            <div class="avatar-main" style="width:45px; height:45px; margin:0; font-size:18px; position:relative;">
                                ${chat.otherName.charAt(0).toUpperCase()}
                                ${chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : ''}
                            </div>
                            <div style="flex:1; margin-right:12px; min-width:0;">
                                <div style="font-weight:bold; color:var(--gold); font-size:0.9rem;">${chat.otherName}</div>
                                <div style="font-size:0.75rem; opacity:0.6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                                    ${chat.text}
                                </div>
                            </div>
                            <div style="font-size:0.6rem; opacity:0.4;">${chat.time}</div>
                        </div>
                    `;
                });
            }

            document.getElementById('msgCount').innerText = totalActiveChats;
            if (chatArray.length === 0) {
                chatListDiv.innerHTML = "<p style='text-align:center; opacity:0.4; font-size:0.8rem;'>لا توجد محادثات نشطة</p>";
            }
        });
    }

    function countMyTools() {
        database.ref('globalMarket').once('value', (snap) => {
            const data = snap.val();
            let count = 0;
            if (data) {
                Object.values(data).forEach(item => {
                    if (item.ownerID === currentID) count++;
                });
            }
            document.getElementById('toolCount').innerText = count;
        });
    }

    function handleLogout() {
        Swal.fire({
            title: 'تسجيل الخروج؟',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'خروج',
            background: '#050a18',
            color: '#fff'
        }).then(r => {
            if (r.isConfirmed) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        });
    }

    window.onload = initProfile;
</script>
</body>
</html>
