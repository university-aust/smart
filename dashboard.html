<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pulse | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan: #00d4ff; 
            --cyan-glow: rgba(0, 212, 255, 0.5); 
            --navy-deep: #1e293b; 
            --glass: rgba(10, 15, 30, 0.85); 
            --input-bg: rgba(255, 255, 255, 0.95); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body { 
            min-height: 100vh; 
            background: #030712 url('67260.jpg') center/cover fixed no-repeat; 
            color: white; 
            overflow-x: hidden; 
        }

        /* شريط الأخبار المتحرك */
        .pulse-ticker { 
            background: rgba(30, 41, 59, 0.9); 
            backdrop-filter: blur(10px); 
            color: var(--cyan); 
            padding: 12px; 
            white-space: nowrap; 
            overflow: hidden; 
            border-bottom: 2px solid var(--cyan); 
            font-weight: bold; 
            box-shadow: 0 0 15px var(--cyan-glow); 
        }
        .ticker-content { display: inline-block; animation: marquee-rtl 25s linear infinite; }
        @keyframes marquee-rtl { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* الهيدر */
        .header-nav { 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--glass); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(0, 212, 255, 0.3); 
        }

        .profile-btn { 
            text-decoration: none; color: var(--cyan); 
            padding: 8px 18px; border-radius: 12px; 
            border: 2px solid var(--cyan); font-weight: bold; 
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .profile-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }

        /* الكروت */
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(0, 212, 255, 0.2); 
            border-radius: 30px; padding: 25px; 
            transition: 0.4s; display: flex; flex-direction: column; 
        }
        .card:hover { transform: translateY(-5px); border-color: var(--cyan); }

        h2 { color: var(--cyan); font-size: 1.2rem; margin-bottom: 15px; border-right: 4px solid var(--cyan); padding-right: 10px; }
        label { display: block; margin: 8px 0 4px; color: var(--cyan); font-size: 0.8rem; font-weight: bold; }
        
        select, input { 
            width: 100%; padding: 12px; margin-bottom: 10px; 
            border-radius: 10px; border: none; background: var(--input-bg); 
            color: #1e293b; font-size: 0.9rem; font-weight: bold; outline: none;
        }

        .btn-main { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; transition: 0.3s; 
            color: #fff; margin-top: 10px; 
        }
        .btn-main:active { transform: scale(0.98); }

        .footer { text-align: center; padding: 30px; background: rgba(0,0,0,0.8); margin-top: 40px; border-top: 1px solid var(--cyan); }

        @media (max-width: 600px) {
            .header-nav h1 { font-size: 1.2rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="pulse-ticker">
        <div class="ticker-content"> ✨ أهلاً بكِ في Smart Pulse | تم تأمين النظام بالكامل ونحن جاهزون لخدمة طلاب AUST 🚀 </div>
    </div>

    <nav class="header-nav">
        <h1>AUST <span style="color:var(--cyan)">Smart Pulse</span></h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <p style="font-size: 0.9rem;">مرحباً، <span id="userDisplayName" style="color:var(--cyan);">...</span></p>
            <a href="profile.html" class="profile-btn"><i class="fas fa-user-graduate"></i> الملف</a>
        </div>
    </nav>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 30px 5%;">
        
        <div class="card">
            <h2>📡 رادار المساعدة (SOS)</h2>
            <label>الكلية:</label>
            <select id="collegeSOS" onchange="updateSubjects()"></select>
            <label>السنة:</label>
            <select id="yearSOS" onchange="updateSubjects()">
                <option value="1">الأولى</option><option value="2">الثانية</option>
                <option value="3">الثالثة</option><option value="4">الرابعة</option>
                <option value="5">الخامسة</option>
            </select>
            <label>المادة:</label>
            <select id="subjectSelect"></select>
            <label>وصف المساعدة:</label>
            <input type="text" id="customSOS" placeholder="ما الذي تحتاجه؟">
            <button class="btn-main" style="background: #ff4d4d;" onclick="sendSOS()">إرسال نداء SOS 🆘</button>
            <button class="btn-main" style="background: #27ae60;" onclick="location.href='market.html'">دخول المعرض العام 🛒</button>
        </div>

        <div class="card">
            <h2>♻️ التبادل والمفقودات</h2>
            <label>نوع المنشور:</label>
            <select id="itemType">
                <option value="مبادلة">🔄 غرض للمبادلة</option>
                <option value="مفقود">🔍 مفقودات</option>
                <option value="موجود">📍 موجودات</option>
            </select>
            <label>الكلية:</label>
            <select id="itemCollege"></select>
            <label>اسم الغرض:</label>
            <input type="text" id="newToolName" placeholder="مثال: مسطرة، كتاب...">
            <button class="btn-main" style="background: var(--cyan); color: #000;" onclick="addNewTool()">نشر الآن ✅</button>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <button onclick="location.href='library.html'" style="background:#2980b9; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">📚 المكتبة</button>
                <button onclick="location.href='AI.html'" style="background:#16a085; color:white; border:none; padding:12px; border-radius:10px; font-weight:bold;">🤖 الذكاء</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p style="font-size: 0.8rem; opacity: 0.7;">حقوق النشر © 2026 - هندسة المعلوماتية AUST</p>
    </footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    const allAUSTSubjects = {
        it: { name: "💻 هندسة المعلوماتية", 1: ["البرمجة 1", "الفيزياء 1", "الرياضيات 1"], 2: ["خوارزميات 1", "OOP 1", "قواعد بيانات 1"], 3: ["هندسة برمجيات 1", "نظم تشغيل"], 4: ["شبكات", "ذكاء اصطناعي"], 5: ["مشروع تخرج"] },
        dent: { name: "🦷 طب الأسنان", 1: ["تشريح عام", "بيولوجيا"], 2: ["تعويضات ثابتة", "نسج"], 3: ["أدوية", "جراحة 1"] },
        pharm: { name: "💊 الصيدلة", 1: ["فيزياء طبية", "تشريح"], 2: ["صيدلانيات 1", "كيمياء تحليلية"] },
        arch: { name: "📐 العمارة", 1: ["رسم هندسي", "تصميم 1"], 2: ["تاريخ عمارة", "إنشاء مباني"] }
    };

    auth.onAuthStateChanged((user) => {
        if (user) {
            // جلب البيانات بأمان من DB وليس من localStorage فقط
            database.ref('users/' + user.uid).once('value').then(snap => {
                const data = snap.val();
                document.getElementById("userDisplayName").innerText = data ? data.fullName : "طالب";
            });
            initSelectors();
        } else {
            window.location.href = "login.html";
        }
    });

    function initSelectors() {
        const sosCol = document.getElementById('collegeSOS');
        const itemCol = document.getElementById('itemCollege');
        let options = "";
        for (let key in allAUSTSubjects) options += `<option value="${key}">${allAUSTSubjects[key].name}</option>`;
        sosCol.innerHTML = options;
        itemCol.innerHTML = `<option value="عام">عام</option>` + options;
        updateSubjects();
    }

    function updateSubjects() {
        const col = document.getElementById('collegeSOS').value;
        const year = document.getElementById('yearSOS').value;
        const subjects = (allAUSTSubjects[col] && allAUSTSubjects[col][year]) ? allAUSTSubjects[col][year] : ["عام"];
        document.getElementById('subjectSelect').innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function sendSOS() {
        const user = auth.currentUser;
        const exp = document.getElementById('customSOS').value.trim();
        if(!exp) return Swal.fire('تنبيه', 'اكتب ماذا تحتاج', 'warning');

        database.ref('globalMarket/').push({
            name: `🆘 SOS: ${document.getElementById('subjectSelect').value}`,
            explanation: exp,
            college: document.getElementById('collegeSOS').value,
            owner: document.getElementById("userDisplayName").innerText,
            ownerID: localStorage.getItem("universityID"), // للمظهر
            uid: user.uid, // الأمان الفعلي (للحذف والتعديل)
            isSOS: true,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            Swal.fire('تم الإرسال', '', 'success');
            document.getElementById('customSOS').value = "";
        });
    }

    function addNewTool() {
        const user = auth.currentUser;
        const name = document.getElementById('newToolName').value.trim();
        if(!name) return Swal.fire('تنبيه', 'اكتب اسم الغرض', 'warning');

        database.ref('globalMarket/').push({
            name: `${document.getElementById('itemType').value}: ${name}`,
            college: document.getElementById('itemCollege').value,
            owner: document.getElementById("userDisplayName").innerText,
            ownerID: localStorage.getItem("universityID"),
            uid: user.uid, // الأمان الفعلي
            isSOS: false,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            Swal.fire('تم النشر', '', 'success');
            document.getElementById('newToolName').value = "";
        });
    }
</script>
</body>
</html>
