<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pulse | لوحه التحكم </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --cyan: #00d4ff; --cyan-glow: rgba(0, 212, 255, 0.5); --navy-deep: #1e293b; --glass: rgba(10, 15, 30, 0.75); --input-bg: rgba(255, 255, 255, 0.95); }
        h2, label, .ticker-content, .profile-btn { text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { min-height: 100vh; background: #030712 url('67260.jpg') center/cover fixed no-repeat; color: white; overflow-x: hidden; }
        .pulse-ticker { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); color: var(--cyan); padding: 12px; white-space: nowrap; overflow: hidden; border-bottom: 2px solid var(--cyan); font-weight: bold; box-shadow: 0 0 15px var(--cyan-glow); }
        .ticker-content { display: inline-block; animation: marquee-rtl 25s linear infinite; }
        @keyframes marquee-rtl { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .header-nav { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--glass); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 212, 255, 0.3); flex-wrap: wrap; gap: 15px; }
        .nav-links { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .profile-container { position: relative; }
        .notification-dot { position: absolute; top: -5px; right: -5px; width: 14px; height: 14px; background: #ff4d4d; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 15px #ff4d4d; display: none; animation: pulse-red 1.5s infinite; z-index: 10; }
        @keyframes pulse-red { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        .profile-btn { text-decoration: none; color: var(--cyan); padding: 8px 18px; border-radius: 12px; border: 2px solid var(--cyan); transition: 0.3s; font-weight: bold; white-space: nowrap; }
        .profile-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }
        .card { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 35px; padding: 30px; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); border-color: var(--cyan); box-shadow: 0 10px 40px var(--cyan-glow); }
        h2 { color: var(--cyan); font-size: 1.3rem; margin-bottom: 20px; border-right: 5px solid var(--cyan); padding-right: 15px; }
        label { display: block; margin: 10px 0 5px; color: var(--cyan); font-size: 0.85rem; font-weight: bold; }
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: none; background: var(--input-bg); color: #1e293b; font-size: 0.95rem; outline: none; font-weight: 800; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; transition: 0.3s; background: linear-gradient(45deg, var(--cyan), var(--navy-deep)); color: #fff; box-shadow: 0 4px 15px var(--cyan-glow); margin-top: 10px; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--cyan); }
        .btn-market { background: rgba(39, 174, 96, 0.9); border: 1px solid #27ae60; }
        .footer { text-align: center; padding: 40px; background: rgba(0,0,0,0.7); margin-top: 50px; border-top: 2px solid var(--cyan); }
        @media (max-width: 768px) { .header-nav { flex-direction: column; text-align: center; } .nav-links { flex-direction: column; width: 100%; } .card { padding: 20px; margin-bottom: 15px; } }
    </style>
</head>
<body>

    <div class="pulse-ticker">
        <div class="ticker-content">  ✨ تم تحديث كافة الكليات لجامعة AUST  الذكاء الصنعي لايعمل حاليا يتم تطويره• نظام SOS والتبادل والمفقودات يعمل الآن بكفاءة 100%!  </div>
    </div>

    <nav class="header-nav">
        <h1>AUST <span style="color:var(--cyan)">Smart Pulse</span></h1>
        <div class="nav-links">
            <p>مرحباً، <span id="userDisplayName" style="color:var(--cyan); font-weight:bold;">جاري التحميل...</span></p>
            <div class="profile-container">
                <div id="notifyDot" class="notification-dot"></div>
                <a href="profile.html" class="profile-btn"><i class="fas fa-user-graduate"></i> الملف الشخصي</a>
                <button onclick="logout()" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; border-radius:10px; padding:5px 10px; cursor:pointer; margin-right:10px;">خروج</button>
            </div>
        </div>
    </nav>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 40px 5%;">
        
        <div class="card">
            <h2>📡 رادار المساعدة (SOS)</h2>
            <label>الكلية:</label>
            <select id="collegeSOS" onchange="updateSubjects()">
                <option value="it">💻 هندسة المعلوماتية</option>
                <option value="dent">🦷 طب الأسنان</option>
                <option value="pharm">💊 كلية الصيدلة</option>
                <option value="chemical">🧪 الكيمياء الصناعية</option>
                <option value="arch">📐 الهندسة المعمارية</option>
                <option value="petro">🛢️ هندسة البترول</option>
                <option value="trans">📖 كلية الترجمة</option>
            </select>
            <label>السنة الدراسية:</label>
            <select id="yearSOS" onchange="updateSubjects()">
                <option value="1">السنة الأولى</option><option value="2">السنة الثانية</option><option value="3">السنة الثالثة</option><option value="4">السنة الرابعة</option><option value="5">السنة الخامسة</option>
            </select>
            <label>المادة:</label>
            <select id="subjectSelect"></select>
            <label>كيف يمكن مساعدتك؟</label>
            <input type="text" id="customSOS" placeholder="مثال: أحتاج شرح لفقرة التوريث...">
            <button class="btn-main" style="background: linear-gradient(45deg, #ff4d4d, var(--navy-deep));" onclick="sendSOS()">إرسال نداء SOS 🆘</button>
        </div>

        <div class="card">
            <h2>♻️ التبادل والمفقودات</h2>
            <label>نوع الإعلان:</label>
            <select id="itemType">
                <option value="مبادلة">🔄 غرض للمبادلة/الإعارة</option>
                <option value="مفقود">🔍 مفقودات (أبحث عن...)</option>
                <option value="موجود">📍 موجودات (وجدت غرضاً...)</option>
            </select>
            <label>الكلية التابع لها الغرض:</label>
            <select id="itemCollege">
                <option value="عام">كل الكليات (عام)</option>
                <option value="it">هندسة المعلوماتية</option>
                <option value="dent">طب الأسنان</option>
                <option value="pharm">كلية الصيدلة</option>
                <option value="chemical">الكيمياء الصناعية</option>
                <option value="arch">الهندسة المعمارية</option>
                <option value="petro">هندسة البترول</option>
                <option value="trans">كلية الترجمة</option>
            </select>
            <label>اسم الغرض:</label>
            <input type="text" id="newToolName" placeholder="مثال: مسطرة T، نظارة...">
            <button class="btn-main" onclick="addNewTool()">نشر في المعرض ✅</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;">
                <button onclick="location.href='library.html'" style="background:rgba(41, 128, 185, 0.8); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold;">📚 المكتبة</button>
                <button onclick="location.href='AI.html'" style="background:rgba(41, 128, 126, 0.8); color:white; border:none; padding:12px; border-radius:10px; cursor:pointer; font-weight:bold;">🤖 الذكاء المساعد</button>
            </div>
            <button class="btn-market btn-main" onclick="location.href='market.html'" style="margin-top:10px;"><i class="fas fa-store"></i> دخول المعرض العام</button>
        </div>
    </div>

    <footer class="footer">
        <a href="about.html" style="color: var(--cyan); text-decoration: none; font-weight: bold; border: 1px solid var(--cyan); padding: 10px 20px; border-radius: 20px;">📖 حول القسم والموقع</a>
    </footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo", 
        authDomain: "nabd-aust.firebaseapp.com", 
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "nabd-aust", 
        storageBucket: "nabd-aust.firebasestorage.app", 
        messagingSenderId: "921777725948", 
        appId: "1:921777725948:web:7b024d0aa101068bef9279" 
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // --- نظام فك التجمد (الأمان) ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            console.log("تم تفعيل تصريح الدخول لـ: " + user.email);
            initializeDashboard();
        } else {
            // إذا لم يكن مسجل دخول، يعود لصفحة الدخول
            window.location.href = "login.html";
        }
    });

    const currentUserName = localStorage.getItem("userName") || "مستخدم";
    const currentUserID = localStorage.getItem("userID") || "0000";

    function initializeDashboard() {
        document.getElementById("userDisplayName").innerText = currentUserName;
        updateSubjects();
        checkUnreadMessages();
    }

    const allAUSTSubjects = {
        it: { 1: ["البرمجة 1", "الفيزياء 1", "الرياضيات 1", "الرسم الهندسي", "البرمجة 2", "الفيزياء 2", "الرياضيات 2"], 2: ["خوارزميات 1", "برمجة ويب", "رياضيات متقطعة", "احتمالات", "OOP 1", "قواعد بيانات 1"], 3: ["هندسة برمجيات 1", "تطوير ويب", "معمارية حاسوب", "نظم تشغيل 1", "تحليل نظم"], 4: ["شبكات 1", "تنقيب بيانات", "رسم حاسوبي", "إدارة قواعد بيانات"], 5: ["مشروع تخرج 1", "إدارة مشاريع", "أمن معلومات"] },
        dent: { 1: ["كيمياء عامة", "تشريح عام 1", "بيولوجيا", "فيزيولوجيا"], 2: ["تعويضات ثابتة 1", "مواد ترميمية", "نحت أسنان"], 3: ["أدوية", "باطنة", "تشريح مرضي"], 4: ["تقويم 1", "مداواة لبية 1", "أمراض فم 1"], 5: ["زرع أسنان", "جراحة فم وفكين"] },
        pharm: { 1: ["تشريح", "فيزياء طبية", "كيمياء عامة"], 2: ["صيدلانيات 1", "كيمياء تحليلية", "علم الأمراض"], 3: ["تكنولوجيا صيدلانية", "فارماكولوجيا 1"], 4: ["صيدلة صناعية 1", "سموم"], 5: ["مشروع تخرج", "كيمياء دوائية"] },
        arch: { 1: ["رسم هندسي", "تصميم 1", "تاريخ عمارة 1"], 2: ["تصميم معماري 1", "تنفيذ مباني"], 3: ["تجهيزات 1", "تخطيط مدن"], 4: ["بيتون مسلح", "عمارة داخلية"], 5: ["مشروع التخرج النهائي"] },
        chemical: { 1: ["الرياضيات 1", "كيمياء عامة", "رسم هندسي"], 2: ["كيمياء عضوية", "رياضيات تطبيقية"], 3: ["ثيرموديناميك", "انتقال حرارة"], 4: ["تقانة أسمدة", "ألياف"], 5: ["تصميم أجهزة", "هندسة بيئية"] },
        petro: { 1: ["جيولوجيا", "كيمياء هيدروكربون"], 2: ["كيمياء نفط", "صخور"], 3: ["جيولوجيا بترول", "فيزياء طبقة"], 4: ["إنتاج نفط", "حفر 1"], 5: ["حفر موجه", "مشروع 2"] },
        trans: { 1: ["صوتيات", "ترجمة 1"], 2: ["مسرح نهضة", "ترجمة 2"], 3: ["رواية قرن 19", "ترجمة 3"], 4: ["نقد أدبي", "مشروع تخرج"] }
    };

    function updateSubjects() {
        const college = document.getElementById('collegeSOS').value;
        const year = document.getElementById('yearSOS').value;
        const select = document.getElementById('subjectSelect');
        const subjects = (allAUSTSubjects[college] && allAUSTSubjects[college][year]) ? allAUSTSubjects[college][year] : [];
        select.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function checkUnreadMessages() {
        const notifyDot = document.getElementById("notifyDot");
        // مسار الشات يحتاج صلاحية قراءة (تأكدي من وجوده في Rules)
        database.ref('chats').on('value', (snapshot) => {
            let hasUnread = false;
            snapshot.forEach((child) => {
                if (child.key.includes(currentUserName.replace(/\s/g, ''))) {
                    child.forEach((msg) => {
                        if (msg.val().sender !== currentUserName && msg.val().seen === false) { hasUnread = true; }
                    });
                }
            });
            notifyDot.style.display = hasUnread ? "block" : "none";
        });
    }

    function sendSOS() {
        const subject = document.getElementById('subjectSelect').value;
        const explanation = document.getElementById('customSOS').value.trim();
        if(!subject || !explanation) return Swal.fire('تنبيه', 'أكمل البيانات المطلوبة', 'warning');

        const timeStr = new Date().toLocaleString('ar-EG');

        database.ref('globalMarket/').push({
            name: `🆘 SOS: ${subject}`, explanation, college: document.getElementById('collegeSOS').value,
            owner: currentUserName, studentId: currentUserID, fullTime: timeStr, isSOS: true
        }).then(() => {
            Swal.fire({ icon: 'success', title: 'تم الإرسال', timer: 1500, showConfirmButton: false });
            document.getElementById('customSOS').value = "";
        }).catch(err => Swal.fire('خطأ أمان', 'يجب تسجيل الدخول أولاً', 'error'));
    }

    function addNewTool() {
        const name = document.getElementById('newToolName').value.trim();
        if (!name) return Swal.fire('خطأ', 'اكتب اسم الغرض', 'error');
        
        const type = document.getElementById('itemType').value;
        const timeStr = new Date().toLocaleString('ar-EG');

        database.ref('globalMarket/').push({
            name: `${type}: ${name}`, college: document.getElementById('itemCollege').value,
            owner: currentUserName, studentId: currentUserID, fullTime: timeStr, isSOS: false
        }).then(() => {
            Swal.fire({ icon: 'success', title: 'تم النشر', timer: 1500, showConfirmButton: false });
            document.getElementById('newToolName').value = "";
        });
    }

    function logout() {
        auth.signOut().then(() => {
            localStorage.clear();
            window.location.href = "login.html";
        });
    }
</script>
</body>
</html>
