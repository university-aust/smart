<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض السريع | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --blue-glass: rgba(0, 40, 80, 0.6); 
            --red-glass: rgba(139, 0, 0, 0.5); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-glow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        body { 
            background: linear-gradient(rgba(10, 10, 15, 0.7), rgba(10, 10, 15, 0.7)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow-x: hidden;
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0, 0, 0, 0.8); 
            border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-back { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 6px 15px; border-radius: 10px; 
            text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 5px; font-size: 0.8rem;
        }

        .search-container { padding: 12px 5%; display: flex; gap: 8px; flex-wrap: wrap; background: rgba(0,0,0,0.4); }
        .search-input { 
            flex: 1; min-width: 120px; padding: 10px; border-radius: 10px; 
            border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.5); 
            color: white; outline: none; font-size: 0.85rem;
        }

        .market-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px 3%; }

        .tool-card {
            backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid var(--glass-border);
            padding: 12px; display: flex; flex-direction: column; position: relative;
            transition: 0.2s; min-height: 220px; background: var(--blue-glass);
        }
        .tool-card:hover { transform: translateY(-3px); border-color: var(--cyan-neon); }

        .sos-card { background: var(--red-glass) !important; border-color: rgba(255, 77, 77, 0.3) !important; }

        .category-tag { background: rgba(255, 255, 255, 0.1); color: #fff; padding: 2px 6px; border-radius: 6px; font-size: 10px; }
        .post-time { font-size: 9px; color: rgba(255,255,255,0.5); margin: 8px 0; }
        .post-owner { color: var(--cyan-neon); font-size: 10px; font-weight: bold; }
        
        .explanation-box {
            background: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 8px;
            margin: 8px 0; font-size: 0.75rem; border-right: 3px solid var(--cyan-neon);
        }

        .contact-btn { 
            width: 100%; margin-top: auto; padding: 10px; border-radius: 12px; 
            font-weight: bold; cursor: pointer; font-size: 0.8rem; 
            background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid var(--glass-border);
        }
        .contact-btn:hover:not(:disabled) { background: #fff; color: #000; }

        .admin-del-icon { position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.3); cursor: pointer; }

        @media (min-width: 768px) { .market-grid { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span></h1>
        <a href="dashboard.html" class="btn-back">الرئيسية</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="بحث سريع..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex:0" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">IT</option>
            <option value="lost">مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const ADMIN_ID = "20241600060";
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const myID = localStorage.getItem("universityID") || "";

    // 1. استرجاع البيانات من الكاش فوراً للسرعة
    let cachedData = JSON.parse(localStorage.getItem("market_cache") || "[]");
    
    // تنفيذ الرندر الأولي فوراً إذا وجد كاش
    if(cachedData.length > 0) renderMarket();

    // 2. الاستماع لقاعدة البيانات (تحديث ذكي)
    function startListening() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            
            // تحديث الكاش للزيارة القادمة
            localStorage.setItem("market_cache", JSON.stringify(cachedData));
            
            // رندر فعلي بالبيانات الجديدة
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;

        const filtered = cachedData.filter(item => {
            const matchesSearch = (item.name || "").toLowerCase().includes(searchTerm);
            const matchesCol = (filterCol === "all") || (item.college === filterCol);
            return matchesSearch && matchesCol;
        });

        grid.innerHTML = filtered.map(item => {
            const isOwner = (item.ownerID === myID);
            return `
                <div class="tool-card ${item.isSOS ? 'sos-card' : ''}">
                    ${(myID === ADMIN_ID || isOwner) ? `<i class="fas fa-trash admin-del-icon" onclick="deleteItem('${item.id}')"></i>` : ''}
                    <span class="category-tag">${item.college || 'AUST'}</span>
                    <div class="post-time">${item.fullTime || ''}</div>
                    <div class="post-owner">👤 ${item.owner}</div>
                    <h3 style="font-size:0.9rem">${item.name}</h3>
                    <div class="explanation-box">${item.explanation || ''}</div>
                    <button onclick="goToChat('${item.owner}', '${item.ownerID}', '${item.name}')" 
                            class="contact-btn" ${isOwner ? 'disabled' : ''}>
                        ${isOwner ? 'منشوري' : 'تواصل'}
                    </button>
                </div>
            `;
        }).join('');
    }

    function deleteItem(id) {
        Swal.fire({ title: 'حذف؟', icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) database.ref('globalMarket/' + id).remove();
        });
    }

    function goToChat(name, id, item) {
        if (id === myID) return;
        window.location.href = `chat.html?to=${encodeURIComponent(name)}&toID=${id}&item=${encodeURIComponent(item)}`;
    }

    window.onload = startListening;
</script>
</body>
</html>
