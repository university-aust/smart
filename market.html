<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | Shahd Al-Khaled</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --blue-glass: rgba(0, 40, 80, 0.6); 
            --red-glass: rgba(139, 0, 0, 0.5); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-glow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        body { 
            background: linear-gradient(rgba(10, 10, 15, 0.7), rgba(10, 10, 15, 0.7)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; overflow-x: hidden;
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0, 0, 0, 0.8); 
            border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-back { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 6px 15px; border-radius: 10px; 
            text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 5px; font-size: 0.8rem;
        }
        .btn-back:hover { background: var(--cyan-neon); color: #000; box-shadow: var(--neon-glow); }

        .search-container { padding: 12px 5%; display: flex; gap: 8px; flex-wrap: wrap; background: rgba(0,0,0,0.4); }
        .search-input { 
            flex: 1; min-width: 120px; padding: 10px; border-radius: 10px; 
            border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.5); 
            color: white; outline: none; font-size: 0.85rem;
        }

        .market-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 12px; padding: 15px 3%; 
        }

        .tool-card {
            backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid var(--glass-border);
            padding: 12px; display: flex; flex-direction: column; position: relative;
            transition: 0.3s; min-height: 220px; overflow: hidden;
        }

        .tool-card:hover { transform: translateY(-5px); border-color: var(--cyan-neon); box-shadow: var(--neon-glow); }
        .exchange-card { background: var(--blue-glass); }
        .sos-card { background: var(--red-glass) !important; border-color: rgba(255, 77, 77, 0.3) !important; }

        .category-tag { background: rgba(255, 255, 255, 0.1); color: #fff; padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .post-time { font-size: 9px; color: rgba(255,255,255,0.5); margin: 8px 0; }
        .post-owner { color: var(--cyan-neon); font-size: 10px; font-weight: bold; margin-bottom: 4px; }
        
        .explanation-box {
            background: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 8px;
            margin: 8px 0; font-size: 0.75rem; color: #eee; 
            border-right: 3px solid var(--cyan-neon); line-height: 1.3;
        }

        .contact-btn { 
            width: 100%; margin-top: auto; padding: 10px; border: none; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            font-size: 0.8rem; background: rgba(255, 255, 255, 0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .contact-btn:hover:not(:disabled) { background: #fff; color: #000; }
        .contact-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: transparent; }

        .admin-del-icon {
            position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.4);
            cursor: pointer; font-size: 14px; z-index: 10; transition: 0.3s;
        }
        .admin-del-icon:hover { color: #ff4d4d; transform: scale(1.2); }

        @media (min-width: 768px) {
            .market-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span></h1>
        <a href="dashboard.html" class="btn-back"><i class="fas fa-home"></i> الرئيسية</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن أداة أو زميل..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 110px;" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">المعلوماتية</option>
            <option value="dent">الأسنان</option>
            <option value="pharm">الصيدلة</option>
            <option value="arch">العمارة</option>
            <option value="lost">🔍 مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // بيانات المسؤول (Shahd Al-Khaled)
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const ADMIN_PASS = "shjkshjk"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const collegeMap = { 'it': 'IT', 'dent': 'أسنان', 'pharm': 'صيدلة', 'arch': 'عمارة', 'chemical': 'كيمياء', 'petro': 'بترول', 'trans': 'ترجمة', 'عام': 'عام' };
    let cachedData = [];

    function startListening() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            // ترتيب عكسي (الأحدث أولاً)
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;
        
        // جلب بيانات المستخدم الحالي من localStorage
        const myID = (localStorage.getItem("universityID") || "").trim();
        const myName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const isSuperAdmin = (myName === ADMIN_NAME.toLowerCase().trim() && myID === ADMIN_ID.trim());

        let htmlContent = "";

        const filtered = cachedData.filter(item => {
            const matchesSearch = (item.name || "").toLowerCase().includes(searchTerm) || (item.owner || "").toLowerCase().includes(searchTerm);
            let matchesCollege = (filterCol === "all") || (item.college === filterCol);
            if (filterCol === "lost") matchesCollege = item.name.includes("مفقود") || item.name.includes("موجود");
            return matchesSearch && matchesCollege;
        });

        if (filtered.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5; margin-top: 50px;">لا توجد نتائج مطابقة لبحثك.. 🕸️</p>`;
            return;
        }

        filtered.forEach(item => {
            const isSOS = item.isSOS === true;
            // التحقق من الملكية عبر universityID لضمان الأمان
            const isOwner = (item.ownerID && item.ownerID.toString().trim() === myID);
            const cardClass = isSOS ? 'sos-card' : 'exchange-card';

            htmlContent += `
                <div class="tool-card ${cardClass}">
                    ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" title="حذف المنشور" onclick="handleDelete('${item.id}', ${isSuperAdmin}, '${item.ownerID}')"></i>` : ''}
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="category-tag">${collegeMap[item.college] || 'AUST'}</span>
                    </div>
                    <div class="post-time"><i class="far fa-clock"></i> ${item.fullTime || 'منذ قليل'}</div>
                    <div class="post-owner">👤 ${item.owner} ${isOwner ? '(أنت)' : ''}</div>
                    <h3 style="margin:5px 0; font-size: 0.85rem; color: #fff;">${item.name}</h3>
                    ${item.explanation ? `<div class="explanation-box">${item.explanation}</div>` : ''}
                    
                    <button 
                        onclick="goToChat('${item.owner}', '${item.ownerID}', '${item.name}')" 
                        class="contact-btn" 
                        ${isOwner ? 'disabled' : ''}>
                        ${isOwner ? 'منشوري' : 'تواصل الآن'}
                    </button>
                </div>`;
        });
        grid.innerHTML = htmlContent;
    }

    function handleDelete(itemId, isGlobalAdmin, postOwnerID) {
        const myID = (localStorage.getItem("universityID") || "").trim();
        if (!isGlobalAdmin && myID !== postOwnerID) return;

        Swal.fire({
            title: isGlobalAdmin ? 'حذف بصفتك مسؤول؟' : 'حذف المنشور؟',
            text: "لا يمكن التراجع عن هذه الخطوة!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'نعم، احذف',
            cancelButtonText: 'إلغاء',
            background: '#0a0a0f',
            color: '#fff'
        }).then(res => {
            if(res.isConfirmed) {
                if (isGlobalAdmin && myID !== postOwnerID) {
                    // طلب كلمة مرور المسؤول إذا لم يكن هو صاحب المنشور
                    Swal.fire({ 
                        title: 'كلمة مرور المسؤول', 
                        input: 'password', 
                        background: '#0a0a0f', 
                        color: '#fff',
                        inputPlaceholder: 'أدخل رمز الحماية'
                    }).then(p => {
                        if(p.value === ADMIN_PASS) {
                            database.ref('globalMarket/' + itemId).remove();
                            Swal.fire('تم!', 'تم الحذف بنجاح.', 'success');
                        } else if (p.value !== undefined) {
                            Swal.fire('خطأ', 'كلمة المرور غير صحيحة', 'error');
                        }
                    });
                } else {
                    database.ref('globalMarket/' + itemId).remove();
                }
            }
        });
    }

    function goToChat(ownerName, ownerID, itemName) {
        const myID = (localStorage.getItem("universityID") || "").trim();
        const myName = (localStorage.getItem("userName") || "").trim();

        // قفل أمان إضافي لمنع مراسلة النفس
        if (ownerID && ownerID.toString().trim() === myID) {
            Swal.fire({ text: 'هذا منشورك الخاص!', icon: 'info', background: '#0a0a0f', color: '#fff', timer: 1500, showConfirmButton: false });
            return;
        }

        // التوجه للشات مع تمرير البيانات المطلوبة للربط مع البروفايل
        window.location.href = `chat.html?to=${encodeURIComponent(ownerName)}&toID=${ownerID}&item=${encodeURIComponent(itemName)}`;
    }

    window.onload = startListening;
</script>
</body>
</html>
