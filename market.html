<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --bg-dark: #050608;
            --blue-soft: rgba(0, 120, 215, 0.12); /* أزرق زجاجي هادئ جداً */
            --red-soft: rgba(200, 30, 30, 0.15); /* أحمر خافت */
            --border-white: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: linear-gradient(rgba(5, 6, 8, 0.92), rgba(5, 6, 8, 0.92)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #bbb; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 5%; background: rgba(0, 0, 0, 0.85); 
            border-bottom: 1px solid var(--border-white); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-back { color: #888; text-decoration: none; font-size: 0.85rem; border: 1px solid #333; padding: 5px 12px; border-radius: 8px; transition: 0.3s; }
        .btn-back:hover { color: #fff; border-color: #555; }

        .search-container { padding: 15px 4%; display: flex; gap: 8px; background: rgba(0,0,0,0.3); }
        .search-input { 
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #222; 
            background: #0a0a0a; color: #fff; font-size: 0.8rem; outline: none;
        }

        /* نظام الشبكة: حاويتان في الموبايل */
        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; padding: 15px 4%; 
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-white);
            border-radius: 15px; padding: 12px;
            display: flex; flex-direction: column;
            position: relative; transition: 0.3s;
        }

        .tool-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.06); }

        /* تمييز الألوان بهدوء */
        .sos-card { background: var(--red-soft); border-color: rgba(200, 30, 30, 0.2); }
        .exchange-card { background: var(--blue-soft); border-color: rgba(0, 120, 215, 0.2); }

        .category-tag { font-size: 9px; color: #777; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }
        .post-owner { font-size: 10px; color: #00b8d4; margin-top: 8px; font-weight: bold; }
        .post-title { font-size: 0.9rem; color: #eee; margin: 8px 0; font-weight: 600; line-height: 1.2; }

        /* صندوق التفاصيل يظهر فقط في الـ SOS */
        .sos-desc { 
            font-size: 0.75rem; color: #999; background: rgba(0,0,0,0.2); 
            padding: 8px; border-radius: 8px; margin-bottom: 10px; border-right: 2px solid #cc3333;
        }

        .contact-btn { 
            width: 100%; padding: 10px; border: none; border-radius: 10px; 
            font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.3s;
            background: rgba(255,255,255,0.05); color: #ccc; border: 1px solid rgba(255,255,255,0.1);
        }
        .contact-btn:hover { background: #fff; color: #000; }

        .del-icon { 
            position: absolute; top: 8px; left: 8px; color: #555; 
            font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .del-icon:hover { color: #ff4d4d; }

        /* شاشات الكمبيوتر: 4 حاويات */
        @media (min-width: 768px) {
            .market-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .post-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1 style="font-size: 1.1rem; color: #fff;">معرض <span style="color:#00b8d4">AUST</span></h1>
        <a href="dashboard.html" class="btn-back">رجوع</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="ابحث هنا..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex:0; min-width:90px;" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">IT</option>
            <option value="lost">مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";

    const firebaseConfig = { apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo", authDomain: "nabd-aust.firebaseapp.com", databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app", projectId: "nabd-aust", storageBucket: "nabd-aust.firebasestorage.app", messagingSenderId: "921777725948", appId: "1:921777725948:web:7b024d0aa101068bef9279" };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let cachedData = [];

    function startListening() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const myName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const myID = (localStorage.getItem("userID") || "").trim();
        const isSuperAdmin = (myName === ADMIN_NAME && myID === ADMIN_ID);

        let htmlContent = "";

        const filtered = cachedData.filter(item => {
            return (item.name || "").toLowerCase().includes(searchTerm) || (item.owner || "").toLowerCase().includes(searchTerm);
        });

        filtered.forEach(item => {
            const isSOS = item.isSOS === true;
            const itemOwner = (item.owner || "").trim().toLowerCase();
            const isOwner = (itemOwner === myName);
            const cardClass = isSOS ? 'sos-card' : 'exchange-card';

            htmlContent += `
                <div class="tool-card ${cardClass}">
                    ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash del-icon" onclick="handleDelete('${item.id}')"></i>` : ''}
                    
                    <span class="category-tag">${item.college || 'عام'}</span>
                    <div class="post-owner">👤 ${item.owner}</div>
                    <div class="post-title">${item.name}</div>

                    ${isSOS ? `<div class="sos-desc">${item.explanation || 'طلب مساعدة..'}</div>` : ''}

                    <button onclick="goToChat('${item.owner}', '${item.name}')" class="contact-btn">
                        تواصل
                    </button>
                </div>`;
        });
        grid.innerHTML = htmlContent || `<p style="grid-column: 1/-1; text-align:center; font-size:0.8rem; opacity:0.5;">لا يوجد نتائج</p>`;
    }

    function handleDelete(itemId) {
        Swal.fire({
            title: 'حذف؟',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            confirmButtonText: 'حذف',
            background: '#111', color: '#fff'
        }).then((res) => { if(res.isConfirmed) database.ref('globalMarket/' + itemId).remove(); });
    }

    function goToChat(owner, itemName) {
        window.location.href = `chat.html?to=${encodeURIComponent(owner)}&item=${encodeURIComponent(itemName)}`;
    }

    window.onload = startListening;
</script>
</body>
</html>
