<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --blue-glass: rgba(15, 23, 42, 0.85); 
            --red-glass: rgba(69, 10, 10, 0.85); 
            --glass-border: rgba(0, 229, 255, 0.2);
        }

        body { 
            /* خلفية داكنة جداً مع صورة خافتة */
            background: linear-gradient(rgba(5, 7, 10, 0.9), rgba(5, 7, 10, 0.9)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            min-height: 100vh;
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 5%; background: rgba(0, 0, 0, 0.9); 
            border-bottom: 1px solid var(--cyan-neon); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-back { 
            color: var(--cyan-neon); text-decoration: none; font-weight: bold; 
            font-size: 0.85rem; border: 1px solid var(--cyan-neon);
            padding: 6px 14px; border-radius: 10px; transition: 0.3s;
        }
        .btn-back:hover { background: var(--cyan-neon); color: black; }

        .search-container { padding: 12px 3%; display: flex; gap: 8px; background: rgba(0,0,0,0.6); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-input { 
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: white; font-size: 0.85rem; outline: none;
        }

        /* التصميم الزوجي للموبايل */
        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 15px 10px; 
        }

        .tool-card {
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 12px;
            display: flex; flex-direction: column;
            position: relative;
            min-height: 220px;
            transition: transform 0.3s ease;
        }
        .tool-card:active { transform: scale(0.97); }

        .exchange-card { background: var(--blue-glass); }
        .sos-card { background: var(--red-glass); border-color: #ff4d4d; }

        .category-tag { font-size: 10px; color: var(--cyan-neon); font-weight: bold; margin-bottom: 6px; }
        .post-owner { font-size: 11px; color: #aaa; margin-bottom: 4px; }
        
        h3 { font-size: 0.9rem; margin: 6px 0; color: #fff; line-height: 1.3; font-weight: 600; }

        .explanation-box {
            background: rgba(0, 0, 0, 0.4); padding: 8px; border-radius: 10px;
            font-size: 0.75rem; color: #ddd; margin-bottom: 10px;
            border-right: 3px solid var(--cyan-neon);
            overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .sos-card .explanation-box { border-right-color: #ff4d4d; }

        .contact-btn { 
            width: 100%; margin-top: auto; padding: 10px; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 0.8rem;
            background: var(--cyan-neon); color: #000; transition: 0.3s;
        }

        .admin-del-icon {
            position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.4);
            font-size: 16px; padding: 5px; cursor: pointer; transition: 0.3s;
        }
        .admin-del-icon:hover { color: #ff4d4d; transform: scale(1.2); }

        @media (min-width: 768px) {
            .market-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 30px 5%; }
            h3 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1 style="font-size: 1.2rem;">معرض <span style="color:var(--cyan-neon)">Smart Pulse</span></h1>
        <a href="dashboard.html" class="btn-back">الرئيسية</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="بحث عن مادة أو طالب..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 110px;" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">IT</option>
            <option value="dent">أسنان</option>
            <option value="pharm">صيدلة</option>
            <option value="arch">عمارة</option>
            <option value="lost">مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const ADMIN_PASS = "shjkshjk"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const collegeMap = { 'it': 'المعلوماتية', 'dent': 'الأسنان', 'pharm': 'الصيدلة', 'arch': 'العمارة', 'chemical': 'الكيمياء', 'petro': 'البترول', 'trans': 'الترجمة', 'عام': 'عام' };

    let cachedData = [];

    function startListening() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;
        
        const currentUserName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const currentUserID = (localStorage.getItem("universityID") || "").trim(); 
        const isSuperAdmin = (currentUserName === ADMIN_NAME.toLowerCase().trim() && currentUserID === ADMIN_ID.trim());

        let htmlContent = "";

        const filtered = cachedData.filter(item => {
            const nameMatch = (item.name || "").toLowerCase().includes(searchTerm);
            const ownerMatch = (item.owner || "").toLowerCase().includes(searchTerm);
            let matchesCollege = (filterCol === "all") || (item.college === filterCol);
            if (filterCol === "lost") matchesCollege = item.name.includes("مفقود") || item.name.includes("موجود");
            return (nameMatch || ownerMatch) && matchesCollege;
        });

        filtered.forEach(item => {
            const isSOS = item.isSOS === true;
            // التحقق من الملكية عبر ID الطالب
            const isOwner = (item.ownerID === currentUserID);
            const cardClass = isSOS ? 'sos-card' : 'exchange-card';

            htmlContent += `
                <div class="tool-card ${cardClass}">
                    ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}', ${isSuperAdmin})"></i>` : ''}
                    <span class="category-tag">${collegeMap[item.college] || 'AUST'}</span>
                    <div class="post-owner">👤 ${item.owner || 'مجهول'}</div>
                    <h3>${item.name}</h3>
                    ${item.explanation ? `<div class="explanation-box">${item.explanation}</div>` : ''}
                    <button onclick="goToChat('${item.owner}', '${item.name}', '${item.ownerID}')" class="contact-btn">مراسلة</button>
                </div>`;
        });
        grid.innerHTML = htmlContent || `<p style="grid-column: 1/-1; text-align:center; padding:50px; opacity:0.5;">لا يوجد نتائج حالياً</p>`;
    }

    function handleDelete(itemId, isGlobalAdmin) {
        if (isGlobalAdmin) {
            Swal.fire({ 
                title: 'حذف المسؤول', 
                text: 'أدخل الرمز للتأكيد:',
                input: 'password', 
                background: '#0a0a0f', 
                color: '#fff',
                confirmButtonColor: '#ff4d4d'
            }).then(res => { 
                if(res.value === ADMIN_PASS) {
                    database.ref('globalMarket/' + itemId).remove();
                    Swal.fire('تم الحذف', '', 'success');
                } else if(res.value) {
                    Swal.fire('خطأ', 'الرمز غير صحيح', 'error');
                }
            });
        } else {
            Swal.fire({ 
                title: 'هل تريد حذف منشورك؟', 
                icon: 'warning', 
                showCancelButton: true,
                background: '#0a0a0f',
                color: '#fff',
                confirmButtonText: 'نعم، احذف',
                cancelButtonText: 'إلغاء'
            }).then(res => { 
                if(res.isConfirmed) {
                    database.ref('globalMarket/' + itemId).remove();
                }
            });
        }
    }

    function goToChat(ownerName, itemName, ownerID) {
        const myID = localStorage.getItem("universityID");
        if (ownerID === myID) {
            Swal.fire({ text: 'هذا منشورك!', icon: 'info', timer: 1000, showConfirmButton: false });
            return;
        }
        window.location.href = `chat.html?to=${encodeURIComponent(ownerName)}&item=${encodeURIComponent(itemName)}&toID=${ownerID}`;
    }

    window.onload = startListening;
</script>
</body>
</html>
