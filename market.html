<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --blue-glass: rgba(0, 40, 80, 0.6); 
            --red-glass: rgba(139, 0, 0, 0.5); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-glow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        body { 
            background: linear-gradient(rgba(10, 10, 15, 0.7), rgba(10, 10, 15, 0.7)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* الهيدر */
        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0, 0, 0, 0.8); 
            border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-back { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 6px 15px; border-radius: 10px; 
            text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 5px; font-size: 0.8rem;
        }
        .btn-back:hover { background: var(--cyan-neon); color: #000; box-shadow: var(--neon-glow); }

        /* البحث */
        .search-container { padding: 12px 5%; display: flex; gap: 8px; flex-wrap: wrap; background: rgba(0,0,0,0.4); }
        .search-input { 
            flex: 1; min-width: 120px; padding: 10px; border-radius: 10px; 
            border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.5); 
            color: white; outline: none; font-size: 0.85rem;
        }

        /* الشبكة */
        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; padding: 15px 3%; 
        }

        /* الحاويات الزجاجية */
        .tool-card {
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 12px;
            display: flex; flex-direction: column;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 220px;
            overflow: hidden;
        }

        /* التوهج عند المرور والضغط */
        .tool-card:hover {
            transform: translateY(-5px);
            border-color: var(--cyan-neon);
            box-shadow: var(--neon-glow);
        }
        .tool-card:active { transform: scale(0.95) translateY(-10px); }

        .exchange-card { background: var(--blue-glass); }
        .sos-card { 
            background: var(--red-glass) !important; 
            border-color: rgba(255, 77, 77, 0.3) !important; 
        }
        .sos-card:hover { box-shadow: 0 0 20px rgba(255, 77, 77, 0.5); border-color: #ff4d4d; }

        /* العناصر الداخلية */
        .category-tag { background: rgba(255, 255, 255, 0.1); color: #fff; padding: 2px 6px; border-radius: 6px; font-size: 8px; font-weight: bold; }
        .post-time { font-size: 9px; color: rgba(255,255,255,0.5); margin: 8px 0; }
        .post-owner { color: var(--cyan-neon); font-size: 10px; font-weight: bold; margin-bottom: 4px; }
        
        .explanation-box {
            background: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 8px;
            margin: 8px 0; font-size: 0.75rem; color: #eee; 
            border-right: 3px solid var(--cyan-neon); line-height: 1.3;
        }
        .sos-card .explanation-box { border-right-color: #ff4d4d; }

        .contact-btn { 
            width: 100%; margin-top: auto; padding: 10px; border: none; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            font-size: 0.8rem; background: rgba(255, 255, 255, 0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .contact-btn:hover { background: #fff; color: #000; box-shadow: 0 0 10px #fff; }

        .admin-del-icon {
            position: absolute; top: 10px; left: 10px; color: rgba(255,255,255,0.4);
            cursor: pointer; font-size: 14px; z-index: 10; transition: 0.3s;
        }
        .admin-del-icon:hover { color: #ff4d4d; transform: scale(1.2); }

        @media (min-width: 768px) {
            .market-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .tool-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span></h1>
        <a href="dashboard.html" class="btn-back"><i class="fas fa-home"></i> الرئيسية</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 110px;" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">المعلوماتية</option>
            <option value="dent">الأسنان</option>
            <option value="pharm">الصيدلة</option>
            <option value="arch">العمارة</option>
            <option value="lost">🔍 مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid">
        </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const ADMIN_PASS = "shjkshjk"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const collegeMap = { 'it': 'IT', 'dent': 'أسنان', 'pharm': 'صيدلة', 'arch': 'عمارة', 'chemical': 'كيمياء', 'petro': 'بترول', 'trans': 'ترجمة', 'عام': 'عام' };

    let cachedData = [];

    // --- تسريع العرض: جلب البيانات من الذاكرة المحلية أولاً ---
    const localSaved = localStorage.getItem("marketCache");
    if (localSaved) {
        cachedData = JSON.parse(localSaved);
        setTimeout(renderMarket, 100); 
    }

    function startListening() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            
            // حفظ نسخة محلية للتحميل الفوري القادم
            localStorage.setItem("marketCache", JSON.stringify(cachedData));
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;
        
        const currentUserName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const currentUserID = (localStorage.getItem("userID") || "").trim(); 
        const isSuperAdmin = (currentUserName === ADMIN_NAME.toLowerCase().trim() && currentUserID === ADMIN_ID.trim());

        let htmlContent = "";

        const filtered = cachedData.filter(item => {
            if (!item || !item.name) return false;
            const matchesSearch = item.name.toLowerCase().includes(searchTerm) || (item.owner || "").toLowerCase().includes(searchTerm);
            let matchesCollege = (filterCol === "all") || (item.college === filterCol);
            if (filterCol === "lost") matchesCollege = item.name.includes("مفقود") || item.name.includes("موجود");
            return matchesSearch && matchesCollege;
        });

        if (filtered.length === 0 && cachedData.length > 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">لا يوجد نتائج.. 🕸️</p>`;
            return;
        }

        filtered.forEach(item => {
            const isSOS = item.isSOS === true;
            const itemOwner = (item.owner || "").trim().toLowerCase();
            const isOwner = (itemOwner === currentUserName);
            const cardClass = isSOS ? 'sos-card' : 'exchange-card';

            htmlContent += `
                <div class="tool-card ${cardClass}">
                    ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}', ${isSuperAdmin}, '${itemOwner}')"></i>` : ''}
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="category-tag">${collegeMap[item.college] || 'AUST'}</span>
                    </div>
                    <div class="post-time"><i class="far fa-clock"></i> ${item.fullTime || 'الآن'}</div>
                    <div class="post-owner">👤 ${item.owner}</div>
                    <h3 style="margin:5px 0; font-size: 0.85rem; color: #fff;">${item.name}</h3>
                    
                    ${item.explanation ? `<div class="explanation-box">${item.explanation}</div>` : ''}
                    
                    <button onclick="goToChat('${item.owner}', '${item.name}')" class="contact-btn">
                        تواصل
                    </button>
                </div>`;
        });
        grid.innerHTML = htmlContent;
    }

    function handleDelete(itemId, isGlobalAdmin, postOwner) {
        const currentUserName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        
        // منع أي شخص غير المالك أو الأدمن من الحذف برمجياً
        if (!isGlobalAdmin && currentUserName !== postOwner) return;

        const confirmAndDel = () => database.ref('globalMarket/' + itemId).remove();

        if (isGlobalAdmin) {
            Swal.fire({ title: 'حذف بصفتك مسؤول', input: 'password', showCancelButton: true, confirmButtonColor: '#ff4d4d', background: '#0a0a0f', color: '#fff' })
            .then(res => { if(res.value === ADMIN_PASS) confirmAndDel(); });
        } else {
            Swal.fire({ title: 'حذف المنشور؟', icon: 'warning', showCancelButton: true, background: '#0a0a0f', color: '#fff' })
            .then(res => { if(res.isConfirmed) confirmAndDel(); });
        }
    }

    function goToChat(owner, itemName) {
        if (owner.toLowerCase() === (localStorage.getItem("userName") || "").toLowerCase().trim()) {
            Swal.fire({ text: 'هذا منشورك الخاص', icon: 'info', background: '#0a0a0f', color: '#fff', timer: 1500, showConfirmButton: false });
            return;
        }
        window.location.href = `chat.html?to=${encodeURIComponent(owner)}&item=${encodeURIComponent(itemName)}`;
    }

    window.onload = startListening;
</script>
</body>
</html>
