<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --cyan-glow: rgba(0, 229, 255, 0.3);
            --red: #ff4d4d; 
            --deep-dark: rgba(9, 10, 15, 0.95);
        }

        body { 
            /* الخلفية المغبشة الأصلية */
            background: linear-gradient(rgba(10, 10, 15, 0.85), rgba(10, 10, 15, 0.85)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0,0,0,0.6); 
            border-bottom: 1px solid var(--cyan-glow); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .header-nav h1 {
            font-size: clamp(18px, 4vw, 24px);
            background: linear-gradient(to bottom, #fff, var(--cyan-neon));
           -webkit-background-clip: text; background-clip: text; 
           -webkit-text-fill-color: transparent; margin: 0;
        }

        .btn-back { 
            background: rgba(0, 229, 255, 0.1); border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 8px 15px; border-radius: 12px; 
            text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
        }
        .btn-back:hover { background: var(--cyan-neon); color: black; box-shadow: 0 0 15px var(--cyan-glow); }

        .search-container { padding: 15px 5%; display: flex; gap: 10px; flex-wrap: wrap; background: rgba(0,0,0,0.2); }
        .search-input { 
            flex: 1; min-width: 140px; padding: 12px; border-radius: 12px; 
            border: 1px solid var(--cyan-glow); background: rgba(0, 0, 0, 0.5); 
            color: white; outline: none; font-size: 0.9rem;
        }

        .market-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; padding: 20px 5%; 
        }

        .tool-card {
            background: var(--deep-dark); padding: 20px; border-radius: 22px;
            border: 1px solid var(--cyan-glow); position: relative; 
            transition: 0.3s ease; backdrop-filter: blur(15px);
            display: flex; flex-direction: column; min-height: 250px;
        }
        .tool-card:hover { transform: translateY(-5px); border-color: var(--cyan-neon); }

        .sos-card { border: 2px solid var(--red) !important; box-shadow: 0 0 15px rgba(255, 77, 77, 0.2); }

        .category-tag { background: var(--cyan-neon); color: black; padding: 3px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: bold; margin-right: 5px; }
        .lost-bg { background: #f1c40f; color: #000; }
        .found-bg { background: #2ecc71; color: #000; }

        .post-time { font-size: 10px; color: #aaa; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        
        /* تصميم صندوق "طلب الشرح" ليوافق الداشبورد */
        .explanation-box {
            background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 10px;
            margin: 10px 0; font-size: 0.85rem; color: #eee; border-right: 3px solid var(--cyan-neon);
            line-height: 1.5;
        }

        .contact-btn { width: 100%; margin-top: auto; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        .admin-del-icon {
            position: absolute; top: 15px; left: 15px; color: var(--red);
            cursor: pointer; opacity: 0.5; font-size: 18px; z-index: 10;
        }
        .admin-del-icon:hover { opacity: 1; transform: scale(1.1); }

        @media (max-width: 600px) { .market-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span> العام</h1>
        <a href="dashboard.html" class="btn-back"><i class="fas fa-home"></i> الرئيسية</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن مادة، غرض، مفقودات..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 130px;" onchange="renderMarket()">
            <option value="all">كل الكليات</option>
            <option value="it">المعلوماتية</option>
            <option value="dent">الأسنان</option>
            <option value="pharm">الصيدلة</option>
            <option value="arch">العمارة</option>
            <option value="chemical">الكيمياء</option>
            <option value="petro">البترول</option>
            <option value="trans">الترجمة</option>
            <option value="lost">🔍 المفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // بيانات الأدمن (شهد الخالد)
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const ADMIN_PASS = "shjkshjk"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const collegeMap = { 'it': 'المعلوماتية', 'dent': 'الأسنان', 'pharm': 'الصيدلة', 'arch': 'العمارة', 'chemical': 'الكيمياء', 'petro': 'البترول', 'trans': 'الترجمة', 'عام': 'عام' };

    let cachedData = []; // لتسريع الظهور

    function fetchMarketData() {
        // جلب لحظي للبيانات لضمان السرعة
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                cachedData = [];
            } else {
                cachedData = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
            }
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;
        
        const currentUserName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const currentUserID = (localStorage.getItem("userID") || "").trim(); 
        const isSuperAdmin = (currentUserName === ADMIN_NAME.toLowerCase().trim() && currentUserID === ADMIN_ID.trim());

        let htmlContent = "";

        const filtered = cachedData.filter(item => {
            if (!item || !item.name) return false;

            const name = item.name.toLowerCase();
            const owner = (item.owner || "").toLowerCase();
            const explanation = (item.explanation || "").toLowerCase();
            const college = (item.college || "").toLowerCase();

            const matchesSearch = name.includes(searchTerm) || owner.includes(searchTerm) || explanation.includes(searchTerm);
            
            let matchesCollege = (filterCol === "all") || (college === filterCol);
            // خاصية فلترة المفقودات كما في الكود القديم
            if (filterCol === "lost") matchesCollege = name.includes("مفقود") || name.includes("موجود");

            return matchesSearch && matchesCollege;
        });

        if (filtered.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">لا توجد منشورات حالياً.. 🕸️</p>`;
            return;
        }

        filtered.forEach(item => {
            const isSOS = item.isSOS === true;
            const isOwner = (item.owner && item.owner.trim().toLowerCase() === currentUserName);
            
            // تحديد الحالة (مفقود/موجود)
            let statusTag = '';
            if(item.name.includes("مفقود")) statusTag = '<span class="status-badge lost-bg">مفقود</span>';
            else if(item.name.includes("موجود")) statusTag = '<span class="status-badge found-bg">موجود</span>';

            // التوافق مع خاصية الوقت fullTime من الداشبورد
            const displayTime = item.fullTime || item.date || "منذ قليل";

            htmlContent += `
                <div class="tool-card ${isSOS ? 'sos-card' : ''}">
                    ${(isSuperAdmin || isOwner) ? 
                        `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}', ${isSuperAdmin}, ${isOwner})" title="حذف"></i>` 
                        : ''}
                    
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <span class="category-tag">${collegeMap[item.college] || item.college || 'AUST'}</span>
                        ${statusTag}
                    </div>

                    <div class="post-time"><i class="far fa-clock"></i> ${displayTime}</div>
                    <div style="color:var(--cyan-neon); font-size:12px; font-weight:bold;">👤 ${item.owner}</div>
                    <h3 style="margin:8px 0; font-size: 1rem; color: #fff;">${item.name}</h3>
                    
                    ${item.explanation ? `
                        <div class="explanation-box">
                            <i class="fas fa-info-circle" style="color:var(--cyan-neon); margin-left:5px;"></i>
                            <b>التفاصيل:</b> ${item.explanation}
                        </div>` : ''}
                    
                    <button onclick="goToChat('${item.owner}', '${item.name}')" 
                            class="contact-btn"
                            style="background:${isSOS ? 'var(--red)' : 'var(--cyan-neon)'}; color:${isSOS ? 'white' : 'black'};">
                        ${isSOS ? 'تقديم مساعدة' : 'تواصل الآن'}
                    </button>
                </div>`;
        });

        grid.innerHTML = htmlContent;
    }

    function handleDelete(itemId, isGlobalAdmin, isOwner) {
        if (isGlobalAdmin) {
            Swal.fire({
                title: 'حذف إداري (شهد)',
                input: 'password',
                inputPlaceholder: 'كلمة السر shjkshjk..',
                showCancelButton: true,
                confirmButtonColor: '#ff4d4d',
                confirmButtonText: 'حذف نهائي',
                background: '#0a0a0f', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed && result.value === ADMIN_PASS) {
                    database.ref('globalMarket/' + itemId).remove();
                } else if (result.isConfirmed) {
                    Swal.fire({ icon: 'error', title: 'كلمة السر خطأ!', background: '#0a0a0f', color: '#fff' });
                }
            });
        } else if (isOwner) {
            Swal.fire({
                title: 'هل تريد حذف منشورك؟',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'نعم، احذف',
                background: '#0a0a0f', color: '#fff'
            }).then((res) => {
                if (res.isConfirmed) database.ref('globalMarket/' + itemId).remove();
            });
        }
    }

    function goToChat(owner, itemName) {
        const loggedUser = localStorage.getItem("userName") || "مستخدم";
        if (owner === loggedUser) {
            Swal.fire({ icon: 'info', title: 'تنبيه', text: 'هذا منشوركِ!', background: '#0a0a0f', color: '#fff' });
            return;
        }
        window.location.href = `chat.html?to=${encodeURIComponent(owner)}&item=${encodeURIComponent(itemName)}`;
    }

    window.onload = fetchMarketData;
</script>
</body>
</html>
