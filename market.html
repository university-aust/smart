<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --cyan-glow: rgba(0, 229, 255, 0.3);
            --red: #ff4d4d; 
            --red-glow: rgba(255, 77, 77, 0.5);
            --deep-dark: rgba(10, 11, 18, 0.75); 
        }

        body { 
            background: linear-gradient(rgba(10, 10, 15, 0.8), rgba(10, 10, 15, 0.8)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0, 0, 0, 0.6); 
            border-bottom: 1px solid var(--cyan-glow); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .header-nav h1 {
            font-size: clamp(16px, 4vw, 24px);
            background: linear-gradient(to bottom, #fff, var(--cyan-neon));
            -webkit-background-clip: text; background-clip: text; 
            -webkit-text-fill-color: transparent; margin: 0;
        }

        .btn-back { 
            background: rgba(0, 229, 255, 0.1); border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 6px 12px; border-radius: 10px; 
            text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 5px; font-size: 0.75rem;
        }

        .search-container { padding: 12px 5%; display: flex; gap: 8px; flex-wrap: wrap; background: rgba(0,0,0,0.3); }
        .search-input { 
            flex: 1; min-width: 120px; padding: 10px; border-radius: 10px; 
            border: 1px solid var(--cyan-glow); background: rgba(0, 0, 0, 0.5); 
            color: white; outline: none; font-size: 0.85rem;
        }

        /* تعديل نظام الشبكة لعرض حاويتين في الموبايل */
        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; padding: 15px 3%; 
        }

        .tool-card {
            background: var(--deep-dark); padding: 12px; border-radius: 18px;
            border: 1px solid rgba(0, 229, 255, 0.2); position: relative; 
            transition: 0.3s ease; 
            backdrop-filter: blur(10px); display: flex; flex-direction: column; min-height: 220px;
        }

        .sos-card { 
            border: 1.5px solid var(--red) !important; 
            background: rgba(255, 77, 77, 0.1) !important; 
            animation: sos-pulse 2s infinite; 
        }

        @keyframes sos-pulse {
            0% { box-shadow: 0 0 5px rgba(255, 77, 77, 0.3); }
            50% { box-shadow: 0 0 15px rgba(255, 77, 77, 0.5); }
            100% { box-shadow: 0 0 5px rgba(255, 77, 77, 0.3); }
        }

        .category-tag { background: var(--cyan-neon); color: black; padding: 2px 6px; border-radius: 6px; font-size: 8px; font-weight: bold; }
        .status-badge { font-size: 8px; padding: 2px 6px; border-radius: 5px; font-weight: bold; }
        .lost-bg { background: #f1c40f; color: #000; }
        .found-bg { background: #2ecc71; color: #000; }

        .post-time { font-size: 9px; color: #bbb; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
        
        .explanation-box {
            background: rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 8px;
            margin: 8px 0; font-size: 0.75rem; color: #f0f0f0; 
            border-right: 3px solid var(--cyan-neon); line-height: 1.3;
            overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        }

        .contact-btn { 
            width: 100%; margin-top: auto; padding: 10px; border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            font-size: 0.8rem;
        }

        .admin-del-icon {
            position: absolute; top: 10px; left: 10px; color: var(--red);
            cursor: pointer; opacity: 0.6; font-size: 14px; z-index: 10;
        }

        /* تنسيق خاص للشاشات الكبيرة */
        @media (min-width: 768px) {
            .market-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
            .tool-card { padding: 20px; min-height: 260px; }
            .category-tag, .status-badge { font-size: 10px; }
            .post-time { font-size: 10px; }
            .explanation-box { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span></h1>
        <a href="dashboard.html" class="btn-back"><i class="fas fa-home"></i> الرئيسية</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 110px;" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">المعلوماتية</option>
            <option value="dent">الأسنان</option>
            <option value="pharm">الصيدلة</option>
            <option value="arch">العمارة</option>
            <option value="lost">🔍 مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const ADMIN_PASS = "p@$$00rd"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const collegeMap = { 'it': 'IT', 'dent': 'أسنان', 'pharm': 'صيدلة', 'arch': 'عمارة', 'chemical': 'كيمياء', 'petro': 'بترول', 'trans': 'ترجمة', 'عام': 'عام' };

    let cachedData = [];

    function startListening() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;
        
        const currentUserName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const currentUserID = (localStorage.getItem("userID") || "").trim(); 
        const isSuperAdmin = (currentUserName === ADMIN_NAME.toLowerCase().trim() && currentUserID === ADMIN_ID.trim());

        let htmlContent = "";

        const filtered = cachedData.filter(item => {
            if (!item || !item.name) return false;
            const matchesSearch = item.name.toLowerCase().includes(searchTerm) || (item.owner || "").toLowerCase().includes(searchTerm);
            let matchesCollege = (filterCol === "all") || (item.college === filterCol);
            if (filterCol === "lost") matchesCollege = item.name.includes("مفقود") || item.name.includes("موجود");
            return matchesSearch && matchesCollege;
        });

        if (filtered.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5; font-size: 0.8rem;">لا يوجد نتائج.. 🕸️</p>`;
            return;
        }

        filtered.forEach(item => {
            const isSOS = item.isSOS === true;
            const isOwner = (item.owner && item.owner.trim().toLowerCase() === currentUserName);
            let statusTag = item.name.includes("مفقود") ? '<span class="status-badge lost-bg">مفقود</span>' : 
                             item.name.includes("موجود") ? '<span class="status-badge found-bg">موجود</span>' : '';

            htmlContent += `
                <div class="tool-card ${isSOS ? 'sos-card' : ''}">
                    ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}', ${isSuperAdmin}, ${isOwner})"></i>` : ''}
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span class="category-tag">${collegeMap[item.college] || 'AUST'}</span>
                        ${statusTag}
                    </div>
                    <div class="post-time"><i class="far fa-clock"></i> ${item.fullTime || item.date || 'الآن'}</div>
                    <div style="color:var(--cyan-neon); font-size:10px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">👤 ${item.owner}</div>
                    <h3 style="margin:5px 0; font-size: 0.85rem; color: #fff; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">${item.name}</h3>
                    ${item.explanation ? `<div class="explanation-box" style="border-right-color: ${isSOS ? 'var(--red)' : 'var(--cyan-neon)'}">${item.explanation}</div>` : ''}
                    <button onclick="goToChat('${item.owner}', '${item.name}')" class="contact-btn" style="background:${isSOS ? 'var(--red)' : 'var(--cyan-neon)'}; color:${isSOS ? 'white' : 'black'};">
                        <i class="fas fa-comments"></i> تواصل
                    </button>
                </div>`;
        });
        grid.innerHTML = htmlContent;
    }

    function handleDelete(itemId, isGlobalAdmin, isOwner) {
        const confirmAndDel = () => database.ref('globalMarket/' + itemId).remove();
        if (isGlobalAdmin) {
            Swal.fire({ title: 'حذف شهد', input: 'password', showCancelButton: true, confirmButtonColor: '#ff4d4d', background: '#0a0a0f', color: '#fff' })
            .then(res => { if(res.value === ADMIN_PASS) confirmAndDel(); });
        } else {
            Swal.fire({ title: 'حذف المنشور؟', icon: 'warning', showCancelButton: true, background: '#0a0a0f', color: '#fff' })
            .then(res => { if(res.isConfirmed) confirmAndDel(); });
        }
    }

    function goToChat(owner, itemName) {
        if (owner === localStorage.getItem("userName")) return;
        window.location.href = `chat.html?to=${encodeURIComponent(owner)}&item=${encodeURIComponent(itemName)}`;
    }

    window.onload = startListening;
</script>
</body>
</html>
