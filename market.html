<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --blue-glass: rgba(0, 40, 80, 0.6); /* أزرق غامق شفاف بنفس درجة الرادار */
            --red-glass: rgba(139, 0, 0, 0.5); /* أحمر الرادار الشفاف */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: #05050a url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0, 0, 0, 0.8); 
            border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }

        /* نظام الشبكة: حاويتان في الموبايل */
        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; padding: 15px 3%; 
        }

        /* التصميم الموحد لجميع الحاويات (زجاجي) */
        .tool-card {
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            padding: 15px;
            display: flex; flex-direction: column;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 200px;
        }

        /* تأثير الارتفاع عند الضغط */
        .tool-card:active {
            transform: translateY(-15px);
            z-index: 10;
        }

        /* اللون الأزرق الغامق للتبادل والمصادر */
        .exchange-card {
            background: var(--blue-glass);
            box-shadow: 0 8px 32px 0 rgba(0, 31, 63, 0.37);
        }

        /* اللون الأحمر للرادار */
        .sos-card { 
            background: var(--red-glass) !important; 
            box-shadow: 0 8px 32px 0 rgba(139, 0, 0, 0.37);
            border-color: rgba(255, 77, 77, 0.3) !important;
        }

        .category-tag { 
            background: rgba(255, 255, 255, 0.1); 
            color: #fff; padding: 2px 8px; border-radius: 6px; 
            font-size: 9px; align-self: flex-start;
        }

        .post-time { font-size: 9px; color: rgba(255,255,255,0.5); margin: 8px 0; }
        
        .post-owner { color: var(--cyan-neon); font-size: 10px; font-weight: bold; margin-bottom: 4px; }
        .post-name { margin: 0; font-size: 0.9rem; color: #fff; font-weight: 600; line-height: 1.3; }

        /* صندوق التفاصيل يظهر فقط في الرادار SOS */
        .explanation-box {
            background: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 10px;
            margin: 10px 0; font-size: 0.75rem; color: #eee; 
            border-right: 3px solid #ff4d4d;
        }

        .contact-btn { 
            width: 100%; margin-top: auto; padding: 10px; border: none; 
            border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            font-size: 0.8rem; background: rgba(255, 255, 255, 0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .contact-btn:hover { background: #fff; color: #000; }

        .admin-del-icon {
            position: absolute; top: 12px; left: 12px; color: rgba(255,255,255,0.3);
            cursor: pointer; font-size: 14px; z-index: 10;
        }

        @media (min-width: 768px) {
            .market-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1>معرض <span style="color:var(--cyan-neon)">AUST</span></h1>
        <a href="dashboard.html" style="color:#888; text-decoration:none; font-size:0.9rem;">رجوع</a>
    </div>

    <div class="search-container" style="padding: 10px 5%;">
        <input type="text" id="searchInput" placeholder="بحث سريع..." 
               style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.3); color:#fff;" oninput="renderMarket()">
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const firebaseConfig = { apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo", authDomain: "nabd-aust.firebaseapp.com", databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app", projectId: "nabd-aust", storageBucket: "nabd-aust.firebasestorage.app", messagingSenderId: "921777725948", appId: "1:921777725948:web:7b024d0aa101068bef9279" };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function startListening() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const myName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const myID = (localStorage.getItem("userID") || "").trim(); 

        let htmlContent = "";

        cachedData.forEach(item => {
            if (item.name.toLowerCase().includes(searchTerm)) {
                const isSOS = item.isSOS === true;
                const isOwner = (item.owner && item.owner.toLowerCase() === myName);
                const isSuperAdmin = (myName === ADMIN_NAME && myID === ADMIN_ID);
                const cardClass = isSOS ? 'sos-card' : 'exchange-card';

                htmlContent += `
                    <div class="tool-card ${cardClass}">
                        ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}')"></i>` : ''}
                        <span class="category-tag">${item.college || 'AUST'}</span>
                        <div class="post-time">${item.fullTime || 'الآن'}</div>
                        <div class="post-owner">👤 ${item.owner}</div>
                        <h3 class="post-name">${item.name}</h3>
                        
                        ${isSOS ? `<div class="explanation-box">${item.explanation || ''}</div>` : ''}
                        
                        <button onclick="goToChat('${item.owner}', '${item.name}')" class="contact-btn">
                            تواصل
                        </button>
                    </div>`;
            }
        });
        grid.innerHTML = htmlContent;
    }

    function handleDelete(itemId) {
        Swal.fire({ title: 'حذف؟', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ff4d4d', background: '#111', color: '#fff' })
        .then(res => { if(res.isConfirmed) database.ref('globalMarket/' + itemId).remove(); });
    }

    function goToChat(owner, itemName) {
        if (owner === localStorage.getItem("userName")) return;
        window.location.href = `chat.html?to=${encodeURIComponent(owner)}&item=${encodeURIComponent(itemName)}`;
    }

    window.onload = startListening;
</script>
</body>
</html>
