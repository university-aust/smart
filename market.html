<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --blue-glass: rgba(0, 40, 80, 0.7); 
            --red-glass: rgba(139, 0, 0, 0.6); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-glow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        body { 
            background: #0a0a0f url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 4%; background: rgba(0, 0, 0, 0.85); 
            border-bottom: 1px solid var(--cyan-neon); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-back { 
            color: var(--cyan-neon); text-decoration: none; font-weight: bold; 
            font-size: 0.8rem; border: 1px solid var(--cyan-neon);
            padding: 5px 12px; border-radius: 8px;
        }

        .search-container { padding: 10px 3%; display: flex; gap: 5px; background: rgba(0,0,0,0.5); }
        .search-input { 
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.1); color: white; font-size: 0.8rem; outline: none;
        }

        /* تعديل الشبكة لتصبح زوجية على الموبايل */
        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* كرتين دائماً */
            gap: 10px; 
            padding: 15px 10px; 
        }

        .tool-card {
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            padding: 10px;
            display: flex; flex-direction: column;
            position: relative;
            min-height: 200px; /* تقليل الطول ليناسب الشاشات الصغيرة */
            transition: 0.3s;
        }

        .exchange-card { background: var(--blue-glass); }
        .sos-card { background: var(--red-glass); border-color: #ff4d4d; }

        .category-tag { font-size: 9px; color: var(--cyan-neon); font-weight: bold; margin-bottom: 5px; display: block; }
        .post-owner { font-size: 10px; color: #ddd; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* تصغير العنوان ليناسب الكرتين */
        h3 { font-size: 0.85rem; margin: 5px 0; line-height: 1.2; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .explanation-box {
            background: rgba(0, 0, 0, 0.3); padding: 5px; border-radius: 5px;
            font-size: 0.7rem; color: #ccc; margin-bottom: 8px;
            max-height: 45px; overflow: hidden;
        }

        .contact-btn { 
            width: 100%; margin-top: auto; padding: 8px; border: none; 
            border-radius: 10px; font-weight: bold; font-size: 0.75rem;
            background: var(--cyan-neon); color: #000;
        }

        .admin-del-icon {
            position: absolute; top: 8px; left: 8px; color: rgba(255,255,255,0.6);
            font-size: 14px; z-index: 5;
        }

        /* للأجهزة الكبيرة (كمبيوتر) نرجعها 4 كروت */
        @media (min-width: 768px) {
            .market-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 30px 5%; }
            .tool-card { min-height: 250px; padding: 15px; }
            h3 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1 style="font-size: 1.1rem;">معرض <span style="color:var(--cyan-neon)">Smart Pulse</span></h1>
        <a href="dashboard.html" class="btn-back">الرئيسية</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="بحث..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 100px;" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">IT</option>
            <option value="dent">أسنان</option>
            <option value="pharm">صيدلة</option>
            <option value="lost">مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const ADMIN_PASS = "shjkshjk"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const collegeMap = { 'it': 'المعلوماتية', 'dent': 'الأسنان', 'pharm': 'الصيدلة', 'arch': 'العمارة', 'chemical': 'الكيمياء', 'petro': 'البترول', 'trans': 'الترجمة', 'عام': 'عام' };

    let cachedData = [];

    function startListening() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;
        
        const currentUserName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const currentUserID = (localStorage.getItem("universityID") || "").trim(); 
        const isSuperAdmin = (currentUserName === ADMIN_NAME.toLowerCase().trim() && currentUserID === ADMIN_ID.trim());

        let htmlContent = "";

        const filtered = cachedData.filter(item => {
            const matchesSearch = item.name.toLowerCase().includes(searchTerm) || (item.owner || "").toLowerCase().includes(searchTerm);
            let matchesCollege = (filterCol === "all") || (item.college === filterCol);
            if (filterCol === "lost") matchesCollege = item.name.includes("مفقود") || item.name.includes("موجود");
            return matchesSearch && matchesCollege;
        });

        filtered.forEach(item => {
            const isSOS = item.isSOS === true;
            const postOwnerID = (item.ownerID || ""); 
            const isOwner = (postOwnerID === currentUserID);
            const cardClass = isSOS ? 'sos-card' : 'exchange-card';

            htmlContent += `
                <div class="tool-card ${cardClass}">
                    ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}', ${isSuperAdmin})"></i>` : ''}
                    <span class="category-tag">${collegeMap[item.college] || 'AUST'}</span>
                    <div class="post-owner">👤 ${item.owner}</div>
                    <h3>${item.name}</h3>
                    ${item.explanation ? `<div class="explanation-box">${item.explanation}</div>` : ''}
                    <button onclick="goToChat('${item.owner}', '${item.name}', '${postOwnerID}')" class="contact-btn">مراسلة</button>
                </div>`;
        });
        grid.innerHTML = htmlContent || `<p style="grid-column: 1/-1; text-align:center;">لا توجد منشورات</p>`;
    }

    function handleDelete(itemId, isGlobalAdmin) {
        if (isGlobalAdmin) {
            Swal.fire({ title: 'كلمة مرور المسؤول', input: 'password', background: '#0a0a0f', color: '#fff' })
            .then(res => { if(res.value === ADMIN_PASS) database.ref('globalMarket/' + itemId).remove(); });
        } else {
            Swal.fire({ title: 'حذف المنشور؟', icon: 'warning', showCancelButton: true })
            .then(res => { if(res.isConfirmed) database.ref('globalMarket/' + itemId).remove(); });
        }
    }

    function goToChat(ownerName, itemName, ownerID) {
        if (ownerID === localStorage.getItem("universityID")) return;
        window.location.href = `chat.html?to=${encodeURIComponent(ownerName)}&item=${encodeURIComponent(itemName)}&toID=${ownerID}`;
    }

    window.onload = startListening;
</script>
</body>
</html>
