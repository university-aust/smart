<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --cyan-glow: rgba(0, 229, 255, 0.3);
            --red: #ff4d4d; 
            --deep-dark: rgba(9, 10, 15, 0.9);
        }

        body { 
            background: #0a0a0f url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 4%; background: rgba(0,0,0,0.7); 
            border-bottom: 1px solid var(--cyan-glow); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .header-nav h1 {
            font-size: clamp(14px, 4vw, 22px);
            background: linear-gradient(to bottom, #fff, var(--cyan-neon));
           -webkit-background-clip: text; background-clip: text; 
           -webkit-text-fill-color: transparent; margin: 0;
        }

        .btn-back { 
            background: rgba(0, 229, 255, 0.1); border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 6px 12px; border-radius: 10px; 
            text-decoration: none; font-weight: bold; font-size: 0.8rem;
        }

        .search-container { 
            padding: 15px 4%; display: flex; gap: 8px; flex-wrap: wrap; background: rgba(0,0,0,0.3);
        }
        .search-input { 
            flex: 1; min-width: 120px; padding: 10px; border-radius: 12px; 
            border: 1px solid var(--cyan-glow); background: rgba(0, 0, 0, 0.6); 
            color: white; outline: none; font-size: 0.85rem;
        }

        /* تعديل الشبكة لعرض عنصرين في الهاتف */
        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 12px; padding: 15px 4%; 
        }

        .tool-card {
            background: var(--deep-dark); padding: 12px; border-radius: 18px;
            border: 1px solid var(--cyan-glow); position: relative; 
            transition: 0.3s ease; backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 220px; /* لتوحيد الارتفاع */
        }

        .sos-card { border: 1.5px solid var(--red) !important; background: rgba(255, 77, 77, 0.05) !important; }

        .category-tag { background: var(--cyan-neon); color: black; padding: 2px 6px; border-radius: 6px; font-size: 9px; font-weight: bold; }
        .status-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .lost-bg { background: #f1c40f; color: #000; }
        .found-bg { background: #2ecc71; color: #000; }

        .post-time { font-size: 9px; color: #aaa; margin: 5px 0; display: flex; align-items: center; gap: 3px; }
        
        .owner-name { color: var(--cyan-neon); font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .item-title { margin: 8px 0; font-size: 0.9rem; color: #fff; line-height: 1.3; height: 2.6em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .contact-btn { 
            width: 100%; padding: 10px; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; font-size: 0.8rem;
            transition: 0.2s; margin-top: 5px;
        }

        .admin-del-icon {
            position: absolute; top: 10px; left: 10px; color: var(--red);
            cursor: pointer; opacity: 0.7; font-size: 16px; z-index: 10;
        }

        /* تحسينات الشاشات الكبيرة */
        @media (min-width: 768px) {
            .market-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
            .tool-card { padding: 20px; min-height: 260px; }
            .item-title { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span> العام</h1>
        <a href="dashboard.html" class="btn-back"><i class="fas fa-home"></i> الرئيسية</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث هنا..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 110px;" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">المعلوماتية</option>
            <option value="dent">الأسنان</option>
            <option value="pharm">الصيدلة</option>
            <option value="arch">العمارة</option>
            <option value="chemical">الكيمياء</option>
            <option value="petro">البترول</option>
            <option value="trans">الترجمة</option>
            <option value="lost">🔍 المفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const ADMIN_PASS = "shjkshjk"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const collegeMap = { 'it': 'المعلوماتية', 'dent': 'الأسنان', 'pharm': 'الصيدلة', 'arch': 'العمارة', 'chemical': 'الكيمياء', 'petro': 'البترول', 'trans': 'الترجمة', 'عام': 'عام' };

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;
        
        const currentUserName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const currentUserID = (localStorage.getItem("userID") || "").trim(); 
        const isSuperAdmin = (currentUserName === ADMIN_NAME.toLowerCase().trim() && currentUserID === ADMIN_ID.trim());

        database.ref('globalMarket/').once('value', (snapshot) => {
            const data = snapshot.val();
            grid.innerHTML = "";
            if (!data) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5; margin-top:50px;">لا توجد منشورات حالياً.. 🕸️</p>`;
                return;
            }

            const items = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();

            items.forEach(item => {
                const name = (item.name || "").toLowerCase();
                const owner = (item.owner || "").toLowerCase();
                const col = (item.college || "").toLowerCase();

                // التحقق من الفلتر والبحث
                const matchesSearch = name.includes(searchTerm) || owner.includes(searchTerm);
                let matchesCollege = (filterCol === "all") || (col === filterCol);
                if (filterCol === "lost") matchesCollege = name.includes("مفقود") || name.includes("موجود") || name.includes("لقيت");

                if (matchesSearch && matchesCollege) {
                    const isSOS = item.isSOS === true;
                    const isOwner = (owner === currentUserName);
                    
                    let statusTag = '';
                    if(name.includes("مفقود")) statusTag = '<span class="status-badge lost-bg">مفقود</span>';
                    else if(name.includes("موجود") || name.includes("لقيت")) statusTag = '<span class="status-badge found-bg">موجود</span>';

                    grid.innerHTML += `
                        <div class="tool-card ${isSOS ? 'sos-card' : ''}">
                            ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}', ${isSuperAdmin}, ${isOwner})"></i>` : ''}
                            
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="category-tag">${collegeMap[item.college] || 'AUST'}</span>
                                ${isSOS ? '<span style="color:var(--red); font-size:14px;">🆘</span>' : statusTag}
                            </div>

                            <div>
                                <div class="post-time"><i class="far fa-clock"></i> ${item.date || 'الآن'}</div>
                                <div class="owner-name">👤 ${item.owner}</div>
                                <h3 class="item-title">${item.name}</h3>
                            </div>
                            
                            <button onclick="goToChat('${item.owner}', '${item.name}')" 
                                    class="contact-btn"
                                    style="background:${isSOS ? 'var(--red)' : 'var(--cyan-neon)'}; color:${isSOS ? 'white' : 'black'};">
                                ${isSOS ? 'مساعدة' : 'تواصل'}
                            </button>
                        </div>`;
                }
            });
        });
    }

    // تم إبقاء وظائف الحذف والدردشة كما هي لضمان عمل النظام
    function handleDelete(itemId, isGlobalAdmin, isOwner) {
        if (isGlobalAdmin) {
            Swal.fire({ title: 'حذف إداري', input: 'password', inputPlaceholder: 'كلمة السر الإدارية..', showCancelButton: true, confirmButtonColor: '#ff4d4d', background: '#0a0a0f', color: '#fff' }).then((result) => {
                if (result.isConfirmed && result.value === ADMIN_PASS) {
                    database.ref('globalMarket/' + itemId).remove().then(() => renderMarket());
                } else if (result.isConfirmed) {
                    Swal.fire({ icon: 'error', title: 'خطأ!' });
                }
            });
        } else if (isOwner) {
            Swal.fire({ title: 'حذف المنشور؟', icon: 'warning', showCancelButton: true, background: '#0a0a0f', color: '#fff' }).then((res) => {
                if (res.isConfirmed) database.ref('globalMarket/' + itemId).remove().then(() => renderMarket());
            });
        }
    }

    function goToChat(owner, itemName) {
        const loggedUser = localStorage.getItem("userName") || "مستخدم";
        if (owner === loggedUser) return Swal.fire({ icon: 'info', title: 'منشورك الشخصي' });
        
        window.location.href = `chat.html?to=${encodeURIComponent(owner)}&item=${encodeURIComponent(itemName)}`;
    }

    // استخدام مراقب التغييرات الحقيقي لضمان التحديث اللحظي
    database.ref('globalMarket/').on('value', renderMarket);
</script>
</body>
</html>
