<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; --blue-glass: rgba(0, 40, 80, 0.6); 
            --red-glass: rgba(139, 0, 0, 0.5); --glass-border: rgba(255, 255, 255, 0.1);
            --neon-glow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        body { 
            background: #0a0a0f url('67260.jpg') no-repeat center center fixed;
            background-size: cover; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; 
        }

        /* هيدر ثابت وسريع */
        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 5%; background: rgba(0, 0, 0, 0.85); 
            border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-back { 
            background: transparent; border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 7px 15px; border-radius: 10px; 
            text-decoration: none; font-weight: bold; font-size: 0.85rem;
        }

        .search-container { padding: 10px 5%; display: flex; gap: 8px; background: rgba(0,0,0,0.3); }
        .search-input { 
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); 
            background: rgba(255,255,255,0.1); color: white; outline: none;
        }

        .market-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px; padding: 20px 5%; 
        }

        .tool-card {
            background: var(--blue-glass); backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid var(--glass-border);
            padding: 18px; display: flex; flex-direction: column; position: relative;
            transition: 0.3s; min-height: 220px;
        }

        .tool-card:hover { border-color: var(--cyan-neon); box-shadow: var(--neon-glow); }
        .sos-card { background: var(--red-glass); border-color: rgba(255, 77, 77, 0.3); }

        .admin-del-icon {
            position: absolute; top: 12px; left: 12px; color: #ff4d4d;
            cursor: pointer; font-size: 1.1rem; opacity: 0.7; transition: 0.3s;
        }
        .admin-del-icon:hover { opacity: 1; transform: scale(1.2); }

        .post-owner { color: var(--cyan-neon); font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .explanation-box { 
            background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; 
            font-size: 0.8rem; margin: 10px 0; border-right: 3px solid var(--cyan-neon);
        }

        .contact-btn { 
            width: 100%; padding: 10px; border: 1px solid var(--cyan-neon);
            border-radius: 12px; background: transparent; color: var(--cyan-neon);
            font-weight: bold; cursor: pointer; margin-top: auto;
        }
        .contact-btn:hover { background: var(--cyan-neon); color: black; }
    </style>
</head>
<body>

    <nav class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span></h1>
        <a href="dashboard.html" class="btn-back">الرئيسية</a>
    </nav>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex:0; min-width:100px;" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">IT</option>
            <option value="dent">أسنان</option>
            <option value="pharm">صيدلة</option>
            <option value="lost">مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // بيانات الأدمن (شهد)
    const ADMIN_ID = "20241600060"; 
    const currentUserID = localStorage.getItem("userID");

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let cachedData = [];

    // جلب البيانات فوراً بدون انتظار شاشات تحميل
    function startApp() {
        if (!currentUserID) { window.location.href = "login.html"; return; }

        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;

        let html = "";
        const filtered = cachedData.filter(item => {
            const matchSearch = (item.name || "").toLowerCase().includes(searchTerm);
            const matchCol = (filterCol === "all") || (item.college === filterCol);
            return matchSearch && matchCol;
        });

        filtered.forEach(item => {
            const isOwner = (item.ownerID === currentUserID || currentUserID === ADMIN_ID);
            const cardType = item.isSOS ? 'sos-card' : '';

            html += `
                <div class="tool-card ${cardType}">
                    ${isOwner ? `<i class="fas fa-trash-alt admin-del-icon" onclick="deleteItem('${item.id}')"></i>` : ''}
                    <div class="post-owner">👤 ${item.owner}</div>
                    <div style="font-size:0.7rem; opacity:0.6;">${item.fullTime || ''}</div>
                    <h3 style="font-size:0.9rem; margin:10px 0;">${item.name}</h3>
                    ${item.explanation ? `<div class="explanation-box">${item.explanation}</div>` : ''}
                    <button class="contact-btn" onclick="goToChat('${item.owner}', '${item.ownerID}')">تواصل الآن</button>
                </div>`;
        });
        grid.innerHTML = html || `<p style="text-align:center; grid-column:1/-1;">لا يوجد منشورات حالياً</p>`;
    }

    // دالة الحذف النهائية والأكيدة
    function deleteItem(id) {
        Swal.fire({
            title: 'هل أنتِ متأكدة؟',
            text: "سيتم حذف المنشور نهائياً من القاعدة",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'نعم، احذف',
            cancelButtonText: 'إلغاء'
        }).then((result) => {
            if (result.isConfirmed) {
                // الحذف الفعلي من السيرفر
                database.ref('globalMarket/' + id).remove()
                .then(() => {
                    Swal.fire('تم الحذف!', 'اختفى المنشور من العرض.', 'success');
                })
                .catch((error) => {
                    Swal.fire('خطأ!', 'فشل الحذف: ' + error.message, 'error');
                });
            }
        });
    }

    function goToChat(name, id) {
        if (id === currentUserID) return Swal.fire('تنبيه', 'هذا منشورك!', 'info');
        window.location.href = `chat.html?toID=${id}&toName=${encodeURIComponent(name)}`;
    }

    startApp();
</script>
</body>
</html>
