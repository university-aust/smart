<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --blue-glass: rgba(0, 40, 80, 0.6); 
            --red-glass: rgba(139, 0, 0, 0.5); 
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-glow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        body { 
            background: linear-gradient(rgba(10, 10, 15, 0.7), rgba(10, 10, 15, 0.7)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* حاجز الحماية */
        #secure-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0f; z-index: 9999; display: flex;
            justify-content: center; align-items: center;
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0, 0, 0, 0.8); 
            border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-back { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 8px 18px; border-radius: 12px; 
            text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        .btn-back:hover { background: var(--cyan-neon); color: #000; box-shadow: var(--neon-glow); }

        .search-container { padding: 15px 5%; display: flex; gap: 10px; flex-wrap: wrap; background: rgba(0,0,0,0.4); }
        .search-input { 
            flex: 1; min-width: 150px; padding: 12px; border-radius: 12px; 
            border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.5); 
            color: white; outline: none; font-size: 0.9rem; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--cyan-neon); box-shadow: var(--neon-glow); }

        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; padding: 25px 5%; 
        }

        .tool-card {
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            padding: 20px;
            display: flex; flex-direction: column;
            position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 250px;
        }

        .tool-card:hover { transform: translateY(-8px); border-color: var(--cyan-neon); box-shadow: var(--neon-glow); }

        .exchange-card { background: var(--blue-glass); }
        .sos-card { background: var(--red-glass) !important; border-color: rgba(255, 77, 77, 0.3) !important; }

        .category-tag { background: rgba(255, 255, 255, 0.15); color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .post-time { font-size: 11px; color: rgba(255,255,255,0.6); margin: 12px 0; }
        .post-owner { color: var(--cyan-neon); font-size: 12px; font-weight: bold; margin-bottom: 6px; }
        
        .explanation-box {
            background: rgba(0, 0, 0, 0.25); padding: 12px; border-radius: 12px;
            margin: 10px 0; font-size: 0.85rem; color: #eee; 
            border-right: 4px solid var(--cyan-neon); line-height: 1.4;
        }
        .sos-card .explanation-box { border-right-color: #ff4d4d; }

        .contact-btn { 
            width: 100%; margin-top: auto; padding: 12px; border: none; 
            border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            font-size: 0.9rem; background: rgba(255, 255, 255, 0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .contact-btn:hover { background: var(--cyan-neon); color: #000; border-color: var(--cyan-neon); }

        .admin-del-icon {
            position: absolute; top: 15px; left: 15px; color: rgba(255,255,255,0.5);
            cursor: pointer; font-size: 18px; z-index: 10; transition: 0.3s;
        }
        .admin-del-icon:hover { color: #ff4d4d; transform: scale(1.2); }
    </style>
</head>
<body>

    <div id="secure-overlay"><h2>جاري مزامنة البيانات...</h2></div>

    <div class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span></h1>
        <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-right"></i> لوحة التحكم</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن مادة، غرض، أو طالب..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 140px;" onchange="renderMarket()">
            <option value="all">كل الكليات</option>
            <option value="it">المعلوماتية</option>
            <option value="dent">الأسنان</option>
            <option value="pharm">الصيدلة</option>
            <option value="arch">العمارة</option>
            <option value="lost">🔍 مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // --- إعدادات الأمان (Security Logic) ---
    const sessionToken = localStorage.getItem("sessionToken");
    const currentUserID = localStorage.getItem("userID");
    const currentUserName = (localStorage.getItem("userName") || "").trim();

    // التحقق الفوري من الهوية
    if (!sessionToken || !currentUserID) {
        window.location.href = "login.html";
    }

    const ADMIN_ID = "20241600060"; 
    const ADMIN_PASS = "shjkshjk"; 

    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const collegeMap = { 'it': 'IT', 'dent': 'أسنان', 'pharm': 'صيدلة', 'arch': 'عمارة', 'chemical': 'كيمياء', 'petro': 'بترول', 'trans': 'ترجمة', 'عام': 'عام' };
    let cachedData = [];

    // جلب البيانات مع نظام الكاش السريع
    function startListening() {
        // فحص وجود المستخدم في القاعدة لزيادة الأمان
        database.ref('users/' + currentUserID).once('value').then(snap => {
            if(!snap.exists()) { localStorage.clear(); window.location.href="login.html"; }
            
            document.getElementById("secure-overlay").remove();

            database.ref('globalMarket/').on('value', (snapshot) => {
                const data = snapshot.val();
                cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
                renderMarket();
            });
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filterCol = document.getElementById("filterCollege").value;
        
        // التحقق من صلاحية الأدمن
        const isSuperAdmin = (currentUserID === ADMIN_ID);

        let htmlContent = "";

        const filtered = cachedData.filter(item => {
            const matchesSearch = (item.name || "").toLowerCase().includes(searchTerm) || (item.owner || "").toLowerCase().includes(searchTerm);
            let matchesCollege = (filterCol === "all") || (item.college === filterCol);
            if (filterCol === "lost") matchesCollege = item.name.includes("مفقود") || item.name.includes("موجود");
            return matchesSearch && matchesCollege;
        });

        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; opacity: 0.5;">
                <i class="fas fa-box-open" style="font-size: 3rem; display: block; margin-bottom: 10px;"></i>
                لا توجد منشورات حالياً..
            </div>`;
            return;
        }

        filtered.forEach(item => {
            const isSOS = item.isSOS === true;
            const isOwner = (item.ownerID === currentUserID); // الأمان يعتمد على الـ ID وليس الاسم
            const cardClass = isSOS ? 'sos-card' : 'exchange-card';

            htmlContent += `
                <div class="tool-card ${cardClass}">
                    ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}', ${isSuperAdmin})"></i>` : ''}
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="category-tag">${collegeMap[item.college] || 'AUST'}</span>
                        ${isOwner ? '<span style="font-size:10px; color:var(--cyan-neon)">● منشورك</span>' : ''}
                    </div>
                    <div class="post-time"><i class="far fa-clock"></i> ${item.fullTime || 'الآن'}</div>
                    <div class="post-owner">👤 ${item.owner}</div>
                    <h3 style="margin:5px 0; font-size: 1rem; color: #fff;">${item.name}</h3>
                    
                    ${item.explanation ? `<div class="explanation-box">${item.explanation}</div>` : ''}
                    
                    <button onclick="goToChat('${item.owner}', '${item.name}', '${item.ownerID}')" class="contact-btn">
                        <i class="fas fa-comments"></i> مراسلة صاحب المنشور
                    </button>
                </div>`;
        });
        grid.innerHTML = htmlContent;
    }

    function handleDelete(itemId, isGlobalAdmin) {
        if (isGlobalAdmin) {
            Swal.fire({ 
                title: 'حذف المسؤول', 
                text: 'أدخل رمز الحماية للتأكيد',
                input: 'password', 
                showCancelButton: true, 
                confirmButtonColor: '#ff4d4d',
                background: '#0a0a0f', 
                color: '#fff' 
            }).then(res => { 
                if(res.value === ADMIN_PASS) {
                    database.ref('globalMarket/' + itemId).remove();
                } else if (res.value) {
                    Swal.fire('خطأ', 'رمز الحماية غير صحيح', 'error');
                }
            });
        } else {
            Swal.fire({ 
                title: 'حذف المنشور؟', 
                icon: 'warning', 
                showCancelButton: true, 
                confirmButtonText: 'نعم، احذف',
                cancelButtonText: 'إلغاء',
                background: '#0a0a0f', 
                color: '#fff' 
            }).then(res => { 
                if(res.isConfirmed) database.ref('globalMarket/' + itemId).remove();
            });
        }
    }

    function goToChat(ownerName, itemName, ownerID) {
        if (ownerID === currentUserID) {
            Swal.fire({ text: 'لا يمكنك مراسلة نفسك!', icon: 'info', background: '#0a0a0f', color: '#fff', timer: 1500, showConfirmButton: false });
            return;
        }
        // التوجيه للدردشة باستخدام الـ ID لضمان الدقة
        window.location.href = `chat.html?toID=${ownerID}&toName=${encodeURIComponent(ownerName)}&item=${encodeURIComponent(itemName)}`;
    }

    window.onload = startListening;
</script>
</body>
</html>
