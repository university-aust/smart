<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض العام | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --cyan-neon: #00e5ff; 
            --cyan-glow: rgba(0, 229, 255, 0.15);
            --red: #ff4d4d; 
            --red-glow: rgba(255, 77, 77, 0.15);
            --deep-dark: rgba(10, 11, 18, 0.85); 
        }

        body { 
            background: linear-gradient(rgba(5, 5, 10, 0.9), rgba(5, 5, 10, 0.9)), url('67260.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        .header-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0, 0, 0, 0.7); 
            border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .header-nav h1 { font-size: clamp(16px, 4vw, 24px); color: #fff; margin: 0; }

        .btn-back { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--cyan-neon); 
            color: var(--cyan-neon); padding: 6px 15px; border-radius: 10px; 
            text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 5px; font-size: 0.8rem;
        }

        .search-container { padding: 12px 5%; display: flex; gap: 8px; flex-wrap: wrap; background: rgba(0,0,0,0.4); }
        .search-input { 
            flex: 1; min-width: 120px; padding: 10px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); background: rgba(0, 0, 0, 0.5); 
            color: white; outline: none; font-size: 0.85rem;
        }

        /* نظام الشبكة: حاويتان في الموبايل */
        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; padding: 15px 3%; 
        }

        /* الحاوية الزجاجية (للتبادل والمصادر) */
        .tool-card {
            background: var(--cyan-glow); 
            backdrop-filter: blur(12px);
            padding: 12px; border-radius: 18px;
            border: 1px solid rgba(0, 229, 255, 0.2); 
            position: relative; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            display: flex; flex-direction: column; min-height: 200px;
        }

        /* تأثير الارتفاع عند الضغط أو اللمس */
        .tool-card:active {
            transform: translateY(-10px) scale(1.02);
            z-index: 5;
        }

        /* حاوية الرادار الزجاجية الحمراء */
        .sos-card { 
            border: 1.5px solid rgba(255, 77, 77, 0.4) !important; 
            background: var(--red-glow) !important; 
        }

        .category-tag { background: rgba(255,255,255,0.1); color: var(--cyan-neon); padding: 2px 6px; border-radius: 6px; font-size: 8px; font-weight: bold; border: 1px solid rgba(0,229,255,0.2); }
        .post-time { font-size: 9px; color: #888; margin: 8px 0; display: flex; align-items: center; gap: 4px; }
        
        .explanation-box {
            background: rgba(0, 0, 0, 0.2); padding: 8px; border-radius: 8px;
            margin-bottom: 10px; font-size: 0.75rem; color: #ddd; 
            border-right: 3px solid var(--red); line-height: 1.3;
        }

        .contact-btn { 
            width: 100%; margin-top: auto; padding: 10px; border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; 
            font-size: 0.8rem; background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .contact-btn:hover { background: var(--cyan-neon); color: #000; }

        .admin-del-icon {
            position: absolute; top: 10px; left: 10px; color: #666;
            cursor: pointer; font-size: 14px; z-index: 10; transition: 0.3s;
        }
        .admin-del-icon:hover { color: var(--red); }

        @media (min-width: 768px) {
            .market-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .tool-card { padding: 20px; min-height: 240px; }
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <h1>🌐 معرض <span style="color:var(--cyan-neon)">AUST</span></h1>
        <a href="dashboard.html" class="btn-back">رجوع</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث..." oninput="renderMarket()">
        <select id="filterCollege" class="search-input" style="flex: 0; min-width: 100px;" onchange="renderMarket()">
            <option value="all">الكل</option>
            <option value="it">IT</option>
            <option value="lost">مفقودات</option>
        </select>
    </div>

    <div id="marketGrid" class="market-grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
    const ADMIN_NAME = "shahed mamdoh alkhald";
    const ADMIN_ID = "20241600060";
    const ADMIN_PASS = "shjkshjk"; 

    const firebaseConfig = { apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo", authDomain: "nabd-aust.firebaseapp.com", databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app", projectId: "nabd-aust", storageBucket: "nabd-aust.firebasestorage.app", messagingSenderId: "921777725948", appId: "1:921777725948:web:7b024d0aa101068bef9279" };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let cachedData = [];

    // تحديث الأمان: الاستماع للبيانات فقط بعد التأكد من الهوية
    firebase.auth().onAuthStateChanged((user) => {
        if (user) { startListening(); } 
        else { window.location.href = "login.html"; }
    });

    function startListening() {
        database.ref('globalMarket/').on('value', (snapshot) => {
            const data = snapshot.val();
            cachedData = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse() : [];
            renderMarket();
        });
    }

    function renderMarket() {
        const grid = document.getElementById("marketGrid");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const myName = (localStorage.getItem("userName") || "").trim().toLowerCase();
        const myID = (localStorage.getItem("userID") || "").trim(); 
        const isSuperAdmin = (myName === ADMIN_NAME && myID === ADMIN_ID);

        let htmlContent = "";

        const filtered = cachedData.filter(item => {
            if (!item || !item.name) return false;
            return item.name.toLowerCase().includes(searchTerm) || (item.owner || "").toLowerCase().includes(searchTerm);
        });

        filtered.forEach(item => {
            const isSOS = item.isSOS === true;
            const itemOwner = (item.owner || "").trim().toLowerCase();
            const isOwner = (itemOwner === myName);
            const cardClass = isSOS ? 'sos-card' : 'exchange-card';

            htmlContent += `
                <div class="tool-card ${cardClass}">
                    ${(isSuperAdmin || isOwner) ? `<i class="fas fa-trash-alt admin-del-icon" onclick="handleDelete('${item.id}', ${isSuperAdmin})"></i>` : ''}
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="category-tag">${item.college || 'AUST'}</span>
                    </div>
                    <div class="post-time"><i class="far fa-clock"></i> ${item.fullTime || 'الآن'}</div>
                    <div style="color:var(--cyan-neon); font-size:10px; font-weight:bold;">👤 ${item.owner}</div>
                    <h3 style="margin:5px 0; font-size: 0.85rem; color: #fff;">${item.name}</h3>
                    
                    ${isSOS && item.explanation ? `<div class="explanation-box">${item.explanation}</div>` : ''}
                    
                    <button onclick="goToChat('${item.owner}', '${item.name}')" class="contact-btn">
                        تواصل
                    </button>
                </div>`;
        });
        grid.innerHTML = htmlContent || `<p style="grid-column: 1/-1; text-align:center; opacity:0.5;">لا يوجد نتائج</p>`;
    }

    function handleDelete(itemId, isGlobalAdmin) {
        if (isGlobalAdmin) {
            Swal.fire({ title: 'تأكيد الحذف (شهد)', input: 'password', showCancelButton: true, confirmButtonColor: '#ff4d4d', background: '#0a0a0f', color: '#fff' })
            .then(res => { if(res.value === ADMIN_PASS) database.ref('globalMarket/' + itemId).remove(); });
        } else {
            Swal.fire({ title: 'حذف المنشور؟', icon: 'warning', showCancelButton: true, background: '#0a0a0f', color: '#fff' })
            .then(res => { if(res.isConfirmed) database.ref('globalMarket/' + itemId).remove(); });
        }
    }

    function goToChat(owner, itemName) {
        if (owner === localStorage.getItem("userName")) {
            Swal.fire({ title: 'هذا منشورك!', icon: 'info', background: '#0a0a0f', color: '#fff' });
            return;
        }
        window.location.href = `chat.html?to=${encodeURIComponent(owner)}&item=${encodeURIComponent(itemName)}`;
    }
</script>
</body>
</html>
</html>
