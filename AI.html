<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة شهد الخالد | AI Pulse</title>
    <style>
        :root { --cyan: #00e5ff; --gold: #f1c40f; --dark: #0a0b10; --red: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { height: 100%; overflow: hidden; background: #000; }
        body { background: url('67260.jpg') no-repeat center center fixed; background-size: cover; display: flex; flex-direction: column; }

        .top-bar { height: 60px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--cyan); z-index: 1100; }
        .dashboard { flex: 1; display: flex; position: relative; overflow: hidden; }

        .sidebar { 
            width: 280px; background: rgba(10, 11, 16, 0.98); padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            border-left: 1px solid var(--cyan); transition: 0.3s ease; z-index: 1050; height: 100%;
        }

        .timer-box { background: rgba(0, 229, 255, 0.05); border: 1px solid var(--cyan); border-radius: 12px; padding: 10px; text-align: center; }
        #timer { font-family: monospace; color: var(--cyan); font-size: 22px; display: block; }

        .chat-container { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); position: relative; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }

        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .user-msg { align-self: flex-start; background: var(--cyan); color: #000; border-bottom-left-radius: 2px; }
        .ai-msg { align-self: flex-end; background: rgba(255,255,255,0.1); border: 1px solid var(--cyan); border-bottom-right-radius: 2px; color: white; }

        .input-area { 
            position: absolute; bottom: 0; width: 100%; background: #0a0b10; padding: 12px 15px; 
            display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--cyan);
        }
        #aiInput { flex: 1; height: 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); border-radius: 22px; color: white; padding: 10px 18px; outline: none; resize: none; }
        .btn-send { background: var(--cyan); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) { .sidebar { position: absolute; right: -280px; } .sidebar.active { right: 0; } }
    </style>
</head>
<body>

<div class="top-bar">
    <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--cyan); font-size:28px;">☰</button>
    <div style="color: var(--cyan); font-weight: bold; font-size: 14px;">AUST SMART PULSE</div>
    <div style="width: 24px;"></div>
</div>

<div class="dashboard">
    <aside class="sidebar" id="sidebar">
        <h2 id="userNameDisplay" style="color:var(--gold); font-size:18px;">شهد الخالد</h2>
        <div class="timer-box">
            <span id="timer">00:00:00</span>
        </div>
        <button onclick="location.reload()" style="width:100%; padding:10px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">محادثة جديدة</button>
        <select id="majorSelector" onchange="updateGreetingBySelection()" style="width:100%; padding:10px; background:#000; color:white; border:1px solid var(--cyan); border-radius:8px;">
            <option>هندسة المعلوماتية</option>
            <option>طب الأسنان</option>
            <option>الصيدلة</option>
            <option>هندسة البترول</option>
        </select>
        <a href="dashboard.html" style="text-align:center; color:var(--cyan); text-decoration:none; font-size:11px; padding:10px; border:1px solid var(--cyan); border-radius:8px; margin-top: auto;">خروج</a>
    </aside>

    <main class="chat-container">
        <div id="chatBox"></div>
        <div class="input-area">
            <textarea id="aiInput" placeholder="اكتبي سؤالك هنا يا شهد..."></textarea>
            <button class="btn-send" onclick="processAI()">🚀</button>
        </div>
    </main>
</div>

<script>
    // 1. رابط الجسر الصحيح (بدون زوائد)
    const WORKER_URL = "https://aust-ai-proxe.shahed200632.workers.dev"; 

    // 2. مفتاح الذكاء (تم تقسيمه لحمايته)
    const _p1 = "sk-or-v1-";
    const _p2 = "2cc2195f00e263c96767789"; // مفتاح خاص بمشروع شهد
    const _p3 = "30d06cc945f3484f4798";
    const _p4 = "35c754d929497e682607";
    const API_KEY = _p1 + _p3 + _p4 + _p2;

    window.onload = () => {
        const name = localStorage.getItem('studentName') || "شهد الخالد";
        document.getElementById('userNameDisplay').innerText = name;
        updateGreetingBySelection();
    };

    function updateGreetingBySelection() {
        const m = document.getElementById('majorSelector').value;
        const name = document.getElementById('userNameDisplay').innerText.split(' ')[0];
        let title = (m === "الصيدلة" || m === "طب الأسنان") ? "الدكتورة" : "المهندسة";
        document.getElementById('chatBox').innerHTML = `<div class="message ai-msg">مرحباً ${title} ${name}. كيف يمكن لنبض AUST مساعدتكِ اليوم في ${m}؟</div>`;
    }

    async function processAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user-msg');
        input.value = "";

        // رسالة انتظار
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-msg';
        loadingDiv.innerText = "... جاري التفكير";
        document.getElementById('chatBox').appendChild(loadingDiv);

        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${API_KEY}`, 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-lite-preview-02-05:free", 
                    messages: [{ role: "user", content: text }]
                })
            });
            
            const data = await res.json();
            loadingDiv.remove(); // حذف رسالة الانتظار

            if (data.choices && data.choices[0]) {
                const reply = data.choices[0].message.content;
                typeText(reply);
            } else {
                addMsg("عذراً، السيرفر لم يرسل رداً. تأكدي من عمل الـ Deploy في Cloudflare.", 'ai-msg');
            }
        } catch (e) { 
            loadingDiv.remove();
            addMsg("فشل الاتصال بالجسر. تأكدي أن رابط الـ Worker صحيح في الكود.", 'ai-msg'); 
        }
    }

    function addMsg(t, c) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `message ${c}`;
        div.innerText = t;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function typeText(t) {
        const div = document.createElement('div');
        div.className = 'message ai-msg';
        document.getElementById('chatBox').appendChild(div);
        let i = 0;
        function type() {
            if (i < t.length) {
                div.innerHTML += t.charAt(i) === '\n' ? '<br>' : t.charAt(i);
                i++;
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
                setTimeout(type, 15);
            }
        }
        type();
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
</script>
</body>
</html>
