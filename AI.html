<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة شهد الخالد | AUST AI</title>
    <link rel="icon" href="data:,"> 
    
    <style>
        :root { --cyan: #00e5ff; --gold: #f1c40f; --dark: #0a0b10; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #000; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* الهيدر العلوي */
        .top-bar { height: 60px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--cyan); box-shadow: 0 0 15px rgba(0,229,255,0.2); }
        .logo-text { color: var(--cyan); font-weight: bold; letter-spacing: 1px; }
        .user-name { color: var(--gold); font-size: 14px; border: 1px solid var(--gold); padding: 4px 12px; border-radius: 20px; }

        /* منطقة العمل */
        .dashboard { flex: 1; display: flex; overflow: hidden; }
        
        /* القائمة الجانبية */
        .sidebar { width: 280px; background: rgba(10, 11, 16, 0.95); padding: 20px; border-left: 1px solid var(--cyan); display: flex; flex-direction: column; gap: 20px; }
        .timer-box { background: rgba(0, 229, 255, 0.05); border: 1px solid var(--cyan); border-radius: 12px; padding: 15px; text-align: center; font-family: 'Courier New', monospace; font-size: 24px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        .sidebar-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--cyan); color: white; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .sidebar-btn:hover { background: var(--cyan); color: black; }

        /* منطقة الدردشة */
        .chat-container { flex: 1; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); display: flex; flex-direction: column; position: relative; }
        #chatBox { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        
        /* فقاعات الرسائل */
        .message { max-width: 85%; padding: 15px; border-radius: 18px; font-size: 15px; line-height: 1.6; position: relative; animation: fadeIn 0.4s ease; }
        .user-msg { align-self: flex-start; background: var(--cyan); color: #000; border-bottom-left-radius: 2px; box-shadow: 4px 4px 10px rgba(0,0,0,0.3); }
        .ai-msg { align-self: flex-end; background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); color: white; border-bottom-right-radius: 2px; white-space: pre-wrap; }
        
        /* منطقة الإدخال */
        .input-area { background: #0a0b10; padding: 20px; display: flex; gap: 12px; border-top: 1px solid var(--cyan); align-items: center; }
        #aiInput { flex: 1; background: #111; border: 1px solid var(--cyan); border-radius: 30px; color: white; padding: 12px 25px; outline: none; font-size: 15px; transition: 0.3s; }
        #aiInput:focus { box-shadow: 0 0 10px var(--cyan); }
        .btn-send { background: var(--cyan); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 20px; }
        .btn-send:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--cyan); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo-text">AUST SMART PULSE v2.0</div>
    <div class="user-name">المهندسة شهد الخالد</div>
</div>

<div class="dashboard">
    <aside class="sidebar">
        <div class="timer-box" id="timer">00:00:00</div>
        <div style="display:flex; justify-content: space-between;">
            <button onclick="startT()" style="color:var(--cyan); background:none; border:none; font-size:20px; cursor:pointer;">▶</button>
            <button onclick="stopT()" style="color:var(--gold); background:none; border:none; font-size:20px; cursor:pointer;">⏸</button>
            <button onclick="resetT()" style="color:#ff4444; background:none; border:none; font-size:20px; cursor:pointer;">🔄</button>
        </div>
        <hr style="border: 0.5px solid rgba(0,229,255,0.2);">
        <p style="font-size: 12px; color: #888; text-align: center;">قسم هندسة البرمجيات</p>
        <button class="sidebar-btn" onclick="location.reload()">محادثة جديدة</button>
    </aside>

    <main class="chat-container">
        <div id="chatBox"></div>
        <div class="input-area">
            <input id="aiInput" type="text" placeholder="اكتبي سؤالك الهندسي هنا يا شهد..." onkeypress="if(event.key==='Enter') askAI()">
            <button class="btn-send" onclick="askAI()">🚀</button>
        </div>
    </main>
</div>

<script>
    // ضعي رابط الـ Worker الخاص بكِ هنا بدقة
    const WORKER_URL = "https://shahed-api-bridge.shahed200632.workers.dev/"; 

    async function askAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, "user-msg");
        input.value = "";
        const loading = addMsg("جاري التفكير وتحليل البيانات... ✨", "ai-msg");

        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: [{role: "user", content: text}] })
            });
            
            const data = await res.json();
            loading.remove();

            // التعديل الجوهري: استلام الرد من متغير response كما يرسله الجسر
            if(data && data.response) {
                addMsg(data.response, "ai-msg");
            } else {
                addMsg("تنبيه: الجسر متصل ولكن الرد لم يصل بشكل صحيح. تأكدي من تفعيل الجسر.", "ai-msg");
            }
        } catch (e) {
            loading.innerText = "فشل الاتصال بالخادم. تأكدي من رابط الـ Worker.";
        }
    }

    function addMsg(t, c) {
        const cb = document.getElementById('chatBox');
        const d = document.createElement('div');
        d.className = `message ${c}`;
        d.innerText = t;
        cb.appendChild(d);
        cb.scrollTop = cb.scrollHeight;
        return d;
    }

    // دوال المؤقت (Timer)
    let sec=0, tInt=null;
    function startT() { if(!tInt) tInt=setInterval(()=>{sec++; let h=Math.floor(sec/3600).toString().padStart(2,'0'), m=Math.floor((sec%3600)/60).toString().padStart(2,'0'), s=(sec%60).toString().padStart(2,'0'); document.getElementById('timer').innerText=`${h}:${m}:${s}`;},1000); }
    function stopT() { clearInterval(tInt); tInt=null; }
    function resetT() { stopT(); sec=0; document.getElementById('timer').innerText="00:00:00"; }
    
    // ترحيب أولي
    window.onload = () => addMsg("مرحباً بكِ مهندسة شهد. نظام الذكاء الاصطناعي في AUST جاهز للعمل.", "ai-msg");
</script>
</body>
</html>
