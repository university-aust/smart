<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة شهد الخالد | Smart Pulse</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; padding: 20px; }
        #chatBox { flex: 1; border: 1px solid #00e5ff; overflow-y: auto; margin-bottom: 15px; padding: 15px; background: rgba(0,229,255,0.05); border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 5px; max-width: 85%; line-height: 1.5; }
        .user { background: #00e5ff; color: #000; align-self: flex-start; }
        .ai { background: #111; border: 1px solid #00e5ff; align-self: flex-end; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #000; color: white; border: 1px solid #00e5ff; border-radius: 5px; outline: none; }
        button { padding: 10px 25px; background: #00e5ff; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>
    <h2 style="text-align:center; margin-bottom: 20px;">المساعدة الذكية | المهندسة شهد الخالد</h2>
    <div id="chatBox"></div>
    <div class="input-area">
        <input id="aiInput" type="text" placeholder="اسألي أي شيء يا شهد...">
        <button onclick="askAI()">إرسال</button>
    </div>

<script>
    const WORKER_URL = "https://shahed-api-bridge.shahed200632.workers.dev/";

    async function askAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";
        const loadingDiv = addMsg("جاري التفكير... ✨", 'ai');

        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: [{role: "user", content: text}] })
            });
            
            const data = await res.json();
            if(loadingDiv) loadingDiv.remove();

            if (data.response && data.response !== "undefined") {
                addMsg(data.response, 'ai');
            } else {
                addMsg("تنبيه: الجسر متصل ولكن الرد فارغ. تأكدي من وضع المفتاح داخل Cloudflare فقط.", 'ai');
            }
        } catch (e) {
            if(loadingDiv) loadingDiv.remove();
            addMsg("فشل الاتصال بالجسر السحابي.", 'ai');
        }
    }

    function addMsg(t, c) {
        const cb = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `msg ${c}`;
        div.innerText = t;
        cb.appendChild(div);
        cb.scrollTop = cb.scrollHeight;
        return div;
    }
</script>
</body>
</html>
