<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AUST | شهد الخالد</title>
    <style>
        :root { --cyan: #00e5ff; --dark: #0a0b10; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000 url('67260.jpg') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); margin: 10px; border-radius: 15px; border: 1px solid var(--cyan); overflow: hidden; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-start; background: var(--cyan); color: #000; }
        .ai { align-self: flex-end; background: rgba(255,255,255,0.1); border: 1px solid var(--cyan); }
        .input-area { padding: 15px; display: flex; gap: 10px; background: #000; border-top: 1px solid var(--cyan); }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid var(--cyan); color: white; border-radius: 25px; outline: none; }
        button { background: var(--cyan); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div style="padding: 10px; text-align: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--cyan);">
    <h3 style="color: var(--cyan);">المهندسة شهد الخالد - Smart Pulse</h3>
</div>

<div class="chat-container">
    <div id="chatBox"></div>
    <div class="input-area">
        <input id="aiInput" type="text" placeholder="اكتبي سؤالك هنا...">
        <button onclick="askAI()">🚀</button>
    </div>
</div>

<script>
    const PROXY_URL = "https://shahed-api-bridge.shahed200632.workers.dev/";

    async function askAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";

        // إنشاء رسالة انتظار وحفظ المرجع لحذفها
        const loadingDiv = addMsg("انتظري قليلاً، جاري استدعاء الذكاء... ⏳", 'ai');

        try {
            const res = await fetch(PROXY_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: [{role: "user", content: text}] })
            });
            
            const data = await res.json();
            
            // حذف رسالة "انتظري" فوراً
            if(loadingDiv) loadingDiv.remove();

            // فحص الرد بدقة لمنع undefined
            if(data && data.response && data.response !== "undefined") {
                addMsg(data.response, 'ai');
            } else {
                addMsg("تنبيه: الجسر متصل ولكن الرد فارغ. تأكدي من وجود رصيد في حساب xAI.", "ai");
            }
        } catch (e) {
            if(loadingDiv) loadingDiv.remove();
            addMsg("خطأ: تعذر الوصول للجسر السحابي.", 'ai');
        }
    }

    function addMsg(t, c) {
        const cb = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `msg ${c}`;
        div.innerText = t;
        cb.appendChild(div);
        cb.scrollTop = cb.scrollHeight;
        return div;
    }
</script>
</body>
</html>
