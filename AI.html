<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة شهد الخالد | AUST AI</title>
    <style>
        :root { --cyan: #00e5ff; --gold: #f1c40f; --dark: #0a0b10; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .top-bar { height: 60px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--cyan); }
        .dashboard { flex: 1; display: flex; position: relative; overflow: hidden; }
        
        .sidebar { width: 260px; background: rgba(10, 11, 16, 0.98); padding: 20px; border-left: 1px solid var(--cyan); display: flex; flex-direction: column; gap: 15px; }
        .timer-box { background: rgba(0, 229, 255, 0.05); border: 1px solid var(--cyan); border-radius: 12px; padding: 10px; text-align: center; font-family: monospace; font-size: 20px; color: var(--cyan); }
        
        .chat-container { flex: 1; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; position: relative; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }
        
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.6; }
        .user-msg { align-self: flex-start; background: var(--cyan); color: #000; border-bottom-left-radius: 2px; }
        .ai-msg { align-self: flex-end; background: rgba(255,255,255,0.1); border: 1px solid var(--cyan); color: white; border-bottom-right-radius: 2px; }
        
        .input-area { position: absolute; bottom: 0; width: 100%; background: #0a0b10; padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--cyan); }
        #aiInput { flex: 1; background: #111; border: 1px solid var(--cyan); border-radius: 25px; color: white; padding: 10px 20px; outline: none; resize: none; height: 45px; }
        .btn-send { background: var(--cyan); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div style="color: var(--cyan); font-weight: bold;">AUST SMART PULSE</div>
    <div style="color: var(--gold); font-size: 12px;">المهندسة شهد الخالد</div>
</div>

<div class="dashboard">
    <aside class="sidebar">
        <div class="timer-box" id="timer">00:00:00</div>
        <div style="display:flex; justify-content: space-around; margin-bottom: 10px;">
            <button onclick="startT()" style="background:none; border:none; color:var(--cyan); cursor:pointer;">▶</button>
            <button onclick="stopT()" style="background:none; border:none; color:var(--gold); cursor:pointer;">⏸</button>
            <button onclick="resetT()" style="background:none; border:none; color:var(--red); cursor:pointer;">🔄</button>
        </div>
        <select id="majorSelector" style="width:100%; padding:8px; background:#000; color:white; border:1px solid var(--cyan); border-radius:8px;">
            <option>هندسة المعلوماتية</option>
            <option>هندسة البترول</option>
            <option>طب الأسنان</option>
            <option>هندسة العمارة</option>
        </select>
        <button onclick="location.reload()" style="padding:10px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">محادثة جديدة</button>
    </aside>

    <main class="chat-container">
        <div id="chatBox"></div>
        <div class="input-area">
            <textarea id="aiInput" placeholder="اسألي أي شيء يا شهد..."></textarea>
            <button class="btn-send" onclick="askAI()">🚀</button>
        </div>
    </main>
</div>

<script>
    // ضعي رابط الـ Worker الخاص بكِ هنا بعد نشره
    const WORKER_URL = "https://shahed-api-bridge.shahed200632.workers.dev/"; 

    async function askAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, "user-msg");
        input.value = "";
        const loading = addMsg("جاري استدعاء الذكاء... ✨", "ai-msg");

        try {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: [{role: "user", content: text}] })
            });
            const data = await res.json();
            loading.remove();

            if(data.response) {
                addMsg(data.response, "ai-msg");
            } else {
                addMsg("تنبيه: الجسر متصل ولكن الرد غير متاح حالياً.", "ai-msg");
            }
        } catch (e) {
            loading.innerText = "فشل الاتصال بالجسر.";
        }
    }

    function addMsg(t, c) {
        const cb = document.getElementById('chatBox');
        const d = document.createElement('div');
        d.className = `message ${c}`;
        d.innerText = t;
        cb.appendChild(d);
        cb.scrollTop = cb.scrollHeight;
        return d;
    }

    // دوال المؤقت
    let sec=0, tInt=null;
    function startT() { if(!tInt) tInt=setInterval(()=>{sec++; let h=Math.floor(sec/3600).toString().padStart(2,'0'), m=Math.floor((sec%3600)/60).toString().padStart(2,'0'), s=(sec%60).toString().padStart(2,'0'); document.getElementById('timer').innerText=`${h}:${m}:${s}`;},1000); }
    function stopT() { clearInterval(tInt); tInt=null; }
    function resetT() { stopT(); sec=0; document.getElementById('timer').innerText="00:00:00"; }
    
    window.onload = () => addMsg("مرحباً بكِ في منصتكِ المتطورة. كيف أساعدكِ اليوم؟", "ai-msg");
</script>
</body>
</html>
