<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تجربة الاتصال المباشر | شهد الخالد</title>
    <style>
        :root { --cyan: #00e5ff; --gold: #f1c40f; --dark: #0a0b10; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0b10; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user { align-self: flex-start; background: var(--cyan); color: black; }
        .ai { align-self: flex-end; background: rgba(255,255,255,0.1); border: 1px solid var(--cyan); }
        .input-area { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--cyan); }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid var(--cyan); color: white; border-radius: 5px; }
        button { padding: 10px 20px; background: var(--cyan); border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div style="padding: 15px; text-align: center; border-bottom: 1px solid var(--cyan);">
    <h2>تجربة الاتصال المباشر (بدون جسر)</h2>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
    <input id="userInput" type="text" placeholder="اكتبي سؤالك هنا...">
    <button onclick="sendDirect()">إرسال مباشر</button>
</div>

<script>
    const API_KEY = "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"; 

    async function sendDirect() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";

        const loading = addMsg("جاري محاولة الاتصال المباشر بـ Groq...", 'ai');

        try {
            // محاولة الاتصال بـ Groq مباشرة من المتصفح
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: text }]
                })
            });

            const data = await response.json();
            loading.remove();

            if(data.choices && data.choices[0]) {
                addMsg(data.choices[0].message.content, 'ai');
            } else {
                addMsg("فشل الاتصال: " + JSON.stringify(data), 'ai');
            }

        } catch (error) {
            loading.remove();
            // هنا سيظهر خطأ CORS غالباً
            addMsg("خطأ أمان (CORS): المتصفح منع الاتصال المباشر. الخطأ: " + error.message, 'ai');
            console.error("CORS Error:", error);
        }
    }

    function addMsg(t, c) {
        const div = document.createElement('div');
        div.className = `message ${c}`;
        div.innerText = t;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        return div;
    }
</script>

</body>
</html>
