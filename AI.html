<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نبض AUST | المهندسة شهد الخالد</title>
    <style>
        body { background: #050608; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid #00e5ff; text-align: center; color: #00e5ff; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.6; }
        .user { align-self: flex-start; background: #00e5ff; color: #000; font-weight: bold; }
        .ai { align-self: flex-end; background: #1a1a1a; border: 1px solid #00e5ff; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background: #111; color: white; outline: none; }
        button { background: #00e5ff; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; color: #000; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; font-size: 18px;">منصة نبض AUST الذكية</h2>
        <small>إشراف المهندسة شهد الخالد</small>
    </div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسألي الذكاء الاصطناعي...">
        <button onclick="ask()">إرسال 🚀</button>
    </div>

<script>
    const WORKER_URL = "https://aust.shahed200632.workers.dev"; // رابط الجسر الخاص بكِ

    function addMsg(role, text) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = "msg " + role;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        return div;
    }

    async function ask() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        
        addMsg("user", text);
        input.value = "";
        const loading = addMsg("ai", "جاري التفكير...");

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    inputs: "<s>[INST] " + text + " [/INST]",
                    parameters: { max_new_tokens: 500 }
                })
            });
            const result = await response.json();
            
            // استخراج النص النظيف
            let out = result[0]?.generated_text || result.generated_text || "النظام نشط";
            if(out.includes("[/INST]")) out = out.split("[/INST]")[1];
            
            loading.innerText = out.trim();
        } catch (e) {
            loading.innerText = "عذراً، النظام يستيقظ الآن. يرجى إعادة الإرسال خلال ثوانٍ.";
        }
    }

    window.onload = () => addMsg("ai", "مرحباً مهندسة شهد. النظام جاهز تماماً للعرض.");
</script>
</body>
</html>
