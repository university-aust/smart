<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض AUST | المهندسة شهد الخالد</title>
    <style>
        :root { --cyan: #00e5ff; --bg: #050608; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--cyan); text-align: center; color: var(--cyan); box-shadow: 0 0 15px rgba(0,229,255,0.1); }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,229,255,0.01); }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 85%; line-height: 1.6; font-size: 14px; animation: fadeIn 0.3s; }
        .user { align-self: flex-start; background: var(--cyan); color: #000; font-weight: bold; }
        .ai { align-self: flex-end; background: #1a1a1a; border: 1px solid var(--cyan); }
        .input-area { padding: 15px; background: #000; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #111; color: white; outline: none; }
        button { background: var(--cyan); border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; color: #000; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; font-size: 18px;">منصة نبض AUST الذكية</h2>
        <small style="color: #888;">بإشراف: المهندسة شهد الخالد</small>
    </div>
    
    <div id="chatBox"></div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتبي سؤالك هنا...">
        <button onclick="ask()">إرسال 🚀</button>
    </div>

<script>
    // تشفير المفتاح الجديد (Base64) للحماية
    const _E = "U2stb3ItdjEtYjdjNDczNWFhZmJkNTVjZTdmMWI2MDgwNzJjZThiYjRlOTYxODAxOTEwMjM0NThlZmZiNmMzZDVlZmZiYzkzMQ==";
    const _K = atob(_E);
    
    // رابط الجسر الناجح الخاص بكِ
    const WORKER = "https://aust.shahed200632.workers.dev";

    function addMsg(role, text) {
        const box = document.getElementById('chatBox');
        const d = document.createElement('div');
        d.className = "msg " + role;
        d.innerText = text;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    async function ask() {
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;

        addMsg("user", val);
        input.value = "";
        const loading = addMsg("ai", "جاري الاتصال بالسحابة الذكية...");

        try {
            const response = await fetch(WORKER, {
                method: "POST",
                headers: { 
                    "Authorization": "Bearer " + _K, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    // تم تغيير النموذج لنموذج مجاني تماماً ولا يطلب رصيداً
                    model: "mistralai/mistral-7b-instruct:free",
                    messages: [{role: "user", content: val}]
                })
            });

            const data = await response.json();

            if (data.choices && data.choices[0]) {
                loading.innerText = data.choices[0].message.content;
            } else {
                // إذا كان هناك خطأ في الرصيد، سنحاول إظهار السبب بدقة
                console.log(data);
                loading.innerText = "تنبيه: السيرفر يطلب رصيداً. جاري تبديل قناة الاتصال تلقائياً...";
                // محاولة أخيرة بنموذج بديل فوري
                setTimeout(() => retry(val, loading), 1000);
            }
        } catch (err) {
            loading.innerText = "خطأ في الاتصال. يرجى التأكد من تشغيل الـ Worker.";
        }
    }

    async function retry(val, loadingElement) {
        try {
            const response = await fetch(WORKER, {
                method: "POST",
                headers: { "Authorization": "Bearer " + _K, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "huggingfaceh4/zephyr-7b-beta:free",
                    messages: [{role: "user", content: val}]
                })
            });
            const data = await response.json();
            loadingElement.innerText = data.choices[0].message.content;
        } catch(e) {
            loadingElement.innerText = "عذراً، يبدو أن هناك ضغطاً كبيراً على النماذج المجانية حالياً. يرجى المحاولة بعد لحظات.";
        }
    }

    window.onload = () => {
        addMsg("ai", "أهلاً بكِ مهندسة شهد. تم تحديث النظام بنجاح وهو جاهز تماماً للعرض الآن.");
    };
</script>
</body>
</html>
