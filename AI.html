<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة شهد الخالد | Smart AUST</title>
    <style>
        :root { --cyan: #00e5ff; --gold: #f1c40f; --dark: #0a0b10; --red: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { height: 100%; overflow: hidden; background: #000; }
        body { background: url('67260.jpg') no-repeat center center fixed; background-size: cover; display: flex; flex-direction: column; }
        
        .top-bar { height: 60px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--cyan); z-index: 1100; }
        .dashboard { flex: 1; display: flex; position: relative; overflow: hidden; }
        
        .sidebar { width: 280px; background: rgba(10, 11, 16, 0.98); padding: 20px; display: flex; flex-direction: column; gap: 15px; border-left: 1px solid var(--cyan); transition: 0.3s ease; z-index: 1050; height: 100%; }
        .chat-container { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); position: relative; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }
        
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.6; word-wrap: break-word; position: relative; }
        .user-msg { align-self: flex-start; background: var(--cyan); color: #000; border-bottom-left-radius: 2px; }
        .ai-msg { align-self: flex-end; background: rgba(255,255,255,0.1); border: 1px solid var(--cyan); border-bottom-right-radius: 2px; color: white; }
        
        .input-area { position: absolute; bottom: 0; width: 100%; background: #0a0b10; padding: 12px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--cyan); }
        #aiInput { flex: 1; height: 45px; background: rgba(255,255,255,0.05); border: 1px solid var(--cyan); border-radius: 22px; color: white; padding: 10px 18px; outline: none; resize: none; }
        .btn-send { background: var(--cyan); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        @media (max-width: 768px) { .sidebar { position: absolute; right: -280px; } .sidebar.active { right: 0; } }
    </style>
</head>
<body>

<div class="top-bar">
    <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--cyan); font-size:28px; cursor:pointer;">☰</button>
    <div style="color: var(--cyan); font-weight: bold;">AUST SMART PULSE</div>
    <div style="width: 24px;"></div>
</div>

<div class="dashboard">
    <aside class="sidebar" id="sidebar">
        <h2 id="userNameDisplay" style="color:var(--gold); font-size:18px;">شهد الخالد</h2>
        <button onclick="startNewChat()" style="width:100%; padding:10px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">محادثة جديدة</button>
        <select id="majorSelector" style="width:100%; padding:10px; background:#000; color:white; border:1px solid var(--cyan); border-radius:8px;">
            <option>هندسة المعلوماتية</option>
            <option>هندسة البرمجيات</option>
            <option>هندسة العمارة</option>
        </select>
        <a href="dashboard.html" style="text-align:center; color:var(--cyan); text-decoration:none; font-size:12px; padding:10px; border:1px solid var(--cyan); border-radius:8px; margin-top:auto;">خروج</a>
    </aside>

    <main class="chat-container">
        <div id="chatBox"></div>
        <div class="input-area">
            <textarea id="aiInput" placeholder="اسألي أي شيء يا مهندسة شهد..."></textarea>
            <button class="btn-send" onclick="processAI()">🚀</button>
        </div>
    </main>
</div>

<script>
    // الرابط الثابت للجسر
    const PROXY_URL = "https://shahed-api-bridge.shahed200632.workers.dev/";
    let currentHistory = [];

    window.onload = () => {
        document.getElementById('userNameDisplay').innerText = localStorage.getItem('studentName') || "شهد الخالد";
        startNewChat();
    };

    function startNewChat() {
        document.getElementById('chatBox').innerHTML = `<div class="message ai-msg">مرحباً المهندسة شهد. أنا نظام Grok المرتبط بمنصتك، كيف يمكنني مساعدتك اليوم؟</div>`;
        currentHistory = [];
    }

    async function processAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        // إضافة رسالة المستخدم للسجل والواجهة
        addMsg(text, 'user-msg');
        currentHistory.push({ role: "user", content: text });
        input.value = "";

        // عرض رسالة التحميل وحفظ المرجع الخاص بها
        const loadingDiv = addMsg("جاري الاتصال بالمحرك الذكي... ✨", 'ai-msg');

        try {
            const res = await fetch(PROXY_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: currentHistory })
            });
            
            const data = await res.json();

            // إزالة رسالة التحميل فوراً (هذا يحل مشكلة اللون الأحمر المستمر)
            if(loadingDiv) loadingDiv.remove();

            // التحقق من وصول الرد بشكل صحيح
            if(data && data.response) {
                addMsg(data.response, 'ai-msg');
                currentHistory.push({ role: "assistant", content: data.response });
            } else {
                addMsg("عذراً، لم أستطع استلام رد واضح. يرجى المحاولة مرة أخرى.", "ai-msg");
            }
        } catch (e) {
            if(loadingDiv) loadingDiv.remove();
            addMsg("حدث خطأ في الجسر. تأكدي من تفعيل Cloudflare Worker.", 'ai-msg');
        }
    }

    function addMsg(t, c) {
        const chatBox = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `message ${c}`;
        div.innerText = t;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div; // نرسل الـ div لنتمكن من حذفه لاحقاً (مثل حذف رسالة التحميل)
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
</script>
</body>
</html>
