<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض AUST | المهندسة شهد الخالد</title>
    <style>
        :root { --cyan: #00e5ff; --bg: #050608; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--cyan); text-align: center; color: var(--cyan); box-shadow: 0 0 15px rgba(0,229,255,0.1); }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 85%; line-height: 1.6; font-size: 14.5px; animation: fadeIn 0.3s; }
        .user { align-self: flex-start; background: var(--cyan); color: #000; font-weight: bold; border-bottom-left-radius: 2px; }
        .ai { align-self: flex-end; background: #1a1a1a; border: 1px solid var(--cyan); border-bottom-right-radius: 2px; }
        .input-area { padding: 15px; background: #000; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #111; color: white; outline: none; }
        button { background: var(--cyan); border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; color: #000; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; font-size: 18px;">منصة نبض AUST الذكية</h2>
        <small style="color: #888;">إشراف: المهندسة شهد الخالد</small>
    </div>
    
    <div id="chatBox"></div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسألي مساعدكِ الذكي هنا...">
        <button onclick="ask()">إرسال 🚀</button>
    </div>

<script>
    const WORKER_URL = "https://aust.shahed200632.workers.dev";

    function addMsg(role, text) {
        const box = document.getElementById('chatBox');
        const d = document.createElement('div');
        d.className = "msg " + role;
        d.innerText = text;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
        return d;
    }

    async function ask() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        
        addMsg("user", text);
        input.value = "";
        const loading = addMsg("ai", "جاري التحليل وتوليد الرد...");

        // تعريف المساعد بهويته الجديدة في الجامعة
        const systemPrompt = "أنت مساعد ذكي مخصص للمهندسة شهد الخالد في الجامعة العربية الخاصة للعلوم والتكنولوجيا (AUST). مهمتك هي مساعدتها ومساعدة الطلاب في مشاريعهم البرمجية بذكاء واحترافية باللغة العربية.";

        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    inputs: "<s>[INST] " + systemPrompt + " \n السؤال الحالي: " + text + " [/INST]",
                    parameters: { max_new_tokens: 500, return_full_text: false }
                })
            });

            const result = await response.json();
            
            let out = "";
            if (Array.isArray(result) && result[0]?.generated_text) {
                out = result[0].generated_text;
            } else if (result.generated_text) {
                out = result.generated_text;
            } else if (result.error) {
                out = "الموديل يستيقظ، يرجى المحاولة بعد 5 ثوانٍ.";
            } else {
                out = "تم استلام بيانات غير مكتملة، يرجى إعادة الإرسال.";
            }
            
            if(out.includes("[/INST]")) out = out.split("[/INST]")[1];
            
            loading.innerText = out.trim() || "أنا رهن إشارتكِ مهندسة شهد.";

        } catch (e) {
            loading.innerText = "حدث خطأ في الاتصال بالجسر السحابي. يرجى المحاولة ثانية.";
        }
    }

    window.onload = () => {
        addMsg("ai", "أهلاً بكِ مهندسة شهد. أنا مساعدكِ الذكي في الجامعة العربية الخاصة (AUST). كيف يمكنني دعمكِ اليوم في عرضكِ التقني؟");
    };
</script>
</body>
</html>
