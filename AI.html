<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نبض AUST | المهندسة شهد الخالد</title>
    <style>
        body { background: #050608; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid #00e5ff; text-align: center; color: #00e5ff; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { align-self: flex-start; background: #00e5ff; color: black; }
        .ai { align-self: flex-end; background: #1a1a1a; border: 1px solid #00e5ff; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background: #111; color: white; outline: none; }
        button { background: #00e5ff; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">منصة نبض AUST الذكية - المهندسة شهد الخالد</div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسألي الذكاء الاصطناعي...">
        <button onclick="ask()">إرسال</button>
    </div>

<script>
    const _K = atob("U2stb3ItdjEtMDlmZDk2MTQxMTJjMmNmMGM4ZTI1NmNkYTA3NjdiYjcxMmJiNGVmMzM1NjFiOTY3YTY1YWEwNmZkZjkyNmE5ZQ==");
    const WORKER = "https://aust.shahed200632.workers.dev";

    function addMsg(cls, txt) {
        const b = document.getElementById('chatBox');
        const d = document.createElement('div');
        d.className = "msg " + cls;
        d.innerText = txt;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
        return d;
    }

    async function ask() {
        const i = document.getElementById('userInput');
        const t = i.value.trim();
        if(!t) return;
        
        addMsg("user", t);
        i.value = "";
        const loading = addMsg("ai", "جاري المعالجة...");

        try {
            const r = await fetch(WORKER, {
                method: "POST",
                headers: { "Authorization": "Bearer " + _K, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-lite-preview-02-05:free",
                    messages: [{role: "user", content: t}]
                })
            });
            const d = await r.json();
            
            if (d.choices && d.choices[0]) {
                loading.innerText = d.choices[0].message.content;
            } else if (d.error === "API_ISSUE") {
                loading.innerText = "تنبيه: المفتاح (API Key) غير مفعل أو انتهت صلاحيته. يرجى التأكد من OpenRouter.";
            } else {
                loading.innerText = "عذراً، السيرفر مشغول حالياً. حاولي مرة أخرى.";
            }
        } catch (e) {
            loading.innerText = "خطأ في الاتصال: تأكدي من عمل الـ Worker والإنترنت.";
        }
    }
    window.onload = () => addMsg("ai", "مرحباً مهندسة شهد. النظام جاهز تماماً.");
</script>
</body>
</html>
