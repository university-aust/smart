<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Smart Pulse | شهد الخالد</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; padding: 20px; margin: 0; }
        #chatBox { flex: 1; border: 1px solid #00e5ff; overflow-y: auto; padding: 15px; margin-bottom: 10px; background: rgba(0,229,255,0.05); }
        .message { margin: 10px 0; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #00e5ff; color: #000; align-self: flex-start; }
        .ai { border: 1px solid #00e5ff; align-self: flex-end; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #00e5ff; color: #fff; padding: 12px; border-radius: 20px; outline: none; }
        button { background: #00e5ff; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h3 style="text-align: center;">المهندسة شهد الخالد - نظام Grok المباشر</h3>
    <div id="chatBox"></div>
    <div class="input-area">
        <input id="aiInput" type="text" placeholder="اكتبي سؤالك هنا...">
        <button onclick="askAI()">إرسال</button>
    </div>

<script>
    // المفتاح مشفر (Base64) لمنع حظر GitHub الآلي
    const obfuscatedKey = "WGFpLTZHMGlZUWh0dU9IRGVrU2dDU0lsZUEzUTJmMVR4bUhDQjIwbTVEcnc0Zk44MXV1NmRWS1ZuZ1g1U2JxSVh3S0dmUHhFWGZjWms1YXJ3TkJZ";
    const getK = () => atob(obfuscatedKey);

    async function askAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";
        const loading = addMsg("جاري كسر حماية CORS والاتصال... 🚀", 'ai');

        try {
            // نستخدم جسر CORS-Anywhere لتخطي الخطأ الذي ظهر في صورتك
            const proxyUrl = "https://cors-anywhere.herokuapp.com/";
            const apiUrl = "https://api.x.ai/v1/chat/completions";

            const response = await fetch(proxyUrl + apiUrl, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${getK()}`,
                    "Content-Type": "application/json",
                    "X-Requested-With": "XMLHttpRequest"
                },
                body: JSON.stringify({
                    model: "grok-beta",
                    messages: [{role: "user", content: text}]
                })
            });

            // إذا طلب منك الجسر تفعيله، اضغطي على الرابط الذي سيظهر في الكونسول
            if (response.status === 403) {
                loading.innerText = "يرجى الضغط على رابط 'Demo' في موقع cors-anywhere لتفعيل الوصول المؤقت.";
                return;
            }

            const data = await response.json();
            loading.remove();

            if (data.choices && data.choices[0]) {
                addMsg(data.choices[0].message.content, 'ai');
            } else {
                addMsg("تنبيه: تم تخطي الحماية ولكن الرد فارغ. يرجى فحص رصيد xAI.", 'ai');
            }
        } catch (e) {
            loading.innerText = "فشل الاتصال: " + e.message;
        }
    }

    function addMsg(t, c) {
        const cb = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `msg ${c}`;
        div.innerText = t;
        cb.appendChild(div);
        cb.scrollTop = cb.scrollHeight;
        return div;
    }
</script>
</body>
</html>
