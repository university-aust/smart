<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة شهد | نظام الطوارئ</title>
    <style>
        :root { --cyan: #00e5ff; --dark: #0a0b10; --red: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: white; height: 100vh; display: flex; flex-direction: column; padding: 20px; }
        #chatBox { flex: 1; overflow-y: auto; border: 1px solid var(--cyan); padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { align-self: flex-start; background: var(--cyan); color: #000; }
        .ai { align-self: flex-end; background: #222; border: 1px solid var(--cyan); }
        .error-msg { align-self: flex-end; background: #300; border: 1px solid var(--red); color: var(--red); font-weight: bold; }
        .input-area { margin-top: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid var(--cyan); color: white; border-radius: 5px; }
        button { padding: 0 20px; background: var(--cyan); border: none; cursor: pointer; color: black; font-weight: bold; }
    </style>
</head>
<body>

<div style="text-align:center; padding-bottom:15px; border-bottom:1px solid var(--cyan); margin-bottom:15px;">
    <h2>مساعد شهد الخالد (نمط تشخيص الأخطاء)</h2>
</div>

<div id="chatBox">
    <div class="msg ai">شهد، هذا الكود مبرمج لاكتشاف سبب الرد الفارغ. تفضلي باختباره.</div>
</div>

<div class="input-area">
    <input id="aiInput" type="text" placeholder="اكتبي أي شيء للتجربة...">
    <button onclick="askAI()">إرسال</button>
</div>

<script>
    // رابط الجسر الخاص بك
    const PROXY_URL = "https://shahed-api-bridge.shahed200632.workers.dev/";

    async function askAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";

        // رسالة انتظار مع حركة بسيطة
        const loadingDiv = addMsg("جاري تحليل الطلب عبر الجسر... 📡", 'ai');

        try {
            const res = await fetch(PROXY_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: [{role: "user", content: text}] })
            });
            
            // قراءة الرد كنص أولاً لفحصه قبل تحويله لـ JSON
            const responseText = await res.text();
            
            if(loadingDiv) loadingDiv.remove();

            if (!responseText || responseText.trim() === "") {
                throw new Error("الجسر أعاد نصاً فارغاً تماماً (EMPTY_RESPONSE).");
            }

            let data;
            try {
                data = JSON.parse(responseText);
            } catch(e) {
                throw new Error("الجسر أعاد بيانات ليست JSON صالحة. الرد كان: " + responseText.substring(0, 50));
            }

            // فحص دقيق للرد
            if(data && data.response && data.response !== "undefined") {
                addMsg(data.response, 'ai');
            } else if (data.error) {
                // إذا أرسل الجسر رسالة خطأ واضحة
                addMsg("خطأ من المحرك (xAI): " + data.error, 'error-msg');
            } else {
                // الحالة المستفزة (undefined)
                addMsg("تنبيه أمني: الجسر متصل لكن حقيبة 'response' فارغة. هذا يعني غالباً أن مفتاح API في Cloudflare محظور أو يحتاج لرصيد.", "error-msg");
            }

        } catch (e) {
            if(loadingDiv) loadingDiv.remove();
            addMsg("فشل برمجـي: " + e.message, 'error-msg');
        }
    }

    function addMsg(t, c) {
        const cb = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `msg ${c}`;
        div.innerText = t;
        cb.appendChild(div);
        cb.scrollTop = cb.scrollHeight;
        return div;
    }
</script>

</body>
</html>
