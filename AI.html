<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة شهد الخالد | Smart AUST</title>
    <style>
        :root { --cyan: #00e5ff; --gold: #f1c40f; --dark: #0a0b10; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000 url('67260.jpg') no-repeat center center fixed; background-size: cover; color: white; height: 100vh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); margin: 20px; border-radius: 15px; border: 1px solid var(--cyan); overflow: hidden; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 14px; line-height: 1.6; }
        .user { align-self: flex-start; background: var(--cyan); color: #000; border-bottom-left-radius: 2px; }
        .ai { align-self: flex-end; background: rgba(255,255,255,0.1); border: 1px solid var(--cyan); border-bottom-right-radius: 2px; }
        .input-area { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.5); }
        #aiInput { flex: 1; padding: 12px; background: #111; border: 1px solid var(--cyan); color: white; border-radius: 25px; outline: none; }
        button { background: var(--cyan); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div style="padding: 15px; text-align: center; border-bottom: 1px solid var(--cyan); background: rgba(0,0,0,0.8);">
    <h2 style="color: var(--gold);">مرحباً المهندسة شهد الخالد</h2>
</div>

<div class="chat-container">
    <div id="chatBox"></div>
    <div class="input-area">
        <input id="aiInput" type="text" placeholder="اكتبي سؤالك البرمجي هنا...">
        <button onclick="askAI()">🚀</button>
    </div>
</div>

<script>
    // رابط الجسر الخاص بكِ
    const PROXY_URL = "https://shahed-api-bridge.shahed200632.workers.dev/";
    let chatHistory = [];

    async function askAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        chatHistory.push({ role: "user", content: text });
        input.value = "";

        const loading = addMsg("جاري التفكير عبر نظام xAI... ✨", 'ai');

        try {
            const res = await fetch(PROXY_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages: chatHistory })
            });
            
            const data = await res.json();
            loading.remove();

            if(data.response) {
                addMsg(data.response, 'ai');
                chatHistory.push({ role: "assistant", content: data.response });
            } else {
                addMsg("لم أستطع الحصول على رد، جربي مرة أخرى.", "ai");
            }
        } catch (e) {
            loading.remove();
            addMsg("حدث خطأ في الجسر. تأكدي من Cloudflare.", 'ai');
        }
    }

    function addMsg(t, c) {
        const div = document.createElement('div');
        div.className = `msg ${c}`;
        div.innerText = t;
        document.getElementById('chatBox').appendChild(div);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        return div;
    }
</script>
</body>
</html>
