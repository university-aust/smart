<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نبض الحوار | Shahd Al-Khaled</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --cyan: #00d4ff; --navy: #1e293b; --glass: rgba(10, 15, 30, 0.95); }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; width: 100%; position: fixed; }
        body {
            background: linear-gradient(rgba(3, 7, 18, 0.8), rgba(3, 7, 18, 0.8)), url('67260.jpg') no-repeat center center;
            background-size: cover; color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column;
        }
        .chat-header {
            height: 60px; padding: 0 20px; background: var(--glass); 
            backdrop-filter: blur(20px); border-bottom: 2px solid var(--cyan); 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        #chatBox { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; position: relative; word-wrap: break-word; }
        .my-msg { align-self: flex-start; background: linear-gradient(135deg, var(--cyan), #008cb3); color: #111; font-weight: 500; border-bottom-right-radius: 2px; }
        .other-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); border-bottom-left-radius: 2px; }
        .user-tag { font-size: 0.75rem; font-weight: 800; color: var(--cyan); margin-bottom: 5px; display: block; }
        .time { font-size: 0.65rem; opacity: 0.7; margin-top: 5px; display: block; }
        .input-area { background: var(--glass); padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid var(--cyan); padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid rgba(0, 212, 255, 0.3); background: rgba(255, 255, 255, 0.05); color: white; outline: none; }
        .send-btn { background: var(--cyan); border: none; width: 45px; height: 45px; border-radius: 50%; color: #111; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="dashboard.html" style="color:var(--cyan);"><i class="fas fa-chevron-right"></i></a>
        <div style="text-align: center;">
            <h2 id="chatWith" style="margin:0; font-size:1rem;">جاري التحميل...</h2>
            <div id="itemContext" style="font-size:0.7rem; color:var(--cyan);"></div>
        </div>
        <button onclick="clearChat()" style="background:none; border:none; color:var(--cyan);"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off">
        <button class="send-btn" onclick="send()"><i class="fas fa-bolt"></i></button>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    // 1. إعدادات الفايربيس المؤمنة
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. فك تشفير بيانات المستخدم الحالي (أنتِ)
    let myID = "", myName = "";
    try {
        const encID = localStorage.getItem("u_id");
        const encName = localStorage.getItem("u_name");
        if (!encID || !encName) window.location.href = "index.html";
        
        myID = atob(encID);
        myName = decodeURIComponent(escape(atob(encName)));
    } catch (e) { window.location.href = "index.html"; }

    // 3. جلب بيانات الطرف الآخر وتأمينها
    const urlParams = new URLSearchParams(window.location.search);
    const targetName = decodeURIComponent(urlParams.get('to') || "زميل");
    const itemName = decodeURIComponent(urlParams.get('item') || "موضوع عام");
    
    // توليد معرف محادثة فريد ومعمّى (Obfuscated)
    // نستخدم الأرقام الجامعية لإنشاء مسار فريد في قاعدة البيانات لا يعرفه إلا الطرفين
    const rawChatId = [myID, targetName].sort().join("_").replace(/\s/g, '');
    const secureChatId = btoa(rawChatId).replace(/=/g, ''); // تحويل المسار لصيغة غير مفهومة في Firebase

    document.getElementById('chatWith').innerText = `دردشة مع ${targetName}`;
    document.getElementById('itemContext').innerText = `بخصوص: ${itemName}`;

    // دالة تنظيف النصوص (حماية من الاختراق)
    function sanitize(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function send() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const payload = {
            sN: btoa(unescape(encodeURIComponent(myName))), // اسم المرسل مشفر
            sI: btoa(myID), // رقم المرسل مشفر
            m: sanitize(text), // الرسالة منظفة
            t: new Date().toLocaleTimeString('ar-SY', {hour: '2-digit', minute:'2-digit'}),
            ts: firebase.database.ServerValue.TIMESTAMP
        };

        database.ref('chats/' + secureChatId).push(payload)
        .then(() => { input.value = ""; })
        .catch(() => { Swal.fire('خطأ', 'فشل الإرسال، تأكد من الاتصال', 'error'); });
    }

    function listen() {
        const chatBox = document.getElementById('chatBox');
        database.ref('chats/' + secureChatId).on('value', (snap) => {
            chatBox.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                let senderID, senderName;
                
                try {
                    senderID = atob(data.sI);
                    senderName = decodeURIComponent(escape(atob(data.sN)));
                } catch(e) { return; }

                const isMe = senderID === myID;

                chatBox.innerHTML += `
                    <div class="msg ${isMe ? 'my-msg' : 'other-msg'}">
                        <span class="user-tag" style="color:${isMe ? '#111' : 'var(--cyan)'}">${isMe ? 'أنا' : senderName}</span>
                        <div style="word-break: break-word;">${data.m}</div>
                        <span class="time" style="display:block; text-align:left; margin-top:5px;">${data.t}</span>
                    </div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function clearChat() {
        Swal.fire({
            title: 'حذف المحادثة؟',
            text: "سيتم حذف الرسائل من عندك وعند الطرف الآخر نهائياً!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            cancelButtonText: 'إلغاء',
            confirmButtonText: 'نعم، احذف'
        }).then((result) => {
            if (result.isConfirmed) {
                database.ref('chats/' + secureChatId).remove();
            }
        });
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    window.onload = listen;
</script>
</body>
</html>
