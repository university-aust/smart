<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المحادثة | نبض AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --cyan: #00e5ff; --glass: rgba(10, 15, 30, 0.9); }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: #030712 url('67260.jpg') no-repeat center center fixed;
            background-size: cover; height: 100vh; display: flex; flex-direction: column;
        }
        /* الهيدر */
        .chat-header {
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px);
            padding: 15px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.3); z-index: 10;
        }
        .back-btn { color: white; font-size: 1.2rem; text-decoration: none; }
        .user-info h4 { margin: 0; color: var(--cyan); font-size: 0.95rem; }
        .user-info span { font-size: 0.7rem; color: #ccc; }

        /* منطقة الرسائل */
        #chatBox {
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            scrollbar-width: none;
        }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: var(--cyan); color: #000; border-bottom-left-radius: 2px; }
        .received { align-self: flex-start; background: rgba(255,255,255,0.1); color: white; border-bottom-right-radius: 2px; backdrop-filter: blur(5px); }
        .time { font-size: 0.65rem; opacity: 0.6; display: block; margin-top: 5px; text-align: left; }

        /* منطقة الإدخال */
        .input-area {
            background: rgba(0,0,0,0.8); padding: 15px; display: flex; gap: 10px;
            backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1);
        }
        input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            padding: 12px; border-radius: 25px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); }
        .send-btn {
            background: var(--cyan); border: none; width: 45px; height: 45px;
            border-radius: 50%; color: #000; cursor: pointer; transition: 0.3s;
        }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="profile.html" class="back-btn"><i class="fas fa-chevron-right"></i></a>
        <div class="user-info">
            <h4 id="targetName">...</h4>
            <span id="targetItem">محادثة عامة</span>
        </div>
    </div>

    <div id="chatBox"></div>

    <form class="input-area" onsubmit="sendMessage(event)">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك هنا..." autocomplete="off">
        <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </form>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 1. استخراج البيانات من الرابط (URL)
    const urlParams = new URLSearchParams(window.location.search);
    const targetName = urlParams.get('to') || "زميل";
    const targetID = urlParams.get('toID'); // الرقم الجامعي للطرف الآخر
    const itemName = urlParams.get('item') || "محادثة عامة";

    // 2. بياناتي أنا
    const myName = localStorage.getItem("userName");
    const myID = localStorage.getItem("userID");

    // 3. توليد معرف الغرفة الموحد (ID_ID) مرتب تصاعدياً لمنع تكرار الغرف
    const chatId = [myID, targetID].sort().join("_");

    document.getElementById('targetName').innerText = targetName;
    document.getElementById('targetItem').innerText = "بخصوص: " + itemName;

    // 4. دالة جلب الرسائل (بسرعة فائقة)
    function loadMessages() {
        if (!targetID || !myID) {
            alert("خطأ في تحديد الهوية!");
            window.location.href = "profile.html";
            return;
        }

        // استخدام limitToLast لتقليل حجم البيانات وتسريع التحميل
        database.ref('chats/' + chatId).limitToLast(50).on('value', (snapshot) => {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.keys(data).forEach(key => {
                    const msg = data[key];
                    const isMe = msg.senderID === myID;
                    
                    chatBox.innerHTML += `
                        <div class="msg ${isMe ? 'sent' : 'received'}">
                            ${msg.text}
                            <span class="time">${msg.time}</span>
                        </div>
                    `;
                    
                    // تحديث حالة الرسالة كمقروءة إذا لم تكن من قبلي
                    if (!isMe && !msg.seen) {
                        database.ref('chats/' + chatId + '/' + key).update({ seen: true });
                    }
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    }

    // 5. دالة إرسال الرسالة (فورية)
    function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById('msgInput');
        const text = input.value.trim();

        if (text === "") return;

        const timestamp = new Date().getTime();
        const timeString = new Date().toLocaleTimeString('ar-SY', { hour: '2-digit', minute: '2-digit' });

        const msgData = {
            sender: myName,
            senderID: myID,
            text: text,
            time: timeString,
            timestamp: timestamp, // للترتيب الصحيح
            item: itemName,
            seen: false
        };

        // مسح الحقل فوراً لإعطاء شعور بالسرعة
        input.value = "";

        // الإرسال لقاعدة البيانات
        database.ref('chats/' + chatId).push(msgData)
        .catch(err => {
            alert("فشل الإرسال: " + err.message);
        });
    }

    window.onload = loadMessages;
</script>
</body>
</html>
