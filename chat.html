<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نبض الحوار الخاص | AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --cyan: #00d4ff; --navy-deep: #1e293b; --glass: rgba(10, 15, 30, 0.95); }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; width: 100%; position: fixed; }
        body {
            background: linear-gradient(rgba(3, 7, 18, 0.7), rgba(3, 7, 18, 0.7)), url('67260.jpg') no-repeat center center;
            background-size: cover; color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column;
        }
        .chat-header {
            height: 60px; padding: 0 20px; background: var(--glass); 
            backdrop-filter: blur(20px); border-bottom: 2px solid var(--cyan); 
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 100;
        }
        #chatBox { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; cursor: pointer; position: relative; word-wrap: break-word; }
        .my-msg { align-self: flex-start; background: linear-gradient(135deg, var(--cyan), var(--navy-deep)); color: #111; font-weight: 500; border-bottom-right-radius: 2px; }
        .other-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); border-bottom-left-radius: 2px; }
        .user-tag { font-size: 0.75rem; font-weight: 800; color: var(--cyan); margin-bottom: 5px; display: block; }
        .time { font-size: 0.65rem; opacity: 0.7; }
        .input-area { background: var(--glass); padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid var(--cyan); flex-shrink: 0; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid rgba(0, 212, 255, 0.3); outline: none; background: rgba(255, 255, 255, 0.05); color: white; font-size: 16px; }
        .send-btn { background: var(--cyan); border: none; width: 45px; height: 45px; border-radius: 50%; color: #111; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="dashboard.html" style="color:var(--cyan); font-size: 1.2rem;"><i class="fas fa-chevron-right"></i></a>
        <div style="text-align: center;">
            <h2 id="chatWith" style="margin:0; font-size:1rem;">دردشة</h2>
            <div id="itemContext" style="font-size:0.7rem; color:var(--cyan);"></div>
        </div>
        <button onclick="clearFullChat()" style="background:none; border:none; color:var(--cyan);"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off">
        <button class="send-btn" onclick="send()"><i class="fas fa-bolt"></i></button>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const otherUserName = urlParams.get('to'); 
    const otherUserID = urlParams.get('toID');
    const itemName = urlParams.get('item') || "موضوع عام";
    
    const myID = localStorage.getItem("userID");
    const myName = localStorage.getItem("userName");

    // التحقق من تسجيل الدخول للأمان
    if (!myID || !otherUserID) {
        Swal.fire('خطأ في الوصول', 'يجب الانتقال للدردشة من خلال إعلان الطالب', 'error').then(() => window.location.href='dashboard.html');
    }

    document.getElementById('chatWith').innerText = `دردشة مع ${otherUserName}`;
    document.getElementById('itemContext').innerText = `بخصوص: ${itemName}`;

    const chatId = [myID, otherUserID].sort().join("_").replace(/\s/g, '');

    function send() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;

        const msgObj = {
            sender: myName,
            senderID: myID,
            receiverID: otherUserID,
            msg: text,
            text: text,
            seen: false,
            time: new Date().toLocaleTimeString('ar-SY', {hour: '2-digit', minute:'2-digit'}),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        database.ref('chats/' + chatId).push(msgObj)
        .then(() => {
            input.value = "";
            input.focus();
        })
        .catch(err => {
            console.error(err);
            Swal.fire('فشل الأمان', 'تأكدي من صحة القواعد في فايربيس وحقول الإرسال', 'error');
        });
    }

    function listen() {
        database.ref('chats/' + chatId).on('value', (snap) => {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            const data = snap.val();
            if (data) {
                Object.keys(data).forEach(k => {
                    const m = data[k];
                    const isMe = m.senderID === myID;
                    chatBox.innerHTML += `
                        <div class="msg ${isMe ? 'my-msg' : 'other-msg'}">
                            <span class="user-tag">${isMe ? 'أنا' : m.sender}</span>
                            <div>${m.msg || m.text}</div>
                            <div style="text-align:left; margin-top:5px;"><span class="time">${m.time}</span></div>
                        </div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    window.onload = listen;
</script>
</body>
</html>
