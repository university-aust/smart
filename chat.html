<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نبض الحوار الخاص | AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --cyan: #00d4ff; --navy-deep: #1e293b; --glass: rgba(10, 15, 30, 0.95); }

        /* تعديل التصميم لضمان عمل اللمس وزر الإرسال */
        html, body { 
            height: 100vh; 
            margin: 0; 
            padding: 0; 
            overflow: hidden;
            width: 100%;
            background: #030712;
        }

        body {
            background: linear-gradient(rgba(3, 7, 18, 0.8), rgba(3, 7, 18, 0.8)), url('67260.jpg') no-repeat center center;
            background-size: cover; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; 
            flex-direction: column;
        }

        .chat-header {
            height: 65px;
            padding: 0 20px; 
            background: var(--glass); 
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--cyan); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100;
        }

        #chatBox { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            -webkit-overflow-scrolling: touch; 
        }

        /* تنسيق الرسائل */
        .msg { max-width: 80%; padding: 12px 15px; border-radius: 18px; font-size: 0.9rem; position: relative; word-wrap: break-word; line-height: 1.4; }
        .my-msg { align-self: flex-start; background: linear-gradient(135deg, var(--cyan), #0088cc); color: #000; border-bottom-right-radius: 2px; font-weight: 500;}
        .other-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); border-bottom-left-radius: 2px; }
        
        .user-tag { font-size: 0.7rem; font-weight: bold; color: var(--navy-deep); margin-bottom: 3px; display: block; }
        .other-msg .user-tag { color: var(--cyan); }
        .time { font-size: 0.6rem; opacity: 0.7; margin-top: 4px; display: block; }

        .status-bolt { font-size: 0.7rem; margin-right: 5px; }
        .seen { color: var(--navy-deep); filter: drop-shadow(0 0 2px white); }
        .sent { color: rgba(0,0,0,0.3); }

        /* شريط الكتابة */
        .input-area { 
            background: var(--glass); 
            padding: 12px 15px; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid var(--cyan); 
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }

        #msgInput { 
            flex: 1; 
            padding: 12px 18px; 
            border-radius: 25px; 
            border: 1px solid rgba(0, 212, 255, 0.3); 
            outline: none; 
            font-size: 16px; 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
        }

        .send-btn { 
            background: var(--cyan); border: none; width: 48px; height: 48px; 
            border-radius: 50%; color: #111; display: flex; 
            align-items: center; justify-content: center; font-size: 1.2rem; 
            cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px var(--cyan);
        }
        .send-btn:active { transform: scale(0.9); box-shadow: none; }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="dashboard.html" style="color:var(--cyan); font-size: 1.3rem;"><i class="fas fa-arrow-right"></i></a>
        <div style="text-align: center;">
            <h2 id="chatWith" style="margin:0; font-size:0.95rem;">دردشة</h2>
            <div id="itemContext" style="font-size:0.65rem; color:var(--cyan); opacity: 0.8;"></div>
        </div>
        <button onclick="clearFullChat()" style="background:none; border:none; color:var(--cyan); font-size: 1.1rem;"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div id="chatBox"></div>

    <form class="input-area" onsubmit="event.preventDefault(); sendMsg();">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off">
        <button type="submit" class="send-btn"><i class="fas fa-bolt"></i></button>
    </form>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // جلب البيانات مع تأمين الهوية عبر الـ ID
    const urlParams = new URLSearchParams(window.location.search);
    const otherUserName = urlParams.get('to') || "زميل";
    const otherUserID = urlParams.get('toID'); // الرقم الجامعي للطرف الآخر
    const itemName = urlParams.get('item') || "موضوع عام";
    
    const myName = localStorage.getItem("userName") || "شهد الخالد";
    const myID = localStorage.getItem("userID");

    // إنشاء معرف غرفة فريد باستخدام الأرقام الجامعية (أكثر أماناً من الأسماء)
    // إذا لم يتوفر ID الطرف الآخر، نستخدم الاسم كبديل مؤقت (للتوافق)
    const chatPartnerKey = otherUserID || otherUserName.replace(/\s/g, '');
    const myKey = myID || myName.replace(/\s/g, '');
    const chatId = [myKey, chatPartnerKey].sort().join("_");

    document.getElementById('chatWith').innerText = `دردشة مع ${otherUserName}`;
    document.getElementById('itemContext').innerText = `بخصوص: ${itemName}`;

    // دالة الإرسال المعدلة لتكون فورية وغير متجمدة
    function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !myID) {
            if(!myID) Swal.fire('خطأ', 'يرجى تسجيل الدخول أولاً', 'error');
            return;
        }
        
        const newMsg = {
            sender: myName,
            senderID: myID,
            text: text,
            seen: false,
            time: new Date().toLocaleTimeString('ar-SY', {hour: '2-digit', minute:'2-digit'}),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        // مسح الحقل فوراً
        input.value = "";

        database.ref('chats/' + chatId).push(newMsg)
        .then(() => {
            console.log("Sent successfully");
        })
        .catch(err => {
            console.error("Error sending:", err);
            input.value = text; // إعادة النص في حال الفشل
        });
    }

    function listenForMessages() {
        const chatBox = document.getElementById('chatBox');
        database.ref('chats/' + chatId).on('value', (snap) => {
            chatBox.innerHTML = "";
            const data = snap.val();
            if (data) {
                Object.keys(data).forEach(k => {
                    const m = data[k];
                    const isMe = m.senderID === myID;
                    const boltClass = m.seen ? 'seen' : 'sent';
                    
                    chatBox.innerHTML += `
                        <div class="msg ${isMe ? 'my-msg' : 'other-msg'}" ontouchstart="handleLongPress('${k}')">
                            <span class="user-tag">${isMe ? 'أنا' : m.sender}</span>
                            <div>${m.text}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="time">${m.time}</span>
                                ${isMe ? `<i class="fas fa-bolt status-bolt ${boltClass}"></i>` : ''}
                            </div>
                        </div>`;
                    
                    // تحديث حالة "شوهد"
                    if (!isMe && !m.seen) {
                        database.ref('chats/' + chatId + '/' + k).update({ seen: true });
                    }
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    }

    function clearFullChat() {
        Swal.fire({
            title: 'مسح المحادثة؟',
            text: "سيتم حذف الرسائل من الطرفين!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'نعم، امسح'
        }).then(r => { if (r.isConfirmed) database.ref('chats/' + chatId).remove(); });
    }

    // دعم العرض على الآيفون عند ظهور الكيبورد
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            window.scrollTo(0, 0);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        });
    }

    window.onload = listenForMessages;
</script>
</body>
</html>
