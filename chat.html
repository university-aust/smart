<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نبض الحوار | AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --cyan: #00d4ff; --navy: #0f172a; --glass: rgba(10, 15, 30, 0.96); }
        
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; width: 100%; position: fixed; background: #030712; }
        body {
            background: linear-gradient(rgba(3, 7, 18, 0.8), rgba(3, 7, 18, 0.8)), url('67260.jpg') no-repeat center center;
            background-size: cover; color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
        }

        .chat-header {
            height: 65px; padding: 0 20px; background: var(--glass); 
            backdrop-filter: blur(20px); border-bottom: 2px solid var(--cyan); 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        #chatBox { 
            flex: 1; padding: 20px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; 
        }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; position: relative; line-height: 1.5; }
        .my-msg { align-self: flex-start; background: linear-gradient(135deg, var(--cyan), #0088cc); color: #000; border-bottom-right-radius: 2px; font-weight: 500; box-shadow: 0 4px 12px rgba(0,212,255,0.2); }
        .other-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); border-bottom-left-radius: 2px; }
        
        .user-tag { font-size: 0.7rem; font-weight: 900; margin-bottom: 4px; display: block; color: var(--navy); }
        .other-msg .user-tag { color: var(--cyan); }
        .time { font-size: 0.6rem; opacity: 0.6; margin-top: 5px; display: block; }
        .status-bolt { font-size: 0.7rem; margin-right: 5px; transition: 0.3s; }
        .seen { color: var(--navy); filter: drop-shadow(0 0 2px #fff); }
        .sent { color: rgba(0,0,0,0.2); }

        .input-area { 
            background: var(--glass); padding: 12px 15px; display: flex; gap: 10px; 
            border-top: 1px solid rgba(0, 212, 255, 0.2); 
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }

        #msgInput { 
            flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid rgba(0, 212, 255, 0.3); 
            outline: none; font-size: 16px; background: rgba(255, 255, 255, 0.08); color: white; 
        }

        .send-btn { 
            background: var(--cyan); border: none; width: 50px; height: 50px; 
            border-radius: 50%; color: #000; display: flex; 
            align-items: center; justify-content: center; font-size: 1.3rem; 
            cursor: pointer; box-shadow: 0 0 15px var(--cyan);
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="profile.html" style="color:var(--cyan); font-size: 1.4rem;"><i class="fas fa-arrow-right"></i></a>
        <div style="text-align: center;">
            <h2 id="chatWith" style="margin:0; font-size:1rem;">جاري التحميل...</h2>
            <div id="itemContext" style="font-size:0.65rem; color:var(--cyan); opacity: 0.8;"></div>
        </div>
        <button onclick="clearFullChat()" style="background:none; border:none; color:var(--cyan); font-size: 1.1rem;"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div id="chatBox"></div>

    <form class="input-area" onsubmit="event.preventDefault(); handleSend();">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off">
        <button type="submit" id="sendBtn" class="send-btn"><i class="fas fa-bolt"></i></button>
    </form>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // جلب البيانات من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const otherUser = urlParams.get('to') || "زميل";
    const otherID = urlParams.get('toID') || "Unknown";
    const itemName = urlParams.get('item') || "موضوع عام";
    
    // بياناتي الشخصية
    const myName = localStorage.getItem("userName");
    const myID = localStorage.getItem("universityID"); // استخدام المعرف الموحد

    // إنشاء معرف فريد للغرفة يعتمد على الأرقام الجامعية لضمان الخصوصية والربط
    const chatId = [myID, otherID].sort().join("_");

    document.getElementById('chatWith').innerText = `دردشة مع ${otherUser}`;
    document.getElementById('itemContext').innerText = `بخصوص: ${itemName}`;

    // مراقبة الرسائل
    function listenForMessages() {
        const chatBox = document.getElementById('chatBox');
        database.ref('chats/' + chatId).on('value', (snap) => {
            chatBox.innerHTML = "";
            const data = snap.val();
            if (data) {
                Object.keys(data).forEach(k => {
                    const m = data[k];
                    const isMe = m.senderID === myID;
                    const statusClass = m.seen ? 'seen' : 'sent';
                    
                    chatBox.innerHTML += `
                        <div class="msg ${isMe ? 'my-msg' : 'other-msg'}">
                            <span class="user-tag">${isMe ? 'أنا' : m.sender}</span>
                            <div>${m.text}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span class="time">${m.time}</span>
                                ${isMe ? `<i class="fas fa-bolt status-bolt ${statusClass}"></i>` : ''}
                            </div>
                        </div>`;

                    // تحديث حالة الرسالة لـ "مقروءة" إذا فتحها الطرف الآخر
                    if (!isMe && !m.seen) {
                        database.ref('chats/' + chatId + '/' + k).update({ seen: true });
                    }
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    }

    // وظيفة الإرسال المحسنة أمنياً
    function handleSend() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        
        if (!text) return;

        const msgData = {
            sender: myName,
            senderID: myID,
            receiverName: otherUser, // هام لظهور الاسم في بروفايلك
            receiverID: otherID,     // هام لفرز المحادثات في بروفايلك
            text: text,
            item: itemName,
            seen: false,
            time: new Date().toLocaleTimeString('ar-SY', {hour: '2-digit', minute:'2-digit'}),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        input.value = ""; 

        database.ref('chats/' + chatId).push(msgData)
        .then(() => {
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        })
        .catch(err => {
            input.value = text;
            Swal.fire('خطأ في الشبكة', 'تعذر إرسال الرسالة الآن', 'error');
        });
    }

    function clearFullChat() {
        Swal.fire({
            title: 'حذف المحادثة؟',
            text: "سيتم حذف السجل بالكامل من الطرفين!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'نعم، امسح',
            cancelButtonText: 'إلغاء',
            background: '#0a101e',
            color: '#fff'
        }).then(r => { 
            if (r.isConfirmed) database.ref('chats/' + chatId).remove(); 
        });
    }

    // تشغيل الاستماع عند التحميل
    window.onload = listenForMessages;

    // التعامل مع الكيبورد في الجوال
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        });
    }
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نبض الحوار الخاص | AUST</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --cyan: #00d4ff; --navy-deep: #1e293b; --glass: rgba(10, 15, 30, 0.95); }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; width: 100%; position: fixed; }

        body {
            background: linear-gradient(rgba(3, 7, 18, 0.7), rgba(3, 7, 18, 0.7)), url('67260.jpg') no-repeat center center;
            background-size: cover; color: white; font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column;
        }

        .chat-header {
            height: 60px; padding: 0 20px; background: var(--glass); 
            backdrop-filter: blur(20px); border-bottom: 2px solid var(--cyan); 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        #chatBox { 
            flex: 1; padding: 20px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch; 
        }

        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; position: relative; word-wrap: break-word; }
        .my-msg { align-self: flex-start; background: linear-gradient(135deg, var(--cyan), var(--navy-deep)); border-bottom-right-radius: 2px; color: #111; font-weight: 500;}
        .other-msg { align-self: flex-end; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); border-bottom-left-radius: 2px; }
        
        .user-tag { font-size: 0.75rem; font-weight: 800; color: var(--cyan); margin-bottom: 5px; display: block; }
        .time { font-size: 0.65rem; opacity: 0.7; }

        .status-bolt-sent { color: #666; font-size: 0.8rem; margin-right: 5px; } 
        .status-bolt-seen { color: var(--cyan); font-size: 0.8rem; margin-right: 5px; filter: drop-shadow(0 0 3px var(--cyan)); }

        .input-area { 
            background: var(--glass); padding: 10px 15px; display: flex; gap: 10px; 
            border-top: 1px solid var(--cyan); padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        input { 
            flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid rgba(0, 212, 255, 0.3); 
            background: rgba(255, 255, 255, 0.05); color: white; outline: none; font-size: 16px; 
        }

        .send-btn { 
            background: var(--cyan); border: none; width: 45px; height: 45px; 
            border-radius: 50%; color: #111; display: flex; align-items: center; justify-content: center; 
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="dashboard.html" style="color:var(--cyan); font-size: 1.2rem;"><i class="fas fa-chevron-right"></i></a>
        <div style="text-align: center;">
            <h2 id="chatWith" style="margin:0; font-size:1rem;">دردشة</h2>
            <div id="itemContext" style="font-size:0.7rem; color:var(--cyan);"></div>
        </div>
        <button onclick="clearFullChat()" style="background:none; border:none; color:var(--cyan);"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off">
        <button class="send-btn" onclick="send()"><i class="fas fa-bolt"></i></button>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // جلب البيانات من الرابط (المعرض يرسل الاسم والـ ID)
    const urlParams = new URLSearchParams(window.location.search);
    const otherUserName = urlParams.get('toName') || "زميل";
    const otherUserID = urlParams.get('toID'); // المعرّف الفريد للطرف الآخر
    const itemName = urlParams.get('item') || "موضوع عام";
    
    // بياناتي الشخصية من الـ localStorage
    const currentUserName = localStorage.getItem("userName") || "مستخدم";
    const currentUserID = localStorage.getItem("userID"); 

    // توليد معرف المحادثة بناءً على الـ ID لضمان الخصوصية
    if (!currentUserID || !otherUserID) {
        Swal.fire('خطأ', 'يجب تسجيل الدخول أولاً', 'error').then(() => window.location.href='index.html');
    }
    const chatId = [currentUserID, otherUserID].sort().join("_");

    document.getElementById('chatWith').innerText = `دردشة مع ${otherUserName}`;
    document.getElementById('itemContext').innerText = `بخصوص: ${itemName}`;

    function send() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text) return;
        
        database.ref('chats/' + chatId).push({
            senderName: currentUserName,
            senderID: currentUserID,
            receiverID: otherUserID,
            text: text,
            seen: false,
            time: new Date().toLocaleTimeString('ar-SY', {hour: '2-digit', minute:'2-digit'}),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            input.value = "";
            input.focus();
        });
    }

    function listenForMessages() {
        const chatBox = document.getElementById('chatBox');
        database.ref('chats/' + chatId).on('value', (snap) => {
            const data = snap.val();
            chatBox.innerHTML = "";
            if (data) {
                Object.keys(data).forEach(k => {
                    const m = data[k];
                    const isMe = m.senderID === currentUserID;
                    const bolt = `<span class="${m.seen ? 'status-bolt-seen' : 'status-bolt-sent'}"><i class="fas fa-bolt"></i></span>`;
                    
                    chatBox.innerHTML += `
                        <div class="msg ${isMe ? 'my-msg' : 'other-msg'}" ondblclick="deleteMsg('${k}')">
                            <span class="user-tag">${isMe ? 'أنا' : m.senderName}</span>
                            <div>${m.text}</div>
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                                <span class="time">${m.time}</span>
                                ${isMe ? bolt : ''}
                            </div>
                        </div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
                markAsSeen();
            }
        });
    }

    function markAsSeen() {
        database.ref('chats/' + chatId).once('value', (snap) => {
            const messages = snap.val();
            if (messages) {
                Object.keys(messages).forEach(key => {
                    if (messages[key].senderID !== currentUserID && !messages[key].seen) {
                        database.ref('chats/' + chatId + '/' + key).update({ seen: true });
                    }
                });
            }
        });
    }

    function deleteMsg(msgId) {
        Swal.fire({ title: 'حذف الرسالة؟', icon: 'warning', showCancelButton: true, confirmButtonText: 'حذف' }).then(r => {
            if (r.isConfirmed) database.ref('chats/' + chatId + '/' + msgId).remove();
        });
    }

    function clearFullChat() {
        Swal.fire({ title: 'مسح المحادثة بالكامل؟', icon: 'warning', showCancelButton: true, confirmButtonText: 'مسح' }).then(r => {
            if (r.isConfirmed) database.ref('chats/' + chatId).remove();
        });
    }

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    window.onload = listenForMessages;

    // معالجة ظهور الكيبورد في الموبايل
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }
</script>
</body>
</html>
