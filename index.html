<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST Smart Pulse | دخول آمن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #00d4ff; 
            --gold-glow: rgba(0, 212, 255, 0.6);
            --glass: rgba(10, 15, 30, 0.85);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #030712 url('67260.jpg') no-repeat center center fixed;
            background-size: cover; overflow: hidden; position: relative;
        }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 0; }
        .glass-container {
            position: relative; z-index: 1; width: 420px; padding: 35px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 40px;
            text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: 0.4s;
        }
        .brand-h1 { font-size: 2.5rem; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .form-group { margin-top: 15px; text-align: right; position: relative; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--gold); font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: none; background: rgba(255, 255, 255, 0.95); color: #222; outline: none; }
        .submit-btn { width: 100%; padding: 16px; margin-top: 20px; background: linear-gradient(45deg, var(--gold), #1e293b); color: #fff; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .pass-toggle { position: absolute; left: 12px; bottom: 12px; color: #666; cursor: pointer; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { background: rgba(10, 15, 30, 0.9); color: white; padding: 12px 25px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 10px; animation: slideDown 0.4s; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="glass-container" id="authSection">
        <h1 class="brand-h1">Smart Pulse</h1>
        <h2 id="mainTitle" style="color:white; margin: 10px 0;">تسجيل الدخول</h2>
        
        <form id="authForm" onsubmit="event.preventDefault(); handleAction();">
            <div class="form-group" id="nameGroup" style="display:none;">
                <label>الاسم الثلاثي</label>
                <input type="text" id="nameInput" placeholder="الاسم الأب الكنية">
            </div>

            <div class="form-group">
                <label>رقم الطالب (ID)</label>
                <input type="text" id="idInput" placeholder="2026XXXX">
            </div>
            
            <div class="form-group" id="emailGroup" style="display:none;">
                <label>البريد الإلكتروني (Gmail)</label>
                <input type="email" id="emailInput" placeholder="name@gmail.com">
            </div>

            <div class="form-group" id="passGroup">
                <label id="passLabel">الرمز السري</label>
                <input type="password" id="passInput" placeholder="********">
                <i class="fas fa-eye pass-toggle" onclick="togglePass(this)"></i>
            </div>

            <button type="submit" class="submit-btn" id="btnText">دخول المنصة</button>
        </form>

        <div style="margin-top:20px; font-size:0.85rem; cursor:pointer; color: #fff;" onclick="toggleMode()" id="toggleTxt">ليس لديك حساب؟ <b>إنشاء حساب جديد</b></div>
        <div style="margin-top:10px; font-size:0.8rem; color:var(--gold); cursor:pointer; text-decoration:underline;" id="forgotLink" onclick="forgotPassword()">نسيت كلمة المرور؟</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo",
            authDomain: "nabd-aust.firebaseapp.com",
            databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "nabd-aust",
            storageBucket: "nabd-aust.firebasestorage.app",
            messagingSenderId: "921777725948",
            appId: "1:921777725948:web:7b024d0aa101068bef9279"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        let mode = 'login';

        function notify(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3500);
        }

        function togglePass(icon) {
            const input = document.getElementById('passInput');
            input.type = (input.type === 'password') ? 'text' : 'password';
            icon.classList.toggle('fa-eye-slash');
        }

        function toggleMode() {
            if (mode === 'login') {
                mode = 'register';
                updateUI("إنشاء حساب", "تأكيد الحساب", "block", "block", "إنشاء حساب جديد؟ <b>سجل دخولك</b>");
                document.getElementById('forgotLink').style.display = 'none';
            } else {
                mode = 'login';
                updateUI("تسجيل الدخول", "دخول المنصة", "none", "none", "ليس لديك حساب؟ <b>إنشاء حساب جديد</b>");
                document.getElementById('forgotLink').style.display = 'block';
            }
        }

        function updateUI(t, b, n, e, sw) {
            document.getElementById('mainTitle').innerText = t;
            document.getElementById('btnText').innerText = b;
            document.getElementById('nameGroup').style.display = n;
            document.getElementById('emailGroup').style.display = e;
            document.getElementById('toggleTxt').innerHTML = sw;
        }

        async function handleAction() {
            const id = document.getElementById('idInput').value.trim();
            const pass = document.getElementById('passInput').value;
            const email = document.getElementById('emailInput').value.trim();
            const name = document.getElementById('nameInput').value.trim();

            if (!id) { notify("يرجى إدخال رقم الطالب"); return; }

            if (mode === 'register') {
                if (!email || !pass || !name) { notify("يرجى إكمال كافة الحقول"); return; }
                if (pass.length < 8) { notify("كلمة المرور يجب أن تكون 8 رموز على الأقل"); return; }
                
                try {
                    // التحقق من عدم تكرار رقم الطالب في الداتابيز
                    const snap = await database.ref('users/' + id).once('value');
                    if (snap.exists()) { notify("رقم الطالب مسجل مسبقاً!"); return; }

                    // إنشاء الحساب في Firebase Auth (آمن ومشفر)
                    const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                    await userCredential.user.sendEmailVerification();
                    
                    // تخزين البيانات العامة فقط
                    await database.ref('users/' + id).set({
                        name: name,
                        email: email,
                        id: id,
                        createdAt: new Date().toISOString()
                    });

                    notify("تم التسجيل! تفقد بريدك الإلكتروني لتفعيل الحساب ✅");
                    auth.signOut();
                    toggleMode();
                } catch (err) { notify("خطأ: " + err.message); }
            } 
            else {
                try {
                    // جلب الإيميل المرتبط برقم الطالب المسجل
                    const snap = await database.ref('users/' + id).once('value');
                    if (!snap.exists()) { notify("رقم الطالب غير موجود"); return; }
                    
                    const userData = snap.val();
                    const userCredential = await auth.signInWithEmailAndPassword(userData.email, pass);
                    
                    if (userCredential.user.emailVerified) {
                        localStorage.setItem("userName", userData.name);
                        localStorage.setItem("userID", id);
                        notify("جاري الدخول...");
                        setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
                    } else {
                        notify("يرجى تفعيل الحساب من الإيميل أولاً 📧");
                        auth.signOut();
                    }
                } catch (err) { notify("خطأ في البيانات أو كلمة المرور"); }
            }
        }

        function forgotPassword() {
            const email = prompt("أدخل بريدك الإلكتروني المسجل (Gmail):");
            if (email) {
                auth.sendPasswordResetEmail(email)
                .then(() => notify("تم إرسال رابط إعادة تعيين كلمة المرور لإيميلك"))
                .catch(err => notify("خطأ: " + err.message));
            }
        }
    </script>
</body>
</html>
