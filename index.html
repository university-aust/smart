<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pulse | دخول المنصة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #00d4ff; --gold-glow: rgba(0, 212, 255, 0.6); --glass: rgba(10, 15, 30, 0.75); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #030712; background-image: url('67260.jpg'); background-size: cover; background-position: center; background-attachment: fixed; overflow: hidden; position: relative; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); z-index: 0; }
        .glass-container { position: relative; z-index: 1; width: 420px; padding: 35px; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 45px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: 0.4s; }
        .glass-container:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 0 30px var(--gold-glow); }
        .brand-h1 { font-size: 2.8rem; background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .wisdom-container { margin: 20px 0; padding: 20px; background: rgba(0, 0, 0, 0.4); border-radius: 20px; border-right: 4px solid var(--gold); }
        .main-btn, .submit-btn { display: block; width: 100%; padding: 16px; margin-top: 15px; background: linear-gradient(45deg, var(--gold), #1e293b); color: #fff; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px var(--gold-glow); }
        .form-group { margin-top: 15px; text-align: right; position: relative; }
        label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--gold); font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: none; background: white; color: #222; outline: none; font-weight: bold; }
        .pass-toggle { position: absolute; left: 12px; bottom: 12px; color: #666; cursor: pointer; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { background: #0a0f1e; color: white; padding: 12px 25px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 5px; animation: slideDown 0.4s; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="glass-container" id="welcomeSection">
        <h1 class="brand-h1">Smart Pulse</h1>
        <div class="wisdom-container">
            <p style="color:white; font-style:italic;">"كل خطوة تخطوها اليوم تجعل القمة أقرب."</p>
        </div>
        <button class="main-btn" onclick="showAuth()">انطلق نحو مستقبلك</button>
        <p style="margin-top:15px; font-size:0.8rem; color:white;">تطوير شهد الخالد & ضياء ملائكه</p>
    </div>

    <div class="glass-container" id="authSection" style="display:none;">
        <h2 id="mainTitle" style="color:var(--gold); margin-bottom:15px;">تسجيل الدخول</h2>
        <form id="authForm" onsubmit="event.preventDefault(); handleAction();">
            <div class="form-group" id="nameGroup" style="display:none;"><label>الاسم الثلاثي</label><input type="text" id="nameInput"></div>
            <div class="form-group"><label>رقم الطالب (ID)</label><input type="text" id="idInput"></div>
            <div class="form-group" id="emailGroup" style="display:none;"><label>البريد الإلكتروني</label><input type="email" id="emailInput"></div>
            
            <div class="form-group" id="codeGroup" style="display:none;"><label>كود التحقق (من Gmail)</label><input type="text" id="codeInput" placeholder="أدخل الكود هنا"></div>
            
            <div class="form-group" id="passGroup"><label id="passLabel">الرمز السري</label><input type="password" id="passInput"><i class="fas fa-eye pass-toggle" onclick="togglePass(this)"></i></div>
            <button type="submit" class="submit-btn" id="btnText">دخول المنصة</button>
        </form>
        <div id="toggleTxt" style="margin-top:20px; font-size:0.85rem; cursor:pointer; color:white;" onclick="toggleMode()">ليس لديك حساب؟ إنشاء حساب</div>
        <div id="forgotLink" style="margin-top:10px; color:var(--gold); cursor:pointer; font-size:0.8rem;" onclick="showForgot()">نسيت كلمة المرور؟</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    (function() { emailjs.init("m905j3dqOVj_wLxf-"); })();
    const firebaseConfig = { apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo", authDomain: "nabd-aust.firebaseapp.com", databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app", projectId: "nabd-aust", storageBucket: "nabd-aust.firebasestorage.app", messagingSenderId: "921777725948", appId: "1:921777725948:web:7b024d0aa101068bef9279" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let mode = 'login';
    let generatedCode = null;

    function notify(msg) {
        const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
        document.getElementById('toast-container').appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showAuth() { document.getElementById('welcomeSection').style.display = 'none'; document.getElementById('authSection').style.display = 'block'; }
    function togglePass(icon) { const p = document.getElementById('passInput'); p.type = p.type==='password'?'text':'password'; icon.classList.toggle('fa-eye-slash'); }

    function toggleMode() {
        mode = (mode === 'login' || mode === 'forgot' || mode === 'verify') ? 'register' : 'login';
        updateUI();
    }

    function showForgot() { mode = 'forgot'; updateUI(); }

    function updateUI() {
        const groups = { name: 'none', email: 'none', code: 'none', pass: 'block', forgot: 'block' };
        if (mode === 'register') { 
            Object.assign(groups, { name: 'block', email: 'block' }); 
            document.getElementById('mainTitle').innerText = "إنشاء حساب";
            document.getElementById('btnText').innerText = "تأكيد الحساب";
            document.getElementById('toggleTxt').innerText = "لديك حساب؟ سجل دخولك";
            document.getElementById('forgotLink').style.display = 'none';
        } else if (mode === 'login') {
            document.getElementById('mainTitle').innerText = "تسجيل الدخول";
            document.getElementById('btnText').innerText = "دخول المنصة";
            document.getElementById('toggleTxt').innerText = "إنشاء حساب جديد";
            document.getElementById('forgotLink').style.display = 'block';
        } else if (mode === 'forgot') {
            Object.assign(groups, { email: 'block', pass: 'none', forgot: 'none' });
            document.getElementById('mainTitle').innerText = "استعادة الرمز";
            document.getElementById('btnText').innerText = "إرسال الكود";
            document.getElementById('toggleTxt').innerText = "العودة للدخول";
        } else if (mode === 'verify') {
            Object.assign(groups, { email: 'none', code: 'block', pass: 'block' });
            document.getElementById('mainTitle').innerText = "إدخال الكود";
            document.getElementById('passLabel').innerText = "الرمز الجديد";
            document.getElementById('btnText').innerText = "تغيير الرمز";
        }
        
        document.getElementById('nameGroup').style.display = groups.name;
        document.getElementById('emailGroup').style.display = groups.email;
        document.getElementById('codeGroup').style.display = groups.code;
        document.getElementById('passGroup').style.display = groups.pass;
    }

    async function handleAction() {
        const id = document.getElementById('idInput').value.trim();
        const pass = document.getElementById('passInput').value;
        const email = document.getElementById('emailInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();

        if (!id) return notify("يرجى إدخال الرقم الجامعي");

        if (mode === 'register') {
            if (name.split(' ').length < 3) return notify("الاسم الثلاثي مطلوب");
            if (pass.length < 8) return notify("الرمز ضعيف (8 محارف)");
            
            database.ref('users/' + id).once('value', s => {
                if (s.exists()) return notify("الحساب موجود مسبقاً");
                database.ref('users/' + id).set({ id, pass, name, email, major: "هندسة البرمجيات", createdAt: new Date().toISOString() })
                .then(() => { notify("تم الحساب! سجل دخولك"); toggleMode(); });
            });
        } 
        else if (mode === 'login') {
            database.ref('users/' + id).once('value', s => {
                const d = s.val();
                if (d && d.pass === pass) {
                    localStorage.setItem("userName", d.name);
                    localStorage.setItem("userID", d.id);
                    localStorage.setItem("studentID", d.id);
                    localStorage.setItem("userMajor", d.major || "هندسة البرمجيات");
                    notify("أهلاً " + d.name);
                    setTimeout(() => location.href = "dashboard.html", 1000);
                } else notify("خطأ في البيانات");
            });
        }
        else if (mode === 'forgot') {
            notify("جاري إرسال الكود...");
            database.ref('users/' + id).once('value', s => {
                const d = s.val();
                if (d && d.email.toLowerCase() === email.toLowerCase()) {
                    generatedCode = Math.floor(100000 + Math.random() * 900000);
                    emailjs.send("service_cgm7d0c", "template_xi6oxl7", { to_name: d.name, to_email: email, recovery_code: generatedCode })
                    .then(() => { notify("تم الإرسال لـ Gmail"); mode = 'verify'; updateUI(); });
                } else notify("البيانات غير متطابقة");
            });
        }
        else if (mode === 'verify') {
            const userCode = document.getElementById('codeInput').value;
            if (userCode == generatedCode) {
                if (pass.length < 8) return notify("الرمز الجديد قصير");
                database.ref('users/' + id).update({ pass }).then(() => {
                    notify("تم التغيير بنجاح!");
                    mode = 'login'; updateUI();
                });
            } else notify("الكود خاطئ!");
        }
    }

    document.getElementById('idInput').addEventListener('input', function() { this.value = this.value.replace(/[^0-9]/g, ''); });
</script>
</body>
</html>
