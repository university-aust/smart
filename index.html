<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST Smart Pulse | تسجيل الدخول </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root {
        --gold: #00d4ff; 
        --gold-glow: rgba(0, 212, 255, 0.6);
        --glass: rgba(10, 15, 30, 0.75);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

    body {
        height: 100vh; display: flex; justify-content: center; align-items: center;
        background-color: #030712;
        background-image: url('67260.jpg');
        background-size: cover; background-position: center; background-attachment: fixed;
        overflow: hidden; position: relative;
    }

    body::before { 
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0, 0, 0, 0.3);
        z-index: 0; 
    }

    .glass-container {
        position: relative; z-index: 1; width: 420px; padding: 35px;
        background: var(--glass); 
        backdrop-filter: blur(15px) saturate(160%); 
        -webkit-backdrop-filter: blur(15px) saturate(160%);
        border: 1px solid rgba(0, 212, 255, 0.3); 
        border-radius: 45px;
        text-align: center; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        transition: all 0.5s ease-in-out;
    }

    .glass-container:hover {
        transform: translateY(-10px); 
        box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 40px var(--gold-glow);
        border-color: var(--gold);
    }

    .top-line { width: 60px; height: 4px; background: var(--gold); margin: 0 auto 15px; border-radius: 10px; box-shadow: 0 0 15px var(--gold); }
    
    .brand-h1 { 
        font-size: 2.8rem; margin: 0; 
        background: linear-gradient(to bottom, #fff 40%, var(--gold)); 
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; 
        font-weight: 900; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5)); 
    }

    .wisdom-container { margin: 20px 0; padding: 25px; background: rgba(0, 0, 0, 0.4); border-radius: 25px; border-right: 4px solid var(--gold); }
    .wisdom-text { font-size: 1.1rem; line-height: 1.6; color: #fff; font-style: italic; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }

    .main-btn, .submit-btn {
        display: block; width: 100%; padding: 16px; margin-top: 20px;
        background: linear-gradient(45deg, var(--gold), #1e293b);
        color: #fff; border: none; border-radius: 15px; font-weight: 800;
        font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        box-shadow: 0 4px 15px var(--gold-glow);
    }

    .form-group { margin-top: 15px; text-align: right; position: relative; }
    label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--gold); font-weight: bold; }
    
    input { 
        width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
        background: rgba(255, 255, 255, 0.95); color: #222; font-size: 1rem; outline: none; transition: 0.3s; 
    }
    input:focus { transform: translateY(-2px); box-shadow: 0 5px 15px var(--gold-glow); }

    .pass-toggle { position: absolute; left: 12px; bottom: 12px; color: #666; cursor: pointer; }
    .footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; color: #fff; text-shadow: 1px 1px 2px #000; }
    
    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
    .toast { 
        background: rgba(10, 15, 30, 0.9); backdrop-filter: blur(10px); 
        color: white; padding: 12px 25px; border-radius: 15px; 
        border: 1px solid var(--gold); margin-bottom: 10px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        animation: slideDown 0.4s ease-out;
    }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="glass-container" id="welcomeSection">
        <div class="top-line"></div>
        <p style="color: var(--gold); font-weight: 600;">اهلا وسهلا بك في</p>
        <h1 class="brand-h1">Smart Pulse</h1>
        <div class="wisdom-container">
            <p class="wisdom-text">"الطريق طويل، لكن كل خطوة تخطوها اليوم تجعل القمة أقرب."</p>
        </div>
        <button class="main-btn" onclick="showAuth()">انطلق نحو مستقبلك</button>
        <div class="footer">تطوير المهندسة <b>شهد الخالد</b> & المهندسة<b> ضياء ملائكه</b></div>
    </div>

    <div class="glass-container" id="authSection" style="display:none;">
        <div class="top-line"></div>
        <h2 id="mainTitle" style="color:var(--gold); margin-bottom:15px;">تسجيل الدخول</h2>
        
        <form id="authForm" onsubmit="event.preventDefault(); handleAction();">
            <div class="form-group" id="nameGroup" style="display:none;">
                <label>الاسم الثلاثي</label>
                <input type="text" id="nameInput" placeholder="الاسم الأب الكنية">
            </div>

            <div class="form-group">
                <label>رقم الطالب (ID)</label>
                <input type="text" id="idInput" placeholder="2026XXXX">
            </div>
            
            <div class="form-group" id="emailGroup" style="display:none;">
                <label>البريد الإلكتروني (Gmail)</label>
                <input type="email" id="emailInput" placeholder="name@gmail.com">
            </div>

            <div class="form-group" id="verifyCodeGroup" style="display:none;">
                <label>كود التحقق المرسل للإيميل</label>
                <input type="text" id="verifyCodeInput" placeholder="أدخل الـ 6 أرقام">
            </div>

            <div class="form-group" id="passGroup">
                <label id="passLabel">الرمز السري (8 محارف على الأقل)</label>
                <input type="password" id="passInput" placeholder="أحرف، أرقام، رموز">
                <i class="fas fa-eye pass-toggle" onclick="togglePass(this)"></i>
            </div>

            <button type="submit" class="submit-btn" id="btnText">دخول المنصة</button>
        </form>

        <div style="margin-top:20px; font-size:0.85rem; cursor:pointer; color: #fff;" onclick="toggleMode()" id="toggleTxt">ليس لديك حساب؟ <b>إنشاء حساب جديد</b></div>
        <div style="margin-top:10px; font-size:0.8rem; color:var(--gold); cursor:pointer; text-decoration:underline;" id="forgotLink" onclick="showForgot()">نسيت كلمة المرور؟</div>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>

<script>
    // =====================================================
    // 🔥 الأمان: Firebase Config (غيّر القيم الحقيقية)
    // =====================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCgdZ1NicU8mZzW-pe1-Tk9X36ivcx0OMo", // غيّر لجديد من Firebase Console
        authDomain: "nabd-aust.firebaseapp.com",
        databaseURL: "https://nabd-aust-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "nabd-aust",
        storageBucket: "nabd-aust.firebasestorage.app",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    // تهيئة Firebase مع error handling
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // =====================================================
    // 🔥 الأمان: Rate Limiting (3 محاولات/5 دقائق)
    // =====================================================
    let loginAttempts = parseInt(localStorage.getItem('loginAttempts') || '0');
    let lastAttempt = parseInt(localStorage.getItem('lastAttempt') || '0');
    const RATE_LIMIT_TIME = 5 * 60 * 1000; // 5 دقائق

    function checkRateLimit() {
        const now = Date.now();
        if (now - lastAttempt < RATE_LIMIT_TIME && loginAttempts >= 3) {
            notify("🚫 تم تجاوز الحد! انتظر 5 دقائق");
            return false;
        }
        if (now - lastAttempt > RATE_LIMIT_TIME) {
            loginAttempts = 0;
            localStorage.setItem('loginAttempts', '0');
            localStorage.setItem('lastAttempt', '0');
        }
        return true;
    }

    // =====================================================
    // 🔥 الأمان: Input Sanitization (منع XSS)
    // =====================================================
    function sanitizeInput(input) {
        const div = document.createElement('div');
        div.textContent = input || '';
        return div.innerHTML.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
    }

    // =====================================================
    // 🔥 الأمان: Password Hashing
    // =====================================================
    function hashPassword(password) {
        // SHA-256 بسيط + salt
        let hash = 0;
        for (let i = 0; i < password.length; i++) {
            const char = password.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return btoa(Math.abs(hash).toString(36) + 'AUST_SALT_2026_v2');
    }

    // =====================================================
    // 🔥 الدوال الأساسية (محسنة)
    // =====================================================
    let mode = 'login';
    let savedRecoveryCode = null;

    function notify(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-triangle' : 'info-circle'}"></i> ${msg}`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 500);
        }, 5000);
    }

    function showAuth() {
        document.getElementById('welcomeSection').style.display = 'none';
        document.getElementById('authSection').style.display = 'block';
    }

    function togglePass(icon) {
        const input = document.getElementById('passInput');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    }

    function toggleMode() {
        document.getElementById('verifyCodeGroup').style.display = 'none';
        document.getElementById('passGroup').style.display = 'block';

        if (mode === 'login' || mode === 'forgot' || mode === 'verify') {
            mode = 'register';
            updateUI("إنشاء حساب", "تأكيد الحساب", "block", "block", "block", "لديك حساب؟ <b>سجل دخولك</b>");
            document.getElementById('forgotLink').style.display = 'none';
        } else {
            mode = 'login';
            updateUI("تسجيل الدخول", "دخول المنصة", "none", "none", "block", "ليس لديك حساب؟ <b>إنشاء حساب جديد</b>");
            document.getElementById('forgotLink').style.display = 'block';
        }
    }

    function showForgot() {
        mode = 'forgot';
        updateUI("استعادة الرمز", "إرسال كود التحقق", "none", "block", "none", "العودة للدخول");
        document.getElementById('verifyCodeGroup').style.display = 'none';
    }

    function updateUI(title, btnText, nameDisplay, emailDisplay, passDisplay, switchText) {
        document.getElementById('mainTitle').innerText = title;
        document.getElementById('btnText').innerText = btnText;
        document.getElementById('nameGroup').style.display = nameDisplay;
        document.getElementById('emailGroup').style.display = emailDisplay;
        document.getElementById('passGroup').style.display = passDisplay;
        document.getElementById('toggleTxt').innerHTML = switchText;
    }

    // =====================================================
    // 🔥 الدالة الرئيسية المحسنة أمنياً
    // =====================================================
    async function handleAction() {
        if (!checkRateLimit()) return;

        const id = sanitizeInput(document.getElementById('idInput').value.trim());
        const pass = document.getElementById('passInput').value;
        const name = sanitizeInput(document.getElementById('nameInput').value.trim());
        const email = sanitizeInput(document.getElementById('emailInput').value.trim().toLowerCase());
        const userEnteredCode = sanitizeInput(document.getElementById('verifyCodeInput').value.trim());

        // =====================================================
        // 🔥 التحقق من صحة البيانات
        // =====================================================
        if (!/^\d{8}$/.test(id)) {
            notify("رقم الطالب 8 أرقام فقط", 'error');
            return;
        }
        if (pass.length < 8) {
            notify("الرمز السري 8 محارف على الأقل", 'error');
            return;
        }
        if (mode === 'register' && !email.endsWith('@gmail.com')) {
            notify("البريد Gmail فقط!", 'error');
            return;
        }
        if (mode === 'register') {
            const nameParts = name.split(/\s+/).filter(p => p.length > 0);
            if (nameParts.length < 3) {
                notify("أدخل الاسم الثلاثي كاملاً", 'error');
                return;
            }
        }

        try {
            notify("جاري المعالجة...", 'info');

            if (mode === 'register') {
                // 1. تحقق من عدم وجود المستخدم
                const snapshot = await database.ref('users/' + id).once('value');
                if (snapshot.exists()) {
                    throw new Error("رقم الطالب مسجل مسبقاً!");
                }

                // 2. إنشاء Firebase Auth user
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                await userCredential.user.sendEmailVerification();

                // 3. حفظ البيانات المشفرة
                await database.ref('users/' + id).set({
                    id: id,
                    name: name,
                    email: email,
                    passwordHash: hashPassword(pass),
                    major: "هندسة البرمجيات",
                    createdAt: firebase.database.ServerValue.TIMESTAMP,
                    emailVerified: false,
                    lastLogin: null
                });

                notify("✅ تم إرسال رابط التفعيل لإيميلك", 'success');
                await auth.signOut();
                setTimeout(() => toggleMode(), 2000);

            } else if (mode === 'login') {
                // 1. جلب بيانات المستخدم
                const snapshot = await database.ref('users/' + id).once('value');
                const data = snapshot.val();

                if (!data || hashPassword(pass) !== data.passwordHash) {
                    loginAttempts++;
                    lastAttempt = Date.now();
                    localStorage.setItem('loginAttempts', loginAttempts.toString());
                    localStorage.setItem('lastAttempt', lastAttempt.toString());
                    throw new Error("رقم الطالب أو الرمز خاطئ");
                }

                // 2. تسجيل دخول Firebase Auth
                const userCredential = await auth.signInWithEmailAndPassword(data.email, pass);
                
                if (!userCredential.user.emailVerified) {
                    await auth.signOut();
                    throw new Error("⚠️ الحساب غير مفعل! تحقق من إيميلك");
                }

                // 3. حفظ الجلسة آمنة
                localStorage.setItem("userName", data.name);
                localStorage.setItem("userID", data.id);
                localStorage.setItem("userMajor", data.major || "هندسة البرمجيات");
                localStorage.setItem("sessionToken", btoa(Date.now() + data.id)); // token مؤقت

                // 4. تحديث آخر دخول
                await database.ref('users/' + id).update({
                    lastLogin: firebase.database.ServerValue.TIMESTAMP
                });

                notify(`✅ مرحباً بك يا ${data.name}`, 'success');
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);

            } else if (mode === 'forgot') {
                const snapshot = await database.ref('users/' + id).once('value');
                const data = snapshot.val();
                
                if (data && data.email.toLowerCase() === email) {
                    savedRecoveryCode = Math.floor(100000 + Math.random() * 900000);
                    // EmailJS مع validation
                    emailjs.send("service_cgm7d0c", "template_xi6oxl7", {
                        to_name: data.name,
                        to_email: email,
                        recovery_code: savedRecoveryCode
                    }).then(() => {
                        notify("✅ تم إرسال كود الاستعادة", 'success');
                        mode = 'verify';
                        updateUI("تأكيد الرمز", "تحديث الرمز السري", "none", "none", "block", "العودة");
                        document.getElementById('verifyCodeGroup').style.display = 'block';
                        document.getElementById('passLabel').innerText = "الرمز السري الجديد";
                        document.getElementById('btnText').innerText = "تحديث الرمز";
                    }).catch(() => notify("خطأ في الإيميل", 'error'));
                } else {
                    throw new Error("البيانات غير متطابقة");
                }

            } else if (mode === 'verify') {
                if (parseInt(userEnteredCode) === savedRecoveryCode) {
                    if (pass.length < 8) {
                        notify("الرمز الجديد قصير جداً", 'error');
                        return;
                    }
                    await database.ref('users/' + id).update({
                        passwordHash: hashPassword(pass)
                    });
                    notify("✅ تم تحديث الرمز السري", 'success');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    notify("❌ كود التحقق خاطئ", 'error');
                }
            }

        } catch (error) {
            notify(error.message, 'error');
            console.error('Auth Error:', error);
        }
    }

    // =====================================================
    // 🔥 Event Listeners آمنة
    // =====================================================
    document.getElementById('idInput').addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '').slice(0, 8);
    });

    document.getElementById('authForm').addEventListener('submit', function(e) {
        e.preventDefault();
        handleAction();
    });

    // 🔥 تنظيف localStorage عند الخروج
    window.addEventListener('beforeunload', () => {
        if (mode === 'login') localStorage.clear();
    });

    console.log("🔒 AUST Smart Pulse - Secure Mode Active");
</script>
</body>
</html>
