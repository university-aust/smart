<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUST Smart Pulse | تسجيل الدخول </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root {
        --gold: #00d4ff; 
        --gold-glow: rgba(0, 212, 255, 0.6);
        --glass: rgba(10, 15, 30, 0.75);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

    body {
        height: 100vh; display: flex; justify-content: center; align-items: center;
        background-color: #030712;
        background-image: url('67260.jpg');
        background-size: cover; background-position: center; background-attachment: fixed;
        overflow: hidden; position: relative;
    }

    body::before { 
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0, 0, 0, 0.3);
        z-index: 0; 
    }

    .glass-container {
        position: relative; z-index: 1; width: 420px; padding: 35px;
        background: var(--glass); 
        backdrop-filter: blur(15px) saturate(160%); 
        -webkit-backdrop-filter: blur(15px) saturate(160%);
        border: 1px solid rgba(0, 212, 255, 0.3); 
        border-radius: 45px;
        text-align: center; 
        box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        transition: all 0.5s ease-in-out;
    }

    .glass-container:hover {
        transform: translateY(-10px); 
        box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 40px var(--gold-glow);
        border-color: var(--gold);
    }

    .top-line { width: 60px; height: 4px; background: var(--gold); margin: 0 auto 15px; border-radius: 10px; box-shadow: 0 0 15px var(--gold); }
    
    .brand-h1 { 
        font-size: 2.8rem; margin: 0; 
        background: linear-gradient(to bottom, #fff 40%, var(--gold)); 
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent; 
        font-weight: 900; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5)); 
    }

    .wisdom-container { margin: 20px 0; padding: 25px; background: rgba(0, 0, 0, 0.4); border-radius: 25px; border-right: 4px solid var(--gold); }
    .wisdom-text { font-size: 1.1rem; line-height: 1.6; color: #fff; font-style: italic; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }

    .main-btn, .submit-btn {
        display: block; width: 100%; padding: 16px; margin-top: 20px;
        background: linear-gradient(45deg, var(--gold), #1e293b);
        color: #fff; border: none; border-radius: 15px; font-weight: 800;
        font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        box-shadow: 0 4px 15px var(--gold-glow);
    }

    .form-group { margin-top: 15px; text-align: right; position: relative; }
    label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--gold); font-weight: bold; }
    
    input { 
        width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
        background: rgba(255, 255, 255, 0.95); color: #222; font-size: 1rem; outline: none; transition: 0.3s; 
    }
    input:focus { transform: translateY(-2px); box-shadow: 0 5px 15px var(--gold-glow); }

    .pass-toggle { position: absolute; left: 12px; bottom: 12px; color: #666; cursor: pointer; }
    .footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; color: #fff; text-shadow: 1px 1px 2px #000; }
    
    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
    .toast { 
        background: rgba(10, 15, 30, 0.9); backdrop-filter: blur(10px); 
        color: white; padding: 12px 25px; border-radius: 15px; 
        border: 1px solid var(--gold); margin-bottom: 10px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        animation: slideDown 0.4s ease-out;
    }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="glass-container" id="welcomeSection">
        <div class="top-line"></div>
        <p style="color: var(--gold); font-weight: 600;">اهلا وسهلا بك في</p>
        <h1 class="brand-h1">Smart Pulse</h1>
        <div class="wisdom-container">
            <p class="wisdom-text">"الطريق طويل، لكن كل خطوة تخطوها اليوم تجعل القمة أقرب."</p>
        </div>
        <button class="main-btn" onclick="showAuth()">انطلق نحو مستقبلك</button>
        <div class="footer">تطوير المهندسة <b>شهد الخالد</b> & المهندسة<b> ضياء ملائكه</b></div>
    </div>

    <div class="glass-container" id="authSection" style="display:none;">
        <div class="top-line"></div>
        <h2 id="mainTitle" style="color:var(--gold); margin-bottom:15px;">تسجيل الدخول</h2>
        
        <form id="authForm" onsubmit="event.preventDefault(); handleAction();">
            <div class="form-group" id="nameGroup" style="display:none;">
                <label>الاسم الثلاثي</label>
                <input type="text" id="nameInput" placeholder="الاسم الأب الكنية">
            </div>

            <div class="form-group">
                <label>رقم الطالب (ID)</label>
                <input type="text" id="idInput" placeholder="2026XXXX">
            </div>
            
            <div class="form-group" id="emailGroup" style="display:none;">
                <label>البريد الإلكتروني (Gmail)</label>
                <input type="email" id="emailInput" placeholder="name@gmail.com">
            </div>

            <div class="form-group" id="verifyCodeGroup" style="display:none;">
                <label>كود التحقق المرسل للإيميل</label>
                <input type="text" id="verifyCodeInput" placeholder="أدخل الـ 6 أرقام">
            </div>

            <div class="form-group" id="passGroup">
                <label id="passLabel">الرمز السري (8 محارف على الأقل)</label>
                <input type="password" id="passInput" placeholder="أحرف، أرقام، رموز">
                <i class="fas fa-eye pass-toggle" onclick="togglePass(this)"></i>
            </div>

            <button type="submit" class="submit-btn" id="btnText">دخول المنصة</button>
        </form>

        <div style="margin-top:20px; font-size:0.85rem; cursor:pointer; color: #fff;" onclick="toggleMode()" id="toggleTxt">ليس لديك حساب؟ <b>إنشاء حساب جديد</b></div>
        <div style="margin-top:10px; font-size:0.8rem; color:var(--gold); cursor:pointer; text-decoration:underline;" id="forgotLink" onclick="showForgot()">نسيت كلمة المرور؟</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
    // 1. نظام تمويه مفاتيح Firebase (Obfuscation)
    const _0x4f22 = ["QUl6YVN5Q2dkWjFOaWNVOG1aelcicGUtVGs5WDM2aXZjeDBPTW8=", "aHR0cHM6Ly9uYWJkLWF1c3QtZGVmYXVsdC1ydGRiLmV1cm9wZS13ZXN0MS5maXJlYmFzZWRhdGFiYXNlLmFwcA==", "bmFiZC1hdXN0LmZpcmViYXNlYXBwLmNvbQ==", "bmFiZC1hdXN0"];
    const decrypt = (val) => atob(val);

    const firebaseConfig = {
        apiKey: decrypt(_0x4f22[0]),
        databaseURL: decrypt(_0x4f22[1]),
        authDomain: decrypt(_0x4f22[2]),
        projectId: decrypt(_0x4f22[3]),
        storageBucket: decrypt(_0x4f22[3]) + ".appspot.com",
        messagingSenderId: "921777725948",
        appId: "1:921777725948:web:7b024d0aa101068bef9279"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();
    (function() { emailjs.init("m905j3dqOVj_wLxf-"); })();

    // 2. نظام التشفير المحلي (Secure Storage)
    const secureStore = (key, value) => {
        const encrypted = btoa(unescape(encodeURIComponent(value)));
        localStorage.setItem(key, encrypted);
    };

    let mode = 'login';
    let savedRecoveryCode = null;

    // دالة التنبيهات (Toast)
    function notify(msg) {
        const container = document.getElementById('toast-container');
        if(!container) return; 
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 4000);
    }

    // تبديل الواجهات
    function showAuth() {
        document.getElementById('welcomeSection').style.display = 'none';
        document.getElementById('authSection').style.display = 'block';
    }

    function togglePass(icon) {
        const input = document.getElementById('passInput');
        input.type = (input.type === 'password') ? 'text' : 'password';
        icon.classList.toggle('fa-eye-slash');
    }

    function toggleMode() {
        if (mode === 'login' || mode === 'forgot' || mode === 'verify') {
            mode = 'register';
            updateUI("إنشاء حساب جديد", "تأكيد الحساب", "block", "block", "block", "لديك حساب؟ <b>سجل دخولك</b>");
        } else {
            mode = 'login';
            updateUI("تسجيل الدخول", "دخول المنصة", "none", "none", "block", "ليس لديك حساب؟ <b>إنشاء حساب</b>");
        }
    }

    function updateUI(t, b, n, e, p, sw) {
        document.getElementById('mainTitle').innerText = t;
        document.getElementById('btnText').innerText = b;
        document.getElementById('nameGroup').style.display = n;
        document.getElementById('emailGroup').style.display = e;
        document.getElementById('passGroup').style.display = p;
        document.getElementById('toggleTxt').innerHTML = sw;
    }

    // 3. معالجة العمليات (بمنطق أمني جديد)
    async function handleAction() {
        const id = document.getElementById('idInput').value.trim();
        const pass = document.getElementById('passInput').value;
        const name = document.getElementById('nameInput').value.trim();
        const email = document.getElementById('emailInput').value.trim();

        if (mode === 'register') {
            if (!id || id.length < 5) return notify("رقم الطالب غير صحيح");
            if (name.split(' ').length < 3) return notify("الاسم الثلاثي مطلوب");
            if (!email.endsWith("@gmail.com")) return notify("استخدم Gmail فقط");

            try {
                // منع التكرار
                const check = await database.ref('users/' + id).once('value');
                if(check.exists()) return notify("هذا الرقم مسجل مسبقاً");

                // إنشاء حساب في Firebase Auth
                const userCred = await auth.createUserWithEmailAndPassword(email, pass);
                await userCred.user.sendEmailVerification();

                // حفظ البيانات مشفرة (بشكل جزئي للامتثال للقواعد)
                await database.ref('users/' + id).set({
                    uN: btoa(unescape(encodeURIComponent(name))),
                    uI: id,
                    uE: email,
                    role: "student",
                    v: false
                });

                notify("تم الإرسال! فعل حسابك من الإيميل");
                auth.signOut();
                setTimeout(toggleMode, 2000);
            } catch (e) { notify("خطأ: " + e.message); }
        } 
        
        else if (mode === 'login') {
            try {
                // جلب البيانات للتحقق
                const snap = await database.ref('users/' + id).once('value');
                if(!snap.exists()) return notify("الحساب غير موجود");
                
                const userData = snap.val();
                const userCred = await auth.signInWithEmailAndPassword(userData.uE, pass);

                if (userCred.user.emailVerified) {
                    // تخزين آمن للبيانات في المتصفح
                    secureStore("u_name", decodeURIComponent(escape(atob(userData.uN))));
                    secureStore("u_id", id);
                    secureStore("u_role", userData.role);
                    
                    notify("مرحباً بك في نبض AUST");
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
                } else {
                    notify("يرجى تفعيل البريد الإلكتروني أولاً");
                    auth.signOut();
                }
            } catch (e) { notify("بيانات الدخول غير صحيحة"); }
        }
    }
</script>
</body>
</html>
